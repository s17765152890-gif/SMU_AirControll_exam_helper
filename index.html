ation","textZh":"高浓度"},{"label":"D","text":"Any concentration","textZh":"任意浓度"}],"answer":["C"],"explanation":"The answer is High concentration. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"冷凝适用于处理 VOC 气流：","explanationZh":"答案是高度集中。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":74,"localNo":74,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which of the following is NOT considered a greenhouse gas under the IMO LCA Guidelines?","options":[{"label":"A","text":"CO₂","textZh":"二氧化碳"},{"label":"B","text":"CH₄","textZh":"CH₄"},{"label":"C","text":"N₂O","textZh":"一氧化二氮"},{"label":"D","text":"SO₂","textZh":"二氧化硫"}],"answer":["D"],"explanation":"The answer is SO₂. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"根据 IMO LCA 指南，以下哪项不被视为温室气体？","explanationZh":"答案是SO2。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":75,"localNo":75,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In a Venturi scrubber, the primary energy consumption comes from:","options":[{"label":"A","text":"Liquid pumping","textZh":"液体泵送"},{"label":"B","text":"Gas pressure drop through the throat","textZh":"通过喉部的气体压力下降"},{"label":"C","text":"Corona discharge","textZh":"电晕放电"},{"label":"D","text":"Gravitational settling","textZh":"重力沉降"}],"answer":["B"],"explanation":"The answer is Gas pressure drop through the throat. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"在文丘里洗涤器中，主要能源消耗来自：","explanationZh":"答案是通过喉咙的气体压力下降。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":76,"localNo":76,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"According to the quiz statements in the course materials, which is correct?","options":[{"label":"A","text":"Gaussian plume is a receptor model","textZh":"高斯羽流是一种受体模型"},{"label":"B","text":"Effective stack height = geometric height + plume rise","textZh":"有效堆积高度=几何高度+羽流上升"},{"label":"C","text":"Higher stacks always decrease ground-level concentrations","textZh":"更高的烟囱总是会降低地面浓度"},{"label":"D","text":"Urban pollutants always transport to rural areas","textZh":"城市污染物总是输送到农村"}],"answer":["B"],"explanation":"The answer is Effective stack height = geometric height + plume rise. The basic Gaussian plume model is a steady-state, continuous-source model. It assumes constant mean wind in the downwind direction, Gaussian spreading in the lateral and vertical directions, no chemical transformation for the basic form, and reflection at the ground for non-depositing pollutants.","stemZh":"根据课程材料中的测验陈述，哪项是正确的？","explanationZh":"答案是有效烟囱高度=几何高度+羽流上升。基本高斯羽流模型是稳态、连续源模型。假设顺风方向平均风恒定，横向和垂直方向呈高斯分布，基本形态无化学变化，非沉积污染物在地面反射。"},{"id":77,"localNo":77,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Volatile Organic Compounds (VOCs) are best defined as organic compounds that:","options":[{"label":"A","text":"Are all organic substances","textZh":"都是有机物吗"},{"label":"B","text":"Have high vapor pressure at ambient temperature","textZh":"在环境温度下具有高蒸气压"},{"label":"C","text":"Are particulate matter","textZh":"是否为颗粒物"},{"label":"D","text":"Are inorganic gases","textZh":"是无机气体"}],"answer":["B"],"explanation":"The answer is Have high vapor pressure at ambient temperature. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"挥发性有机化合物 (VOC) 的最佳定义是以下有机化合物：","explanationZh":"答案是在环境温度下具有高蒸气压。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":78,"localNo":78,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"If dust resistivity is below 10⁷ ohm·cm in an ESP, what problem is most likely to occur?","options":[{"label":"A","text":"Back corona","textZh":"背电晕"},{"label":"B","text":"Particle re-entrainment","textZh":"颗粒再夹带"},{"label":"C","text":"Increased collection efficiency","textZh":"提高收集效率"},{"label":"D","text":"Voltage reduction","textZh":"电压降低"}],"answer":["B"],"explanation":"The answer is Particle re-entrainment. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"如果 ESP 中的灰尘电阻率低于 10⁷ ohm·cm，最有可能出现什么问题？","explanationZh":"答案是粒子再夹带。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":79,"localNo":79,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Source-oriented air pollution models require input data EXCEPT:","options":[{"label":"A","text":"Emission rates","textZh":"排放率"},{"label":"B","text":"Meteorological data","textZh":"气象数据"},{"label":"C","text":"Receptor concentration measurements","textZh":"受体浓度测量"},{"label":"D","text":"Source height","textZh":"源高度"}],"answer":["C"],"explanation":"The answer is Receptor concentration measurements. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"以源头为导向的空气污染模型需要输入数据，但以下情况除外：","explanationZh":"答案是受体浓度测量。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":80,"localNo":80,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The Freundlich adsorption isotherm is an empirical equation suitable for:","options":[{"label":"A","text":"Monolayer adsorption","textZh":"单层吸附"},{"label":"B","text":"Multilayer adsorption","textZh":"多层吸附"},{"label":"C","text":"Non-ideal adsorption on heterogeneous surfaces","textZh":"异质表面上的非理想吸附"},{"label":"D","text":"Chemisorption","textZh":"化学吸附"}],"answer":["C"],"explanation":"The answer is Non-ideal adsorption on heterogeneous surfaces. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"弗罗因德利希吸附等温线是一个经验方程，适用于：","explanationZh":"答案是异质表面上的非理想吸附。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":81,"localNo":81,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which of the following can reduce thermal NOx formation in combustion?","options":[{"label":"A","text":"Increasing excess air","textZh":"增加多余空气"},{"label":"B","text":"Increasing flame temperature","textZh":"提高火焰温度"},{"label":"C","text":"Flue gas recirculation","textZh":"烟气再循环"},{"label":"D","text":"Using nitrogen-containing fuel","textZh":"使用含氮燃料"}],"answer":["C"],"explanation":"The answer is Flue gas recirculation. Thermal NOx is governed mainly by high flame temperature, oxygen availability, and residence time at high temperature. Low-NOx methods such as staged combustion, flue gas recirculation, low excess air, steam or water injection, and burner redesign lower temperature peaks or oxygen exposure.","stemZh":"以下哪项可以减少燃烧中热力 NOx 的形成？","explanationZh":"答案是烟气再循环。热力 NOx 主要受高火焰温度、氧气可用性和高温停留时间的影响。低氮氧化物排放方法，如分级燃烧、烟气再循环、低过量空气、蒸汽或水喷射，以及燃烧器重新设计，降低温度峰值或氧气暴露。"},{"id":82,"localNo":82,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In atmospheric monitoring, \"Nm³\" represents:","options":[{"label":"A","text":"Cubic meter at actual conditions","textZh":"实际情况立方米"},{"label":"B","text":"Normal cubic meter (standard conditions)","textZh":"标准立方米（标准状态）"},{"label":"C","text":"Standard cubic meter","textZh":"标准立方米"},{"label":"D","text":"Ambient cubic meter","textZh":"环境立方米"}],"answer":["B"],"explanation":"The answer is Normal cubic meter (standard conditions). This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"在大气监测中，“Nm³”代表：","explanationZh":"答案是正常立方米（标准条件）。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":83,"localNo":83,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"How many stability categories are defined in the Pasquill-Gifford (P-G) dispersion curves?","options":[{"label":"A","text":"4","textZh":"4"},{"label":"B","text":"5","textZh":"5"},{"label":"C","text":"6","textZh":"6"},{"label":"D","text":"7","textZh":"7"}],"answer":["C"],"explanation":"The answer is 6. Pasquill-Gifford stability class describes turbulent mixing. Class A is very unstable with strong vertical mixing, while Class F is stable with weak mixing. The class is estimated from routine observations such as wind speed, solar radiation or cloud cover, and day/night conditions.","stemZh":"Pasquill-Gifford (P-G) 色散曲线中定义了多少个稳定性类别？","explanationZh":"答案是 6。Pasquill-Gifford 稳定性等级描述了湍流混合。 A类在强烈的垂直混合下非常不稳定，而F类在弱混合下很稳定。该等级是根据风速、太阳辐射或云量以及白天/夜间条件等常规观测来估计的。"},{"id":84,"localNo":84,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Sea breeze and land breeze patterns:","options":[{"label":"A","text":"Sea breeze blows from land to sea during daytime","textZh":"白天海风从陆地吹向海洋"},{"label":"B","text":"Land breeze blows from sea to land during nighttime","textZh":"夜间陆风从海上吹向陆地"},{"label":"C","text":"Sea breeze blows from sea to land during daytime","textZh":"白天海风从海上吹向陆地"},{"label":"D","text":"Wind direction is random and unpredictable","textZh":"风向是随机且不可预测的"}],"answer":["C"],"explanation":"The answer is Sea breeze blows from sea to land during daytime. Sea-breeze circulation is driven by land-water temperature differences. During daytime, land heats faster and sea breeze usually blows from sea to land; at night the land cools faster and land breeze can blow from land to sea.","stemZh":"海风和陆风模式：","explanationZh":"答案是白天海风从海上吹向陆地。海风环流是由陆地水温差驱动的。白天，陆地升温较快，海风通常从海洋吹向陆地；晚上，陆地冷却得更快，陆风可以从陆地吹向海洋。"},{"id":85,"localNo":85,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In a fixed-bed catalytic reactor, if external diffusion is rate-controlling, increasing which parameter will significantly increase reaction rate?","options":[{"label":"A","text":"Catalyst internal surface area","textZh":"催化剂内表面积"},{"label":"B","text":"Gas linear velocity","textZh":"气体线速度"},{"label":"C","text":"Reaction temperature","textZh":"反应温度"},{"label":"D","text":"Catalyst activity","textZh":"催化剂活性"}],"answer":["B"],"explanation":"The answer is Gas linear velocity. External diffusion control means the slow step is transport through the gas film around the particle or packing surface. Increasing gas velocity thins the boundary layer and raises the mass-transfer coefficient, so it helps much more than simply increasing intrinsic catalyst activity.","stemZh":"在固定床催化反应器中，如果外部扩散是速率控制的，那么增加哪个参数将显着提高反应速率？","explanationZh":"答案是气体线速度。外部扩散控制意味着缓慢的步骤是通过颗粒或填料表面周围的气膜传输。增加气体速度可以使边界层变薄并提高传质系数，因此它比简单地增加催化剂的内在活性更有帮助。"},{"id":86,"localNo":86,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Liquid absorption for VOC control primarily utilizes VOCs' property of:","options":[{"label":"A","text":"Flammability","textZh":"易燃"},{"label":"B","text":"Solubility or chemical reactivity in liquid","textZh":"液体中的溶解度或化学反应性"},{"label":"C","text":"Volatility","textZh":"挥发性"},{"label":"D","text":"Density","textZh":"密度"}],"answer":["B"],"explanation":"The answer is Solubility or chemical reactivity in liquid. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"用于 VOC 控制的液体吸收主要利用 VOC 的特性：","explanationZh":"答案是液体中的溶解度或化学反应性。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":87,"localNo":87,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In LCA methodology, the GHG reduction benefit of Carbon Capture and Storage (CCS) is accounted in which stage?","options":[{"label":"A","text":"WTT stage","textZh":"WTT阶段"},{"label":"B","text":"TTW stage","textZh":"TTW阶段"},{"label":"C","text":"Both WTT and TTW","textZh":"WTT 和 TTW"},{"label":"D","text":"Not accounted","textZh":"未计入"}],"answer":["A"],"explanation":"The answer is WTT stage. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在LCA方法中，碳捕集与封存（CCS）的温室气体减排效益计入哪个阶段？","explanationZh":"答案是WTT阶段。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":88,"localNo":88,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"For large-volume, low-concentration VOC waste gas streams, the most economical control technology is typically:","options":[{"label":"A","text":"Condensation","textZh":"缩合"},{"label":"B","text":"Adsorption concentration + combustion","textZh":"吸附浓缩+燃烧"},{"label":"C","text":"Direct incineration","textZh":"直接焚烧"},{"label":"D","text":"Membrane separation","textZh":"膜分离"}],"answer":["B"],"explanation":"The answer is Adsorption concentration + combustion. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"对于大流量、低浓度 VOC 废气流，最经济的控制技术通常是：","explanationZh":"答案是吸附浓度+燃烧。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":89,"localNo":89,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Cyclone separator efficiency is generally _________ to inlet dust concentration.","options":[{"label":"A","text":"Highly sensitive","textZh":"高灵敏"},{"label":"B","text":"Insensitive (nearly independent)","textZh":"不敏感（几乎独立）"},{"label":"C","text":"Positively correlated","textZh":"正相关"},{"label":"D","text":"Negatively correlated","textZh":"负相关"}],"answer":["B"],"explanation":"The answer is Insensitive (nearly independent). A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"旋风分离器的效率一般与入口粉尘浓度有关。","explanationZh":"答案是不敏感（几乎独立）。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":90,"localNo":90,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The urban heat island effect:","options":[{"label":"A","text":"Causes lower temperatures in cities compared to suburbs","textZh":"导致城市气温低于郊区"},{"label":"B","text":"Can draw pollutants toward the city center","textZh":"可以将污染物吸引到市中心"},{"label":"C","text":"Increases atmospheric stability","textZh":"增加大气稳定性"},{"label":"D","text":"Enhances pollutant dispersion","textZh":"增强污染物扩散"}],"answer":["B"],"explanation":"The answer is Can draw pollutants toward the city center. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"城市热岛效应：","explanationZh":"答案是可以将污染物吸引到市中心。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":91,"localNo":91,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The aerodynamic equivalent diameter of a particle is defined as:","options":[{"label":"A","text":"The actual geometric diameter","textZh":"实际几何直径"},{"label":"B","text":"The diameter of a unit-density sphere with the same settling velocity","textZh":"具有相同沉降速度的单位密度球体的直径"},{"label":"C","text":"The volume-equivalent diameter","textZh":"体积当量直径"},{"label":"D","text":"The projected area diameter","textZh":"投影面积直径"}],"answer":["B"],"explanation":"The answer is The diameter of a unit-density sphere with the same settling velocity. In the Stokes regime, particle settling velocity is proportional to the square of particle diameter when other properties are constant. This is why coarse particles settle much faster than fine particles.","stemZh":"颗粒的空气动力学当量直径定义为：","explanationZh":"答案是具有相同沉降速度的单位密度球体的直径。在斯托克斯状态下，当其他属性不变时，颗粒沉降速度与颗粒直径的平方成正比。这就是粗颗粒比细颗粒沉降快得多的原因。"},{"id":92,"localNo":92,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"According to the two-film theory, the gas-liquid interface has no mass transfer resistance because:","options":[{"label":"A","text":"Concentrations on both sides are equal","textZh":"两侧浓度相等"},{"label":"B","text":"The interface is at phase equilibrium","textZh":"界面处于相平衡"},{"label":"C","text":"Interface resistance is zero","textZh":"界面电阻为零"},{"label":"D","text":"All of the above","textZh":"上述所有的"}],"answer":["D"],"explanation":"The answer is All of the above. External diffusion control means the slow step is transport through the gas film around the particle or packing surface. Increasing gas velocity thins the boundary layer and raises the mass-transfer coefficient, so it helps much more than simply increasing intrinsic catalyst activity.","stemZh":"根据二膜理论，气液界面不存在传质阻力，因为：","explanationZh":"答案是以上全部。外部扩散控制意味着缓慢的步骤是通过颗粒或填料表面周围的气膜传输。增加气体速度可以使边界层变薄并提高传质系数，因此它比简单地增加催化剂的内在活性更有帮助。"},{"id":93,"localNo":93,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Regarding atmospheric particle residence time, which statement is correct?","options":[{"label":"A","text":"Larger particles have longer residence times","textZh":"颗粒越大，停留时间越长"},{"label":"B","text":"Smaller particles have longer residence times","textZh":"较小的颗粒具有较长的停留时间"},{"label":"C","text":"All particles have the same residence time","textZh":"所有颗粒具有相同的停留时间"},{"label":"D","text":"Residence time depends only on meteorology","textZh":"停留时间仅取决于气象"}],"answer":["B"],"explanation":"The answer is Smaller particles have longer residence times. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"关于大气颗粒物停留时间，哪种说法是正确的？","explanationZh":"答案是较小的颗粒具有较长的停留时间。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":94,"localNo":94,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In an RTO system, the primary function of the ceramic media (heat sink) is to:","options":[{"label":"A","text":"Catalyze oxidation","textZh":"催化氧化"},{"label":"B","text":"Absorb heat and preheat incoming gas","textZh":"吸收热量并预热进入的气体"},{"label":"C","text":"Filter particulate matter","textZh":"过滤颗粒物"},{"label":"D","text":"Cool the exhaust gas","textZh":"冷却废气"}],"answer":["B"],"explanation":"The answer is Absorb heat and preheat incoming gas. For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"在 RTO 系统中，陶瓷介质（散热器）的主要功能是：","explanationZh":"答案是吸收热量并预热进入的气体。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":95,"localNo":95,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Combining Raoult's law and the Antoine equation allows calculation of:","options":[{"label":"A","text":"Diffusion coefficient of gas in liquid","textZh":"气体在液体中的扩散系数"},{"label":"B","text":"Saturation vapor pressure of VOCs","textZh":"VOC的饱和蒸气压"},{"label":"C","text":"Specific surface area of adsorbent","textZh":"吸附剂比表面积"},{"label":"D","text":"Catalyst activity","textZh":"催化剂活性"}],"answer":["B"],"explanation":"The answer is Saturation vapor pressure of VOCs. VOC adsorption uses porous solids such as activated carbon, zeolites, silica gel, alumina, or polymeric resins. Capacity depends on pore structure, surface chemistry, humidity, temperature, inlet concentration, and regeneration history.","stemZh":"结合拉乌尔定律和安东尼方程可以计算：","explanationZh":"答案是VOC的饱和蒸气压。 VOC 吸附使用多孔固体，例如活性炭、沸石、硅胶、氧化铝或聚合物树脂。容量取决于孔隙结构、表面化学、湿度、温度、入口浓度和再生历史。"},{"id":96,"localNo":96,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In maritime emission inventories, the most significant greenhouse gas from ships is:","options":[{"label":"A","text":"CO₂","textZh":"二氧化碳"},{"label":"B","text":"CH₄","textZh":"CH₄"},{"label":"C","text":"N₂O","textZh":"一氧化二氮"},{"label":"D","text":"Black carbon","textZh":"黑碳"}],"answer":["A"],"explanation":"The answer is CO₂. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"在海上排放清单中，船舶产生的最重要的温室气体是：","explanationZh":"答案是二氧化碳。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":97,"localNo":97,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"For a gas-solid catalytic reaction, the internal effectiveness factor is related to the Thiele modulus as:","options":[{"label":"A","text":"Higher modulus → higher effectiveness factor","textZh":"更高的模量→更高的效率系数"},{"label":"B","text":"Lower modulus → lower effectiveness factor","textZh":"较低的模量→较低的效率系数"},{"label":"C","text":"Higher modulus → lower effectiveness factor","textZh":"更高的模量→更低的效率系数"},{"label":"D","text":"No relationship","textZh":"没有关系"}],"answer":["C"],"explanation":"The answer is Higher modulus → lower effectiveness factor. When internal pore diffusion controls a gas-solid catalytic reaction, the observed rate is no longer just the intrinsic surface reaction rate. Concentration drops inside the catalyst particle, so the apparent kinetics become weaker than the intrinsic kinetics and the effectiveness factor is governed by the Thiele modulus.","stemZh":"对于气固催化反应，内部有效性因子与蒂勒模量的关系为：","explanationZh":"答案是更高的模量→更低的效率系数。当内部孔扩散控制气固催化反应时，观察到的速率不再仅仅是固有的表面反应速率。催化剂颗粒内部的浓度下降，因此表观动力学变得弱于内在动力学，并且有效性因子由蒂勒模量控制。"},{"id":98,"localNo":98,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The shape of the breakthrough curve in a fixed-bed adsorber is mainly influenced by:","options":[{"label":"A","text":"Adsorption isotherm type and mass transfer resistance","textZh":"吸附等温线类型和传质阻力"},{"label":"B","text":"Adsorbent color","textZh":"吸附剂颜色"},{"label":"C","text":"Adsorbate molecular weight","textZh":"吸附物分子量"},{"label":"D","text":"Ambient humidity","textZh":"环境湿度"}],"answer":["A"],"explanation":"The answer is Adsorption isotherm type and mass transfer resistance. Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter.","stemZh":"固定床吸附器中穿透曲线的形状主要受以下因素影响：","explanationZh":"答案是吸附等温线类型和传质阻力。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。"},{"id":99,"localNo":99,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Flue gas desulfurization (FGD) technology is primarily aimed at controlling:","options":[{"label":"A","text":"NOx","textZh":"氮氧化物"},{"label":"B","text":"CO","textZh":"一氧化碳"},{"label":"C","text":"SO₂","textZh":"二氧化硫"},{"label":"D","text":"Particulate matter","textZh":"颗粒物"}],"answer":["C"],"explanation":"The answer is SO₂. SO2 control focuses on reducing sulfur before, during, or after combustion: low-sulfur fuel, fuel desulfurization, in-furnace limestone or sorbent injection, and flue gas desulfurization. Tall stacks dilute pollutants but do not reduce total emissions.","stemZh":"烟气脱硫（FGD）技术主要旨在控制：","explanationZh":"答案是SO2。 SO2 控制重点是在燃烧前、燃烧中或燃烧后减少硫：低硫燃料、燃料脱硫、炉内石灰石或吸附剂注入以及烟气脱硫。高烟囱会稀释污染物，但不会减少总排放量。"},{"id":100,"localNo":100,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Receptor models (e.g., CMB and PMF) are fundamentally based on:","options":[{"label":"A","text":"Emission inventory simulation","textZh":"排放清单模拟"},{"label":"B","text":"Monitoring data to back-calculate source contributions","textZh":"监控数据以反算源贡献"},{"label":"C","text":"Meteorological prediction","textZh":"气象预报"},{"label":"D","text":"Risk assessment methodology","textZh":"风险评估方法"}],"answer":["B"],"explanation":"The answer is Monitoring data to back-calculate source contributions. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"受体模型（例如 CMB 和 PMF）基本上基于：","explanationZh":"答案是监控数据以反算源贡献。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":101,"localNo":1,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Which of the following are key assumptions of the basic Gaussian plume model?","options":[{"label":"A","text":"Pollutant concentration follows a Gaussian distribution in the crosswind plane","textZh":"污染物浓度在侧风平面上服从高斯分布"},{"label":"B","text":"Wind speed in the x-direction is constant and independent of time","textZh":"x 方向的风速恒定并且与时间无关"},{"label":"C","text":"Pollutants undergo chemical reactions during dispersion","textZh":"污染物在扩散过程中发生化学反应"},{"label":"D","text":"Continuous and constant emission rate","textZh":"连续且恒定的发射率"},{"label":"E","text":"Total reflection at the ground surface","textZh":"地面全反射"}],"answer":["A","B","D","E"],"explanation":"Select the choices that correspond to: Pollutant concentration follows a Gaussian distribution in the crosswind plane; Wind speed in the x-direction is constant and independent of time; Continuous and constant emission rate; Total reflection at the ground surface. The basic Gaussian plume model is a steady-state, continuous-source model. It assumes constant mean wind in the downwind direction, Gaussian spreading in the lateral and vertical directions, no chemical transformation for the basic form, and reflection at the ground for non-depositing pollutants.","stemZh":"以下哪些是基本高斯羽流模型的关键假设？","explanationZh":"选择对应于以下内容的选项： 污染物浓度在侧风平面上服从高斯分布； x方向的风速恒定且与时间无关；连续且恒定的排放速率；地面全反射。基本高斯羽流模型是稳态、连续源模型。假设顺风方向平均风恒定，横向和垂直方向呈高斯分布，基本形态无化学变化，非沉积污染物在地面反射。"},{"id":102,"localNo":2,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The Pasquill-Gifford stability categories are determined based on which routine meteorological observations?","options":[{"label":"A","text":"Cloud cover","textZh":"云层覆盖"},{"label":"B","text":"Solar radiation intensity","textZh":"太阳辐射强度"},{"label":"C","text":"Surface wind speed","textZh":"表面风速"},{"label":"D","text":"Atmospheric pressure","textZh":"气压"},{"label":"E","text":"Relative humidity","textZh":"相对湿度"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Cloud cover; Solar radiation intensity; Surface wind speed. Pasquill-Gifford stability class describes turbulent mixing. Class A is very unstable with strong vertical mixing, while Class F is stable with weak mixing. The class is estimated from routine observations such as wind speed, solar radiation or cloud cover, and day/night conditions.","stemZh":"Pasquill-Gifford 稳定性类别是根据哪些常规气象观测确定的？","explanationZh":"选择对应于以下内容的选项： 云层覆盖；太阳辐射强度；表面风速。 Pasquill-Gifford 稳定性等级描述了湍流混合。 A类在强烈的垂直混合下非常不稳定，而F类在弱混合下很稳定。该等级是根据风速、太阳辐射或云量以及白天/夜间条件等常规观测来估计的。"},{"id":103,"localNo":3,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Plume rise height (ΔH) in atmospheric dispersion is influenced by which of the following factors?","options":[{"label":"A","text":"Stack gas exit velocity","textZh":"烟囱气体出口速度"},{"label":"B","text":"Stack gas temperature","textZh":"烟气温度"},{"label":"C","text":"Stack diameter","textZh":"堆垛直径"},{"label":"D","text":"Ambient wind speed","textZh":"环境风速"},{"label":"E","text":"Ambient temperature and pressure","textZh":"环境温度和压力"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Stack gas exit velocity; Stack gas temperature; Stack diameter; Ambient wind speed; Ambient temperature and pressure. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"大气扩散中羽流上升高度 (ΔH) 受以下哪些因素影响？","explanationZh":"选择对应于的选项：烟囱气体出口速度；烟气温度；堆垛直径；环境风速；环境温度和压力。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":104,"localNo":4,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The primary gaseous pollutants generated from fossil fuel combustion include:","options":[{"label":"A","text":"Carbon monoxide (CO)","textZh":"一氧化碳 (CO)"},{"label":"B","text":"Nitrogen oxides (NOx)","textZh":"氮氧化物 (NOx)"},{"label":"C","text":"Sulfur dioxide (SO₂)","textZh":"二氧化硫 (SO2)"},{"label":"D","text":"Volatile organic compounds (VOCs)","textZh":"挥发性有机化合物 (VOC)"},{"label":"E","text":"Hydrogen sulfide (H₂S)","textZh":"硫化氢 (H2S)"}],"answer":["A","B","C","D"],"explanation":"Select the choices that correspond to: Carbon monoxide (CO); Nitrogen oxides (NOx); Sulfur dioxide (SO₂); Volatile organic compounds (VOCs). SO2 control focuses on reducing sulfur before, during, or after combustion: low-sulfur fuel, fuel desulfurization, in-furnace limestone or sorbent injection, and flue gas desulfurization. Tall stacks dilute pollutants but do not reduce total emissions.","stemZh":"化石燃料燃烧产生的主要气态污染物包括：","explanationZh":"选择对应于以下内容的选项： 一氧化碳 (CO)；氮氧化物（NOx）；二氧化硫（SO2）；挥发性有机化合物 (VOC)。 SO2 控制重点是在燃烧前、燃烧中或燃烧后减少硫：低硫燃料、燃料脱硫、炉内石灰石或吸附剂注入以及烟气脱硫。高烟囱会稀释污染物，但不会减少总排放量。"},{"id":105,"localNo":5,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In gas-liquid absorption, the overall mass transfer rate is affected by which factors?","options":[{"label":"A","text":"Gas-liquid contact area per unit volume","textZh":"单位体积气液接触面积"},{"label":"B","text":"Individual mass transfer coefficients in both films","textZh":"两种薄膜中的单独传质系数"},{"label":"C","text":"Concentration difference (driving force)","textZh":"浓度差（驱动力）"},{"label":"D","text":"Operating temperature and pressure","textZh":"工作温度和压力"},{"label":"E","text":"Liquid viscosity","textZh":"液体粘度"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Gas-liquid contact area per unit volume; Individual mass transfer coefficients in both films; Concentration difference (driving force); Operating temperature and pressure; Liquid viscosity. External diffusion control means the slow step is transport through the gas film around the particle or packing surface. Increasing gas velocity thins the boundary layer and raises the mass-transfer coefficient, so it helps much more than simply increasing intrinsic catalyst activity.","stemZh":"在气液吸收中，总体传质速率受哪些因素影响？","explanationZh":"选择对应于以下内容的选项：每单位体积的气液接触面积；两种薄膜中各自的传质系数；浓度差（驱动力）；工作温度和压力；液体粘度。外部扩散控制意味着缓慢的步骤是通过颗粒或填料表面周围的气膜传输。增加气体速度可以使边界层变薄并提高传质系数，因此它比简单地增加催化剂的内在活性更有帮助。"},{"id":106,"localNo":6,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The Henry's law constant can be expressed in which of the following forms?","options":[{"label":"A","text":"Henry's constant H (atm·m³/mol)","textZh":"亨利常数 H (atm·m3/mol)"},{"label":"B","text":"Solubility coefficient E (atm)","textZh":"溶解度系数E(atm)"},{"label":"C","text":"Phase equilibrium constant m (dimensionless)","textZh":"相平衡常数 m（无量纲）"},{"label":"D","text":"Diffusion coefficient D (m²/s)","textZh":"扩散系数D (m²/s)"},{"label":"E","text":"Partition coefficient K","textZh":"分配系数K"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Henry's constant H (atm·m³/mol); Solubility coefficient E (atm); Phase equilibrium constant m (dimensionless). Henry's law is most useful for dilute, slightly soluble gases where gas-liquid equilibrium is approximately linear. It links gas-phase partial pressure with dissolved concentration and is the basis for judging absorption driving force.","stemZh":"亨利定律常数可以用以下哪种形式表示？","explanationZh":"选择对应于以下内容的选项： 亨利常数 H (atm·m3/mol)；溶解度系数E（atm）；相平衡常数 m（无量纲）。亨利定律对于气液平衡近似线性的稀释的微溶气体最有用。它将气相分压与溶解浓度联系起来，是判断吸收驱动力的基础。"},{"id":107,"localNo":7,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Common gas absorption equipment used in air pollution control includes:","options":[{"label":"A","text":"Packed tower","textZh":"填料塔"},{"label":"B","text":"Tray (plate) tower","textZh":"盘（板）塔"},{"label":"C","text":"Spray tower","textZh":"喷淋塔"},{"label":"D","text":"Fixed-bed adsorber","textZh":"固定床吸附器"},{"label":"E","text":"Venturi scrubber","textZh":"文丘里洗涤器"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Packed tower; Tray (plate) tower; Spray tower. In a fixed-bed adsorber, the breakthrough curve tracks the movement and spreading of the mass-transfer zone. Dynamic capacity is lower than equilibrium static capacity because the bed must be replaced or regenerated before the outlet concentration exceeds the allowable limit.","stemZh":"大气污染治理中常用的气体吸收设备包括：","explanationZh":"选择对应于的选项：填料塔；盘（盘）塔；喷雾塔。在固定床吸附器中，突破曲线跟踪传质区的移动和扩展。动态容量低于平衡静态容量，因为在出​​口浓度超过允许限度之前必须更换或再生床。"},{"id":108,"localNo":8,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The dynamic adsorption capacity of an adsorbent in a fixed bed is influenced by:","options":[{"label":"A","text":"Adsorption temperature","textZh":"吸附温度"},{"label":"B","text":"Adsorbate concentration in the gas stream","textZh":"气流中的吸附剂浓度"},{"label":"C","text":"Gas flow velocity through the bed","textZh":"通过床层的气体流速"},{"label":"D","text":"Adsorbent particle size","textZh":"吸附剂粒径"},{"label":"E","text":"Adsorbent specific surface area and pore structure","textZh":"吸附剂比表面积和孔结构"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Adsorption temperature; Adsorbate concentration in the gas stream; Gas flow velocity through the bed; Adsorbent particle size; Adsorbent specific surface area and pore structure. In a fixed-bed adsorber, the breakthrough curve tracks the movement and spreading of the mass-transfer zone. Dynamic capacity is lower than equilibrium static capacity because the bed must be replaced or regenerated before the outlet concentration exceeds the allowable limit.","stemZh":"固定床中吸附剂的动态吸附容量受以下因素影响：","explanationZh":"选择对应于的选项： 吸附温度；气流中的吸附剂浓度；通过床层的气体流速；吸附剂粒径；吸附剂的比表面积和孔结构。在固定床吸附器中，突破曲线跟踪传质区的移动和扩展。动态容量低于平衡静态容量，因为在出​​口浓度超过允许限度之前必须更换或再生床。"},{"id":109,"localNo":9,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Deactivation mechanisms of heterogeneous catalysts include:","options":[{"label":"A","text":"Poisoning by chemisorption of impurities","textZh":"杂质化学吸附中毒"},{"label":"B","text":"Thermal sintering at high temperatures","textZh":"高温热烧结"},{"label":"C","text":"Coke or carbon deposition","textZh":"积炭或积碳"},{"label":"D","text":"Mechanical attrition or erosion","textZh":"机械磨损或侵蚀"},{"label":"E","text":"Leaching or volatilization of active components","textZh":"活性成分浸出或挥发"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Poisoning by chemisorption of impurities; Thermal sintering at high temperatures; Coke or carbon deposition; Mechanical attrition or erosion; Leaching or volatilization of active components. Catalyst poisoning occurs when impurities are strongly chemisorbed on active sites. Those sites are then unavailable for the desired reaction, which is why poisoning is usually more serious and less reversible than ordinary fouling.","stemZh":"非均相催化剂的失活机制包括：","explanationZh":"选择对应于以下内容的选项： 杂质化学吸附中毒；高温热烧结；积炭或积碳；机械磨损或侵蚀；活性成分的浸出或挥发。当杂质强烈化学吸附在活性位点上时，就会发生催化剂中毒。这些部位无法进行所需的反应，这就是为什么中毒通常比普通污垢更严重且更难逆转的原因。"},{"id":110,"localNo":10,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In the IMO LCA Guidelines, the Well-to-Wake (WTW) GHG assessment includes which of the following stages?","options":[{"label":"A","text":"Feedstock extraction/cultivation","textZh":"原料提取/培养"},{"label":"B","text":"Feedstock transport to conversion site","textZh":"原料运输至转化地点"},{"label":"C","text":"Fuel production/conversion","textZh":"燃料生产/转化"},{"label":"D","text":"Fuel transport, storage, and bunkering","textZh":"燃料运输、储存和加油"},{"label":"E","text":"Fuel utilization (combustion) onboard the ship","textZh":"船上燃料利用（燃烧）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Feedstock extraction/cultivation; Feedstock transport to conversion site; Fuel production/conversion; Fuel transport, storage, and bunkering; Fuel utilization (combustion) onboard the ship. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在 IMO LCA 指南中，Well-to-Wake (WTW) 温室气体评估包括以下哪个阶段？","explanationZh":"选择对应于以下内容的选项：原料提取/培养；原料运输至转化地点；燃料生产/转化；燃料运输、储存和加油；船上的燃料利用（燃烧）。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":111,"localNo":11,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In LCA methodology, the Well-to-Tank (WTT) emissions calculation includes emissions from:","options":[{"label":"A","text":"Raw material extraction process energy use","textZh":"原料提取过程能源利用"},{"label":"B","text":"Direct and indirect land use change","textZh":"直接和间接土地利用变化"},{"label":"C","text":"Fuel conversion process energy use","textZh":"燃料转换过程能源使用"},{"label":"D","text":"Transportation and storage fugitive emissions","textZh":"运输和储存无组织排放"},{"label":"E","text":"Fuel combustion CO₂ emissions","textZh":"燃料燃烧二氧化碳排放"}],"answer":["A","B","C","D"],"explanation":"Select the choices that correspond to: Raw material extraction process energy use; Direct and indirect land use change; Fuel conversion process energy use; Transportation and storage fugitive emissions. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在 LCA 方法中，油井到油罐 (WTT) 排放计算包括以下排放：","explanationZh":"选择对应于以下内容的选项： 原材料提取过程中的能源使用；直接和间接土地利用变化；燃料转换过程中的能源使用；运输和储存无组织排放。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":112,"localNo":12,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"According to the IMO LCA Guidelines, the greenhouse gases to be quantified include:","options":[{"label":"A","text":"Carbon dioxide (CO₂)","textZh":"二氧化碳 (CO2)"},{"label":"B","text":"Methane (CH₄)","textZh":"甲烷 (CH₄)"},{"label":"C","text":"Nitrous oxide (N₂O)","textZh":"一氧化二氮 (N2O)"},{"label":"D","text":"Sulfur hexafluoride (SF₆)","textZh":"六氟化硫 (SF₆)"},{"label":"E","text":"Hydrofluorocarbons (HFCs)","textZh":"氢氟碳化合物 (HFC)"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Carbon dioxide (CO₂); Methane (CH₄); Nitrous oxide (N₂O). Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"根据IMO LCA指南，需要量化的温室气体包括：","explanationZh":"选择对应于以下内容的选项： 二氧化碳 (CO2)；甲烷（CH₄）；一氧化二氮（N2O）。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":113,"localNo":13,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In LCA methodology, acceptable allocation methods for co-products include:","options":[{"label":"A","text":"Energy content allocation","textZh":"能源含量分配"},{"label":"B","text":"Mass allocation","textZh":"批量分配"},{"label":"C","text":"Economic (market revenue) allocation","textZh":"经济（市场收入）分配"},{"label":"D","text":"Volume allocation","textZh":"数量分配"},{"label":"E","text":"No allocation (system expansion)","textZh":"无分配（系统扩展）"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Energy content allocation; Mass allocation; Economic (market revenue) allocation. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在 LCA 方法中，可接受的副产品分配方法包括：","explanationZh":"选择对应于以下内容的选项： 能源含量分配；批量分配；经济（市场收入）分配。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":114,"localNo":14,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The Global Warming Potential (GWP) values used in IMO LCA Guidelines are primarily based on:","options":[{"label":"A","text":"IPCC Second Assessment Report","textZh":"IPCC第二次评估报告"},{"label":"B","text":"IPCC Fifth Assessment Report","textZh":"IPCC第五次评估报告"},{"label":"C","text":"ISO 14040 standards","textZh":"ISO 14040 标准"},{"label":"D","text":"IMO GHG Study 2020","textZh":"国际海事组织 2020 年温室气体研究"},{"label":"E","text":"IPCC Fourth Assessment Report","textZh":"IPCC第四次评估报告"}],"answer":["B"],"explanation":"Select the choices that correspond to: IPCC Fifth Assessment Report. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"IMO LCA 指南中使用的全球变暖潜势 (GWP) 值主要基于：","explanationZh":"选择对应于以下内容的选项：IPCC 第五次评估报告。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":115,"localNo":15,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The Fuel Lifecycle Label (FLL) as defined in IMO Guidelines contains which of the following information?","options":[{"label":"A","text":"Fuel type and feedstock type","textZh":"燃料类型和原料类型"},{"label":"B","text":"Carbon source (nature/carbon source)","textZh":"碳源（自然/碳源）"},{"label":"C","text":"Conversion/production process","textZh":"转换/生产过程"},{"label":"D","text":"GHG emission factors (WTT, TTW, WTW)","textZh":"温室气体排放因子（WTT、TTW、WTW）"},{"label":"E","text":"Sustainability themes/aspects verification","textZh":"可持续性主题/方面验证"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Fuel type and feedstock type; Carbon source (nature/carbon source); Conversion/production process; GHG emission factors (WTT, TTW, WTW); Sustainability themes/aspects verification. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"IMO 指南中定义的燃料生命周期标签 (FLL) 包含以下哪些信息？","explanationZh":"选择对应于以下内容的选项：燃料类型和原料类型；碳源（自然/碳源）；转换/生产过程；温室气体排放因子（WTT、TTW、WTW）；可持续性主题/方面验证。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":116,"localNo":16,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Preventive measures for controlling VOC emissions include:","options":[{"label":"A","text":"Using floating roof tanks for storage","textZh":"使用浮顶罐进行储存"},{"label":"B","text":"Vapor recovery systems during loading","textZh":"装载期间的蒸气回收系统"},{"label":"C","text":"Improved operating procedures and maintenance","textZh":"改进的操作程序和维护"},{"label":"D","text":"End-of-pipe combustion treatment","textZh":"管端燃烧处理"},{"label":"E","text":"Enhanced sealing of equipment and piping","textZh":"加强设备和管道的密封"}],"answer":["A","B","C","E"],"explanation":"Select the choices that correspond to: Using floating roof tanks for storage; Vapor recovery systems during loading; Improved operating procedures and maintenance; Enhanced sealing of equipment and piping. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"控制VOC排放的预防措施包括：","explanationZh":"选择对应于以下内容的选项： 使用浮顶罐进行存储；装载期间的蒸气回收系统；改进的操作程序和维护；加强设备和管道的密封。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":117,"localNo":17,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Established end-of-pipe technologies for VOC control include:","options":[{"label":"A","text":"Adsorption (on activated carbon or zeolites)","textZh":"吸附（在活性炭或沸石上）"},{"label":"B","text":"Absorption (scrubbing with solvents)","textZh":"吸收（用溶剂擦洗）"},{"label":"C","text":"Condensation (cryogenic or refrigerated)","textZh":"冷凝（低温或冷藏）"},{"label":"D","text":"Thermal or catalytic combustion/oxidation","textZh":"热或催化燃烧/氧化"},{"label":"E","text":"Biological oxidation (biofiltration)","textZh":"生物氧化（生物过滤）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Adsorption (on activated carbon or zeolites); Absorption (scrubbing with solvents); Condensation (cryogenic or refrigerated); Thermal or catalytic combustion/oxidation; Biological oxidation (biofiltration). For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"成熟的 VOC 控制末端技术包括：","explanationZh":"选择对应于以下内容的选项： 吸附（在活性炭或沸石上）；吸收（用溶剂擦洗）；冷凝（低温或冷藏）；热或催化燃烧/氧化；生物氧化（生物过滤）。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":118,"localNo":18,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In selecting a VOC control technology, key factors to consider include:","options":[{"label":"A","text":"Volumetric flow rate of the waste gas","textZh":"废气体积流量"},{"label":"B","text":"Concentration of VOCs in the gas stream","textZh":"气流中 VOC 浓度"},{"label":"C","text":"Chemical composition and properties of VOCs","textZh":"VOCs的化学成分和性质"},{"label":"D","text":"Potential for solvent/chemical recovery","textZh":"溶剂/化学品回收潜力"},{"label":"E","text":"Capital and operating costs","textZh":"资本和运营成本"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Volumetric flow rate of the waste gas; Concentration of VOCs in the gas stream; Chemical composition and properties of VOCs; Potential for solvent/chemical recovery; Capital and operating costs. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"在选择 VOC 控制技术时，需要考虑的关键因素包括：","explanationZh":"选择对应于以下内容的选项： 废气体积流量；气流中挥发性有机化合物的浓度； VOCs的化学成分和性质；溶剂/化学品回收潜力；资本和运营成本。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":119,"localNo":19,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The common features of both thermal incineration and catalytic combustion for VOC destruction include:","options":[{"label":"A","text":"Oxidation of VOCs to CO₂ and H₂O","textZh":"将 VOC 氧化为 CO2 和 H2O"},{"label":"B","text":"Requirement for auxiliary fuel (typically)","textZh":"辅助燃料的要求（通常）"},{"label":"C","text":"Generation of heat (exothermic)","textZh":"产生热量（放热）"},{"label":"D","text":"Use of a catalyst material","textZh":"催化剂材料的使用"},{"label":"E","text":"Suitable for high-concentration waste gases","textZh":"适用于高浓度废气"}],"answer":["A","C"],"explanation":"Select the choices that correspond to: Oxidation of VOCs to CO₂ and H₂O; Generation of heat (exothermic). For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"热力焚烧和催化燃烧破坏 VOC 的共同特点包括：","explanationZh":"选择对应于以下内容的选项： 将 VOC 氧化为 CO2 和 H2O；产生热量（放热）。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":120,"localNo":20,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Advantages of a Regenerative Thermal Oxidizer (RTO) include:","options":[{"label":"A","text":"High thermal recovery efficiency (>90%)","textZh":"热回收效率高（>90%）"},{"label":"B","text":"Low auxiliary fuel consumption","textZh":"辅助油耗低"},{"label":"C","text":"Suitable for large-volume, low-concentration gases","textZh":"适用于大流量、低浓度气体"},{"label":"D","text":"Simple equipment with low capital investment","textZh":"设备简单，资金投入少"},{"label":"E","text":"No secondary waste stream","textZh":"无二次废物流"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: High thermal recovery efficiency (>90%); Low auxiliary fuel consumption; Suitable for large-volume, low-concentration gases. For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"蓄热式热氧化器 (RTO) 的优点包括：","explanationZh":"选择对应于以下内容的选项： 高热回收效率 (>90%)；辅助油耗低；适用于大流量、低浓度气体。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":121,"localNo":21,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Desirable properties of an absorption solvent for VOC scrubbing include:","options":[{"label":"A","text":"High solubility for the target VOCs","textZh":"目标 VOC 的高溶解度"},{"label":"B","text":"Low vapor pressure (to minimize solvent loss)","textZh":"低蒸气压（以尽量减少溶剂损失）"},{"label":"C","text":"Chemical stability and non-reactivity with gas components","textZh":"化学稳定性好，不与气体成分发生反应"},{"label":"D","text":"Low cost and ready availability","textZh":"成本低且随时可用"},{"label":"E","text":"Non-toxic and non-corrosive","textZh":"无毒、无腐蚀"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: High solubility for the target VOCs; Low vapor pressure (to minimize solvent loss); Chemical stability and non-reactivity with gas components; Low cost and ready availability; Non-toxic and non-corrosive. A good absorbent should dissolve the target pollutant well, have low vapor pressure and viscosity, be chemically stable, safe, inexpensive, and selective. Chemical absorption can raise apparent solubility and rate, but it may consume reagent or create secondary wastes.","stemZh":"用于 VOC 洗涤的吸收溶剂的理想特性包括：","explanationZh":"选择对应于以下内容的选项： 目标 VOC 的溶解度高；低蒸气压（以尽量减少溶剂损失）；化学稳定性好，不与气体成分发生反应；成本低且随时可用；无毒、无腐蚀性。良好的吸收剂应能很好地溶解目标污染物，具有较低的蒸气压和粘度，化学稳定、安全、廉价且具有选择性。化学吸收可以提高表观溶解度和速率，但可能会消耗试剂或产生二次废物。"},{"id":122,"localNo":22,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Commonly used adsorbents for VOC control include:","options":[{"label":"A","text":"Activated carbon (granular or pelletized)","textZh":"活性炭（粒状或丸状）"},{"label":"B","text":"Zeolitic molecular sieves (hydrophobic)","textZh":"沸石分子筛（疏水）"},{"label":"C","text":"Activated alumina","textZh":"活性氧化铝"},{"label":"D","text":"Silica gel","textZh":"硅胶"},{"label":"E","text":"Polymeric adsorbents (resins)","textZh":"高分子吸附剂（树脂）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Activated carbon (granular or pelletized); Zeolitic molecular sieves (hydrophobic); Activated alumina; Silica gel; Polymeric adsorbents (resins). VOC adsorption uses porous solids such as activated carbon, zeolites, silica gel, alumina, or polymeric resins. Capacity depends on pore structure, surface chemistry, humidity, temperature, inlet concentration, and regeneration history.","stemZh":"用于 VOC 控制的常用吸附剂包括：","explanationZh":"选择对应于以下内容的选项： 活性炭（粒状或丸状）；沸石分子筛（疏水性）；活性氧化铝；硅胶;聚合物吸附剂（树脂）。 VOC 吸附使用多孔固体，例如活性炭、沸石、硅胶、氧化铝或聚合物树脂。容量取决于孔隙结构、表面化学、湿度、温度、入口浓度和再生历史。"},{"id":123,"localNo":23,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Key advantages of biofiltration for VOC control include:","options":[{"label":"A","text":"Simple operation and maintenance","textZh":"操作维护简单"},{"label":"B","text":"Low operating costs (energy and chemicals)","textZh":"运营成本低（能源和化学品）"},{"label":"C","text":"No secondary pollution (CO₂ and H₂O)","textZh":"无二次污染（CO2 和 H2O）"},{"label":"D","text":"Suitable for treating high-concentration gas streams","textZh":"适用于处理高浓度气流"},{"label":"E","text":"Small footprint requirement","textZh":"占地面积要求小"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Simple operation and maintenance; Low operating costs (energy and chemicals); No secondary pollution (CO₂ and H₂O). VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"生物过滤用于 VOC 控制的主要优势包括：","explanationZh":"选择对应于以下内容的选项： 操作和维护简单；运营成本低（能源和化学品）；无二次污染（CO2 和 H2O）。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":124,"localNo":24,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In combustion processes, the formation of thermal NOx is influenced by:","options":[{"label":"A","text":"Flame temperature","textZh":"火焰温度"},{"label":"B","text":"Oxygen concentration in the combustion zone","textZh":"燃烧区氧气浓度"},{"label":"C","text":"Residence time at high temperature","textZh":"高温停留时间"},{"label":"D","text":"Nitrogen content of the fuel","textZh":"燃料的氮含量"},{"label":"E","text":"Burner design and mixing pattern","textZh":"燃烧器设计和混合模式"}],"answer":["A","B","C","E"],"explanation":"Select the choices that correspond to: Flame temperature; Oxygen concentration in the combustion zone; Residence time at high temperature; Burner design and mixing pattern. Thermal NOx is governed mainly by high flame temperature, oxygen availability, and residence time at high temperature. Low-NOx methods such as staged combustion, flue gas recirculation, low excess air, steam or water injection, and burner redesign lower temperature peaks or oxygen exposure.","stemZh":"在燃烧过程中，热力 NOx 的形成受以下因素影响：","explanationZh":"选择对应于以下内容的选项： 火焰温度；燃烧区的氧气浓度；高温停留时间；燃烧器设计和混合模式。热力 NOx 主要受高火焰温度、氧气可用性和高温停留时间的影响。低氮氧化物排放方法，如分级燃烧、烟气再循环、低过量空气、蒸汽或水喷射，以及燃烧器重新设计，降低温度峰值或氧气暴露。"},{"id":125,"localNo":25,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Effective strategies to reduce SO₂ emissions from combustion include:","options":[{"label":"A","text":"Switching to low-sulfur fuels","textZh":"改用低硫燃料"},{"label":"B","text":"Flue gas desulfurization (FGD)","textZh":"烟气脱硫（FGD）"},{"label":"C","text":"In-furnace sorbent injection (e.g., limestone)","textZh":"炉内注入吸附剂（例如石灰石）"},{"label":"D","text":"Increasing combustion temperature","textZh":"提高燃烧温度"},{"label":"E","text":"Flue gas recirculation","textZh":"烟气再循环"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Switching to low-sulfur fuels; Flue gas desulfurization (FGD); In-furnace sorbent injection (e.g., limestone). Thermal NOx is governed mainly by high flame temperature, oxygen availability, and residence time at high temperature. Low-NOx methods such as staged combustion, flue gas recirculation, low excess air, steam or water injection, and burner redesign lower temperature peaks or oxygen exposure.","stemZh":"减少燃烧二氧化硫排放的有效策略包括：","explanationZh":"选择对应于以下内容的选项： 改用低硫燃料；烟气脱硫（FGD）；炉内注入吸附剂（例如石灰石）。热力 NOx 主要受高火焰温度、氧气可用性和高温停留时间的影响。低氮氧化物排放方法，如分级燃烧、烟气再循环、低过量空气、蒸汽或水喷射，以及燃烧器重新设计，降低温度峰值或氧气暴露。"},{"id":126,"localNo":26,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The settling velocity of a particle is determined by which of the following parameters?","options":[{"label":"A","text":"Particle density","textZh":"颗粒密度"},{"label":"B","text":"Particle diameter","textZh":"粒径"},{"label":"C","text":"Gas viscosity","textZh":"气体粘度"},{"label":"D","text":"Particle shape factor","textZh":"颗粒形状因子"},{"label":"E","text":"Gas density","textZh":"气体密度"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Particle density; Particle diameter; Gas viscosity; Particle shape factor; Gas density. In the Stokes regime, particle settling velocity is proportional to the square of particle diameter when other properties are constant. This is why coarse particles settle much faster than fine particles.","stemZh":"颗粒的沉降速度由以下哪个参数决定？","explanationZh":"选择对应于以下内容的选项： 粒子密度；粒径；气体粘度；颗粒形状因子；气体密度。在斯托克斯状态下，当其他属性不变时，颗粒沉降速度与颗粒直径的平方成正比。这就是粗颗粒比细颗粒沉降快得多的原因。"},{"id":127,"localNo":27,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Particle size distributions can be represented on which of the following bases?","options":[{"label":"A","text":"Number basis","textZh":"数量基础"},{"label":"B","text":"Length basis","textZh":"长度基础"},{"label":"C","text":"Surface area basis","textZh":"表面积基础"},{"label":"D","text":"Mass basis","textZh":"质量基础"},{"label":"E","text":"Volume basis","textZh":"体积基础"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Number basis; Length basis; Surface area basis; Mass basis; Volume basis. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"粒度分布可以用下列哪一个基础来表示？","explanationZh":"选择对应于以下内容的选项： 数字基础；长度基础；表面积基础；质量基础；体积基础。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":128,"localNo":28,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Common mathematical functions used to describe particle size distributions include:","options":[{"label":"A","text":"Normal (Gaussian) distribution","textZh":"正态（高斯）分布"},{"label":"B","text":"Log-normal distribution","textZh":"对数正态分布"},{"label":"C","text":"Rosin-Rammler distribution","textZh":"罗辛-拉姆勒分布"},{"label":"D","text":"Exponential distribution","textZh":"指数分布"},{"label":"E","text":"Poisson distribution","textZh":"泊松分布"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Normal (Gaussian) distribution; Log-normal distribution; Rosin-Rammler distribution. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"用于描述粒度分布的常见数学函数包括：","explanationZh":"选择对应于以下内容的选项： 正态（高斯）分布；对数正态分布；罗辛-拉姆勒分布。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":129,"localNo":29,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Key performance parameters for a cyclone separator include:","options":[{"label":"A","text":"Cut diameter (d50)","textZh":"切割直径（d50）"},{"label":"B","text":"Overall collection efficiency (by mass)","textZh":"总体收集效率（按质量计）"},{"label":"C","text":"Pressure drop across the device","textZh":"整个装置的压降"},{"label":"D","text":"Gas handling capacity (volumetric flow rate)","textZh":"气体处理能力（体积流量）"},{"label":"E","text":"Physical dimensions (diameter, height)","textZh":"物理尺寸（直径、高度）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Cut diameter (d50); Overall collection efficiency (by mass); Pressure drop across the device; Gas handling capacity (volumetric flow rate); Physical dimensions (diameter, height). A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"旋风分离器的关键性能参数包括：","explanationZh":"选择对应于以下内容的选项： 切割直径 (d50)；总体收集效率（按质量计）；整个装置的压降；气体处理能力（体积流量）；物理尺寸（直径、高度）。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":130,"localNo":30,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The main components of an electrostatic precipitator (ESP) include:","options":[{"label":"A","text":"Discharge (corona) electrodes","textZh":"放电（电晕）电极"},{"label":"B","text":"Collection (collecting) plates/electrodes","textZh":"收集（收集）板/电极"},{"label":"C","text":"High-voltage power supply","textZh":"高压电源"},{"label":"D","text":"Rapping or cleaning mechanism","textZh":"振打或清洁机构"},{"label":"E","text":"Gas distribution baffles and casing","textZh":"气体分配挡板和外​​壳"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Discharge (corona) electrodes; Collection (collecting) plates/electrodes; High-voltage power supply; Rapping or cleaning mechanism; Gas distribution baffles and casing. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"静电除尘器 (ESP) 的主要组件包括：","explanationZh":"选择对应于以下内容的选项： 放电（电晕）电极；收集（收集）板/电极；高压电源；振打或清扫机构；气体分配挡板和外​​壳。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":131,"localNo":31,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The performance of an electrostatic precipitator is affected by:","options":[{"label":"A","text":"Dust resistivity","textZh":"灰尘电阻率"},{"label":"B","text":"Gas temperature","textZh":"气体温度"},{"label":"C","text":"Gas humidity","textZh":"气体湿度"},{"label":"D","text":"Electric field strength","textZh":"电场强度"},{"label":"E","text":"Gas flow distribution across the plates","textZh":"板片上的气流分布"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Dust resistivity; Gas temperature; Gas humidity; Electric field strength; Gas flow distribution across the plates. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"静电除尘器的性能受以下因素影响：","explanationZh":"选择对应于以下内容的选项： 灰尘电阻率；气体温度；气体湿度；电场强度；穿过板的气流分布。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":132,"localNo":32,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Common cleaning methods for fabric filters (baghouses) include:","options":[{"label":"A","text":"Mechanical shaker/vibration","textZh":"机械摇床/振动"},{"label":"B","text":"Reverse-air (reverse-flow) cleaning","textZh":"逆风（逆流）清洗"},{"label":"C","text":"Pulse-jet cleaning","textZh":"脉冲喷射清洗"},{"label":"D","text":"Sonic cleaning","textZh":"声波清洗"},{"label":"E","text":"Water washing (in situ)","textZh":"水洗（原位）"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Mechanical shaker/vibration; Reverse-air (reverse-flow) cleaning; Pulse-jet cleaning. Fabric filters collect particles by sieving through the dust cake plus mechanisms such as inertial impaction, interception, and Brownian diffusion. For submicron particles, Brownian diffusion becomes especially important.","stemZh":"织物过滤器（袋式除尘器）的常见清洁方法包括：","explanationZh":"选择对应于以下内容的选项：机械摇床/振动；逆风（逆流）清洗；脉冲喷射清洁。织物过滤器通过筛分尘饼以及惯性冲击、拦截和布朗扩散等机制来收集颗粒。对于亚微米颗粒，布朗扩散变得尤其重要。"},{"id":133,"localNo":33,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The particle collection mechanisms in a fabric filter include:","options":[{"label":"A","text":"Inertial impaction","textZh":"惯性撞击"},{"label":"B","text":"Direct interception","textZh":"直接拦截"},{"label":"C","text":"Brownian diffusion","textZh":"布朗扩散"},{"label":"D","text":"Gravitational settling","textZh":"重力沉降"},{"label":"E","text":"Electrostatic attraction","textZh":"静电吸引"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Inertial impaction; Direct interception; Brownian diffusion; Gravitational settling; Electrostatic attraction. Fabric filters collect particles by sieving through the dust cake plus mechanisms such as inertial impaction, interception, and Brownian diffusion. For submicron particles, Brownian diffusion becomes especially important.","stemZh":"织物过滤器中的颗粒收集机制包括：","explanationZh":"选择对应于以下内容的选项： 惯性冲击；直接拦截；布朗扩散；重力沉降；静电吸引。织物过滤器通过筛分尘饼以及惯性冲击、拦截和布朗扩散等机制来收集颗粒。对于亚微米颗粒，布朗扩散变得尤其重要。"},{"id":134,"localNo":34,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Types of wet scrubbers used for particulate control include:","options":[{"label":"A","text":"Spray tower","textZh":"喷淋塔"},{"label":"B","text":"Venturi scrubber","textZh":"文丘里洗涤器"},{"label":"C","text":"Cyclonic scrubber","textZh":"旋风洗涤器"},{"label":"D","text":"Packed-bed scrubber","textZh":"填充床洗涤塔"},{"label":"E","text":"Wet electrostatic precipitator","textZh":"湿式静电除尘器"}],"answer":["A","B","C","D"],"explanation":"Select the choices that correspond to: Spray tower; Venturi scrubber; Cyclonic scrubber; Packed-bed scrubber. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"用于颗粒物控制的湿式洗涤器类型包括：","explanationZh":"选择对应于的选项： 喷雾塔；文丘里洗涤器；旋风洗涤器；填充床洗涤器。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":135,"localNo":35,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Advantages of Venturi scrubbers for particulate control include:","options":[{"label":"A","text":"High removal efficiency for fine particles","textZh":"对细颗粒的去除效率高"},{"label":"B","text":"Simultaneous removal of gaseous pollutants","textZh":"同时去除气态污染物"},{"label":"C","text":"Compact design with high gas handling capacity","textZh":"设计紧凑，气体处理能力高"},{"label":"D","text":"Low energy consumption","textZh":"能耗低"},{"label":"E","text":"Resistance to fouling and clogging","textZh":"抗污垢和堵塞"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: High removal efficiency for fine particles; Simultaneous removal of gaseous pollutants; Compact design with high gas handling capacity. A Venturi scrubber accelerates gas through a throat, atomizes liquid into fine droplets, and captures particles mainly by inertial impaction between particles and droplets. Better capture usually requires smaller droplets, higher gas velocity, and higher pressure drop.","stemZh":"文丘里洗涤器用于颗粒物控制的优点包括：","explanationZh":"选择对应于以下内容的选项： 细颗粒去除效率高；同时去除气态污染物；设计紧凑，气体处理能力高。文丘里洗涤器通过喉部加速气体，将液体雾化成细小的液滴，并主要通过颗粒和液滴之间的惯性撞击来捕获颗粒。更好的捕获通常需要更小的液滴、更高的气速和更高的压降。"},{"id":136,"localNo":36,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"When selecting a particulate collector, important considerations include:","options":[{"label":"A","text":"Particle size distribution and properties","textZh":"粒度分布和特性"},{"label":"B","text":"Gas characteristics (temperature, humidity, corrosivity)","textZh":"气体特性（温度、湿度、腐蚀性）"},{"label":"C","text":"Required emission limit (regulatory standard)","textZh":"所需排放限值（监管标准）"},{"label":"D","text":"Capital and operating cost budgets","textZh":"资本和运营成本预算"},{"label":"E","text":"Available space and layout constraints","textZh":"可用空间和布局限制"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Particle size distribution and properties; Gas characteristics (temperature, humidity, corrosivity); Required emission limit (regulatory standard); Capital and operating cost budgets; Available space and layout constraints. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"选择颗粒收集器时，重要的考虑因素包括：","explanationZh":"选择对应于以下内容的选项：粒度分布和属性；气体特性（温度、湿度、腐蚀性）；规定的排放限值（监管标准）；资本和运营成本预算；可用空间和布局限制。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":137,"localNo":37,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"To apply the Gaussian plume model for ground-level concentration prediction, the required input parameters include:","options":[{"label":"A","text":"Source emission rate (Q)","textZh":"源排放率（Q）"},{"label":"B","text":"Mean wind speed (u)","textZh":"平均风速 (u)"},{"label":"C","text":"Dispersion coefficients (σy, σz)","textZh":"色散系数（σy、σz）"},{"label":"D","text":"Effective stack height (He)","textZh":"有效堆叠高度 (He)"},{"label":"E","text":"Downwind distance (x) and crosswind distance (y)","textZh":"顺风距离 (x) 和侧风距离 (y)"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Source emission rate (Q); Mean wind speed (u); Dispersion coefficients (σy, σz); Effective stack height (He); Downwind distance (x) and crosswind distance (y). The basic Gaussian plume model is a steady-state, continuous-source model. It assumes constant mean wind in the downwind direction, Gaussian spreading in the lateral and vertical directions, no chemical transformation for the basic form, and reflection at the ground for non-depositing pollutants.","stemZh":"为了应用高斯羽流模型进行地面浓度预测，所需的输入参数包括：","explanationZh":"选择对应于以下内容的选项： 源排放率 (Q)；平均风速（u）；色散系数（σy，σz）；有效堆叠高度（He）；顺风距离 (x) 和侧风距离 (y)。基本高斯羽流模型是稳态、连续源模型。假设顺风方向平均风恒定，横向和垂直方向呈高斯分布，基本形态无化学变化，非沉积污染物在地面反射。"},{"id":138,"localNo":38,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Major types of atmospheric temperature inversions include:","options":[{"label":"A","text":"Radiation inversion (nocturnal)","textZh":"辐射逆温（夜间）"},{"label":"B","text":"Subsidence inversion (synoptic scale)","textZh":"沉降反演（天气尺度）"},{"label":"C","text":"Advection inversion","textZh":"平流逆温"},{"label":"D","text":"Turbulence inversion","textZh":"湍流反演"},{"label":"E","text":"Frontal inversion (warm front)","textZh":"锋面逆温（暖锋）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Radiation inversion (nocturnal); Subsidence inversion (synoptic scale); Advection inversion; Turbulence inversion; Frontal inversion (warm front). Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"大气逆温的主要类型包括：","explanationZh":"选择对应于以下内容的选项： 辐射逆温（夜间）；沉降反演（天气尺度）；平流逆温；湍流反演；锋面反转（暖锋）。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":139,"localNo":39,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Temperature inversions affect atmospheric pollutant dispersion by:","options":[{"label":"A","text":"Suppressing vertical turbulent mixing","textZh":"抑制垂直湍流混合"},{"label":"B","text":"Causing pollutant accumulation near the ground","textZh":"造成污染物在地面附近积累"},{"label":"C","text":"Potentially leading to fumigation events","textZh":"可能导致熏蒸事件"},{"label":"D","text":"Producing fan-shaped plume behavior","textZh":"产生扇形羽流行为"},{"label":"E","text":"Favoring long-range transport of pollutants","textZh":"有利于污染物的长距离迁移"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Suppressing vertical turbulent mixing; Causing pollutant accumulation near the ground; Potentially leading to fumigation events; Producing fan-shaped plume behavior; Favoring long-range transport of pollutants. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"逆温通过以下方式影响大气污染物的扩散：","explanationZh":"选择对应于以下内容的选项：抑制垂直湍流混合；造成污染物在近地面积累；可能导致熏蒸事件；产生扇形羽流行为；有利于污染物的远距离输送。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":140,"localNo":40,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The Holland plume rise formula (and similar formulations) accounts for:","options":[{"label":"A","text":"Stack gas exit velocity (Vs)","textZh":"烟囱气体出口速度 (Vs)"},{"label":"B","text":"Stack inside diameter (D)","textZh":"叠层内径 (D)"},{"label":"C","text":"Temperature difference (Ts − Ta)","textZh":"温差（Ts – Ta）"},{"label":"D","text":"Ambient wind speed (u)","textZh":"环境风速（u）"},{"label":"E","text":"Atmospheric pressure (P)","textZh":"大气压（P）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Stack gas exit velocity (Vs); Stack inside diameter (D); Temperature difference (Ts − Ta); Ambient wind speed (u); Atmospheric pressure (P). Effective stack height is the physical stack height plus plume rise. Plume rise is controlled by exit momentum, buoyancy from hot stack gas, stack diameter, and ambient wind; higher stacks generally reduce nearby ground concentration but the word 'always' is unsafe because meteorology and terrain also matter.","stemZh":"荷兰羽流上升公式（和类似公式）考虑了：","explanationZh":"选择对应于以下内容的选项： 烟道气体出口速度 (Vs)；叠层内径（D）；温差（Ts-Ta）；环境风速（u）；大气压 (P)。有效堆叠高度是物理堆叠高度加上羽流上升。羽流上升由出口动量、热烟囱气体的浮力、烟囱直径和环境风控制；较高的烟囱通常会减少附近地面的浓度，但“总是”这个词并不安全，因为气象和地形也很重要。"},{"id":141,"localNo":41,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In fixed-bed adsorption operations, the adsorbent replacement cycle depends on:","options":[{"label":"A","text":"Dynamic adsorption capacity at operating conditions","textZh":"操作条件下的动态吸附能力"},{"label":"B","text":"Gas flow rate through the bed","textZh":"通过床层的气体流量"},{"label":"C","text":"Inlet concentration of the adsorbate","textZh":"吸附物的入口浓度"},{"label":"D","text":"Maximum allowable outlet concentration","textZh":"最大允许出口浓度"},{"label":"E","text":"Height of the adsorbent bed","textZh":"吸附床高度"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Dynamic adsorption capacity at operating conditions; Gas flow rate through the bed; Inlet concentration of the adsorbate; Maximum allowable outlet concentration; Height of the adsorbent bed. In a fixed-bed adsorber, the breakthrough curve tracks the movement and spreading of the mass-transfer zone. Dynamic capacity is lower than equilibrium static capacity because the bed must be replaced or regenerated before the outlet concentration exceeds the allowable limit.","stemZh":"在固定床吸附操作中，吸附剂更换周期取决于：","explanationZh":"选择对应于以下内容的选项： 操作条件下的动态吸附容量；通过床层的气体流量；吸附物的入口浓度；最大允许出口浓度；吸附剂床的高度。在固定床吸附器中，突破曲线跟踪传质区的移动和扩展。动态容量低于平衡静态容量，因为在出​​口浓度超过允许限度之前必须更换或再生床。"},{"id":142,"localNo":42,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Chemical reactions in absorption processes can:","options":[{"label":"A","text":"Increase the overall absorption rate","textZh":"提高整体吸收率"},{"label":"B","text":"Increase the equilibrium solubility of the solute","textZh":"增加溶质的平衡溶解度"},{"label":"C","text":"Reduce the liquid-film mass transfer resistance","textZh":"降低液膜传质阻力"},{"label":"D","text":"Consume additional absorbent (reagent)","textZh":"消耗额外的吸收剂（试剂）"},{"label":"E","text":"Potentially form secondary pollutants or precipitates","textZh":"可能形成二次污染物或沉淀物"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Increase the overall absorption rate; Increase the equilibrium solubility of the solute; Reduce the liquid-film mass transfer resistance; Consume additional absorbent (reagent); Potentially form secondary pollutants or precipitates. External diffusion control means the slow step is transport through the gas film around the particle or packing surface. Increasing gas velocity thins the boundary layer and raises the mass-transfer coefficient, so it helps much more than simply increasing intrinsic catalyst activity.","stemZh":"吸收过程中的化学反应可以：","explanationZh":"选择对应于以下内容的选项： 增加总体吸收率；增加溶质的平衡溶解度；降低液膜传质阻力；消耗额外的吸收剂（试剂）；可能形成二次污染物或沉淀物。外部扩散控制意味着缓慢的步骤是通过颗粒或填料表面周围的气膜传输。增加气体速度可以使边界层变薄并提高传质系数，因此它比简单地增加催化剂的内在活性更有帮助。"},{"id":143,"localNo":43,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Refrigeration methods for VOC condensation recovery include:","options":[{"label":"A","text":"Mechanical vapor-compression refrigeration","textZh":"机械蒸汽压缩制冷"},{"label":"B","text":"Liquid nitrogen cryogenic cooling","textZh":"液氮低温冷却"},{"label":"C","text":"Cooling water (indirect)","textZh":"冷却水（间接）"},{"label":"D","text":"Air cooling (fans)","textZh":"空气冷却（风扇）"},{"label":"E","text":"Absorption refrigeration cycles","textZh":"吸收式制冷循环"}],"answer":["A","B"],"explanation":"Select the choices that correspond to: Mechanical vapor-compression refrigeration; Liquid nitrogen cryogenic cooling. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"VOC冷凝回收的制冷方法包括：","explanationZh":"选择对应于以下内容的选项：机械蒸汽压缩制冷；液氮低温冷却。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":144,"localNo":44,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Low-NOx combustion technologies include:","options":[{"label":"A","text":"Staged combustion (air/fuel staging)","textZh":"分级燃烧（空气/燃料分级）"},{"label":"B","text":"Flue gas recirculation (FGR)","textZh":"烟气再循环（FGR）"},{"label":"C","text":"Low excess air operation","textZh":"低过量空气运行"},{"label":"D","text":"Water or steam injection","textZh":"注水或蒸汽"},{"label":"E","text":"Burner modification (low-NOx burners)","textZh":"燃烧器改造（低氮氧化物燃烧器）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Staged combustion (air/fuel staging)
