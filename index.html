<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大气污染控制工程刷题轻应用</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f8;
      --panel: #ffffff;
      --panel-2: #eef3f2;
      --text: #17201f;
      --muted: #64716e;
      --line: #d9e2df;
      --accent: #147d73;
      --accent-2: #c24b35;
      --good: #17804d;
      --bad: #b5332c;
      --warn: #9a6900;
      --shadow: 0 18px 48px rgba(24, 39, 36, .13);
      --radius: 8px;
    }
    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #111514;
      --panel: #1b211f;
      --panel-2: #242c29;
      --text: #eef5f2;
      --muted: #9eaaa6;
      --line: #33403c;
      --accent: #43c4b5;
      --accent-2: #ef876d;
      --good: #59d08f;
      --bad: #ff8b80;
      --warn: #ffd166;
      --shadow: 0 18px 48px rgba(0, 0, 0, .32);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }
    button, input, select { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 38px;
      border-radius: var(--radius);
      padding: 0 12px;
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }
    button:hover { border-color: var(--accent); }
    button:active { transform: translateY(1px); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.icon { width: 40px; padding: 0; display: inline-grid; place-items: center; }
    button[disabled] { opacity: .45; cursor: not-allowed; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--bg);
      color: var(--text);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }
    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 18px;
    }
    .brand { display: flex; flex-direction: column; gap: 2px; min-width: 220px; }
    .brand strong { font-size: 17px; line-height: 1.2; }
    .brand span { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 48vw; }
    .actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .translate-btn {
      min-width: 136px;
      user-select: none;
      touch-action: none;
      font-weight: 700;
    }
    .translate-btn.active { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
    main {
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
    }
    .sidebar, .question-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .sidebar { align-self: start; position: sticky; top: 82px; overflow: hidden; }
    .side-section { padding: 14px; border-bottom: 1px solid var(--line); }
    .side-section:last-child { border-bottom: 0; }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .stat {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
    }
    .stat span { display: block; color: var(--muted); font-size: 12px; }
    .stat strong { display: block; margin-top: 4px; font-size: 22px; line-height: 1; }
    .filters { display: grid; gap: 8px; }
    select, input[type="search"] {
      width: 100%;
      min-height: 38px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 0 10px;
    }
    .jump-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      max-height: 350px;
      overflow: auto;
      padding-right: 2px;
    }
    .jump {
      min-width: 0;
      height: 34px;
      padding: 0;
      font-size: 12px;
      background: var(--panel-2);
    }
    .jump.current { outline: 2px solid var(--accent); }
    .jump.done { border-color: var(--good); color: var(--good); }
    .jump.wrong { border-color: var(--bad); color: var(--bad); }
    .question-panel { min-height: 620px; overflow: hidden; display: grid; grid-template-rows: auto 1fr auto; }
    .question-head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .badges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 9px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .badge.accent { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
    .progress {
      height: 8px;
      background: var(--panel-2);
      border-top: 1px solid var(--line);
    }
    .progress > div { height: 100%; width: 0; background: var(--accent); transition: width .22s ease; }
    .question-body { padding: 24px; }
    .stem {
      font-size: clamp(22px, 2.2vw, 31px);
      line-height: 1.3;
      font-weight: 760;
      margin: 0 0 20px;
    }
    .options { display: grid; gap: 10px; }
    .option {
      width: 100%;
      min-height: 56px;
      display: grid;
      grid-template-columns: 36px 1fr;
      align-items: center;
      gap: 10px;
      text-align: left;
      padding: 10px 13px;
      border-radius: var(--radius);
      background: var(--panel);
    }
    .option .letter {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: var(--panel-2);
      border: 1px solid var(--line);
      font-weight: 800;
    }
    .option.selected { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 9%, var(--panel)); }
    .option.correct { border-color: var(--good); background: color-mix(in srgb, var(--good) 13%, var(--panel)); }
    .option.incorrect { border-color: var(--bad); background: color-mix(in srgb, var(--bad) 12%, var(--panel)); }
    .tf-options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .result {
      margin-top: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 16px;
      display: none;
    }
    .result.show { display: block; }
    .result h2 { margin: 0 0 8px; font-size: 18px; }
    .result p { margin: 8px 0 0; color: var(--muted); line-height: 1.6; }
    .result.good h2 { color: var(--good); }
    .result.bad h2 { color: var(--bad); }
    .answer-line { font-weight: 760; color: var(--text); }
    .footer {
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .navset { display: flex; gap: 8px; flex-wrap: wrap; }
    .hint { color: var(--muted); font-size: 12px; }
    .empty {
      padding: 40px 18px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 900px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
      main { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .question-panel { min-height: auto; }
    }
    @media (max-width: 560px) {
      .topbar, main { padding-left: 12px; padding-right: 12px; }
      .brand strong { font-size: 15px; }
      .brand span { max-width: 92vw; }
      .translate-btn { min-width: 122px; }
      .question-head { align-items: flex-start; flex-direction: column; }
      .question-body { padding: 18px; }
      .stem { font-size: 21px; }
      .tf-options { grid-template-columns: 1fr; }
      .jump-grid { grid-template-columns: repeat(6, 1fr); max-height: 210px; }
    }
  </style>
</head>
<body>
  <div class="app" data-theme="light">
    <header>
      <div class="topbar">
        <div class="brand">
          <strong>大气污染控制工程刷题轻应用</strong>
          <span>来源：2026大气污染控制工程课程参考题库(1).docx · 共 300 题 · 本地离线可用</span>
        </div>
        <div class="actions">
          <button id="practiceModeBtn" title="切换顺序、倒序、乱序刷题">顺序</button>
          <button id="shuffleOptionsBtn" title="重新打乱全部题目的选项顺序">打乱选项</button>
          <button id="translateBtn" class="translate-btn" title="按住显示中文，松开恢复英文">按住翻译</button>
          <button id="themeBtn" class="icon" title="切换黑色/白色模式" aria-label="切换黑色/白色模式">◐</button>
          <button id="resetBtn" title="清空本地做题记录">重置</button>
        </div>
      </div>
    </header>
    <main>
      <aside class="sidebar">
        <section class="side-section">
          <div class="stats">
            <div class="stat"><span>已做</span><strong id="doneCount">0</strong></div>
            <div class="stat"><span>正确</span><strong id="rightCount">0</strong></div>
            <div class="stat"><span>错题</span><strong id="wrongCount">0</strong></div>
            <div class="stat"><span>正确率</span><strong id="accuracy">0%</strong></div>
          </div>
        </section>
        <section class="side-section">
          <div class="filters">
            <select id="partFilter" aria-label="题型筛选">
              <option value="all">全部题型</option>
              <option value="single">单选题</option>
              <option value="multiple">多选题</option>
              <option value="truefalse">判断题</option>
            </select>
            <select id="statusFilter" aria-label="状态筛选">
              <option value="all">全部状态</option>
              <option value="undone">未做</option>
              <option value="wrong">只看错题</option>
              <option value="right">只看正确</option>
            </select>
            <input id="searchBox" type="search" placeholder="搜索题干或选项">
          </div>
        </section>
        <section class="side-section">
          <div id="jumpGrid" class="jump-grid"></div>
        </section>
      </aside>
      <section class="question-panel">
        <div>
          <div class="question-head">
            <div class="badges">
              <span id="partBadge" class="badge accent"></span>
              <span id="noBadge" class="badge"></span>
              <span id="modeBadge" class="badge"></span>
            </div>
            <span id="filterInfo" class="hint"></span>
          </div>
          <div class="progress"><div id="progressBar"></div></div>
        </div>
        <div id="questionBody" class="question-body"></div>
        <div class="footer">
          <div class="navset">
            <button id="prevBtn">上一题</button>
            <button id="nextBtn" class="primary">下一题</button>
            <button id="submitBtn">提交答案</button>
          </div>
          <span class="hint">多选题可点多个选项；提交后显示英文解析，按住翻译键显示中文。</span>
        </div>
      </section>
    </main>
  </div>
  <script>
    const QUESTIONS = [{"id":1,"localNo":1,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In the Gaussian plume model, which direction's wind velocity is assumed constant?","options":[{"label":"A","text":"x-direction","textZh":"x 方向"},{"label":"B","text":"y-direction","textZh":"y 方向"},{"label":"C","text":"z-direction","textZh":"z 方向"},{"label":"D","text":"All directions","textZh":"八方"}],"answer":["A"],"explanation":"The answer is x-direction. The basic Gaussian plume model is a steady-state, continuous-source model. It assumes constant mean wind in the downwind direction, Gaussian spreading in the lateral and vertical directions, no chemical transformation for the basic form, and reflection at the ground for non-depositing pollutants.","stemZh":"在高斯羽流模型中，假设哪个方向的风速恒定？","explanationZh":"答案是x方向。基本高斯羽流模型是稳态、连续源模型。假设顺风方向平均风恒定，横向和垂直方向呈高斯分布，基本形态无化学变化，非沉积污染物在地面反射。"},{"id":2,"localNo":2,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"According to Pasquill-Gifford stability classification, which class represents the most unstable atmospheric condition?","options":[{"label":"A","text":"Class A","textZh":"A级"},{"label":"B","text":"Class C","textZh":"C级"},{"label":"C","text":"Class E","textZh":"E级"},{"label":"D","text":"Class F","textZh":"F级"}],"answer":["A"],"explanation":"The answer is Class A. Pasquill-Gifford stability class describes turbulent mixing. Class A is very unstable with strong vertical mixing, while Class F is stable with weak mixing. The class is estimated from routine observations such as wind speed, solar radiation or cloud cover, and day/night conditions.","stemZh":"根据 Pasquill-Gifford 稳定性分类，哪一类代表最不稳定的大气条件？","explanationZh":"答案是 A 级。Pasquill-Gifford 稳定性等级描述了湍流混合。 A类在强烈的垂直混合下非常不稳定，而F类在弱混合下很稳定。该等级是根据风速、太阳辐射或云量以及白天/夜间条件等常规观测来估计的。"},{"id":3,"localNo":3,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In the Gaussian plume equation, the ground-level centerline concentration as a function of downwind distance typically exhibits what behavior?","options":[{"label":"A","text":"Monotonically decreases","textZh":"单调递减"},{"label":"B","text":"Monotonically increases","textZh":"单调增加"},{"label":"C","text":"Increases then decreases (has a maximum)","textZh":"先增加后减少（有最大值）"},{"label":"D","text":"Remains constant","textZh":"保持不变"}],"answer":["C"],"explanation":"The answer is Increases then decreases (has a maximum). The basic Gaussian plume model is a steady-state, continuous-source model. It assumes constant mean wind in the downwind direction, Gaussian spreading in the lateral and vertical directions, no chemical transformation for the basic form, and reflection at the ground for non-depositing pollutants.","stemZh":"在高斯羽流方程中，地面中心线浓度作为顺风距离的函数通常表现出什么行为？","explanationZh":"答案是先增加然后减少（有一个最大值）。基本高斯羽流模型是稳态、连续源模型。假设顺风方向平均风恒定，横向和垂直方向呈高斯分布，基本形态无化学变化，非沉积污染物在地面反射。"},{"id":4,"localNo":4,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which type of gas is Henry's law most suitable for describing absorption equilibrium?","options":[{"label":"A","text":"Highly soluble gases","textZh":"高溶解性气体"},{"label":"B","text":"Slightly soluble gases","textZh":"微溶气体"},{"label":"C","text":"All gases regardless of solubility","textZh":"所有气体，无论溶解度如何"},{"label":"D","text":"Gases that chemically react with the solvent","textZh":"与溶剂发生化学反应的气体"}],"answer":["B"],"explanation":"The answer is Slightly soluble gases. Henry's law is most useful for dilute, slightly soluble gases where gas-liquid equilibrium is approximately linear. It links gas-phase partial pressure with dissolved concentration and is the basis for judging absorption driving force.","stemZh":"亨利定律最适合描述哪种气体的吸收平衡？","explanationZh":"答案是微溶气体。亨利定律对于气液平衡近似线性的稀释的微溶气体最有用。它将气相分压与溶解浓度联系起来，是判断吸收驱动力的基础。"},{"id":5,"localNo":5,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"To increase the mass transfer driving force in an absorption column, which operational parameter should be increased?","options":[{"label":"A","text":"Gas flow rate","textZh":"气体流量"},{"label":"B","text":"Liquid-to-gas ratio (L/G)","textZh":"液气比 (L/G)"},{"label":"C","text":"Column diameter","textZh":"柱径"},{"label":"D","text":"Operating temperature","textZh":"工作温度"}],"answer":["B"],"explanation":"The answer is Liquid-to-gas ratio (L/G). Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter.","stemZh":"为了增加吸收塔中的传质驱动力，应该增加哪些操作参数？","explanationZh":"答案是液气比（L/G）。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。"},{"id":6,"localNo":6,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"For a gas-solid catalytic reaction, when internal diffusion is the rate-controlling step, the apparent reaction order typically tends toward:","options":[{"label":"A","text":"First order (n=1)","textZh":"一阶 (n=1)"},{"label":"B","text":"Zero order (n=0)","textZh":"零阶 (n=0)"},{"label":"C","text":"Half order (n=0.5) or first order (n=1)","textZh":"半阶 (n=0.5) 或一阶 (n=1)"},{"label":"D","text":"Second order (n=2)","textZh":"二阶 (n=2)"}],"answer":["C"],"explanation":"The answer is Half order (n=0.5) or first order (n=1). When internal pore diffusion controls a gas-solid catalytic reaction, the observed rate is no longer just the intrinsic surface reaction rate. Concentration drops inside the catalyst particle, so the apparent kinetics become weaker than the intrinsic kinetics and the effectiveness factor is governed by the Thiele modulus.","stemZh":"对于气固催化反应，当内部扩散是速率控制步骤时，表观反应级数通常倾向于：","explanationZh":"答案是半阶 (n=0.5) 或一阶 (n=1)。当内部孔扩散控制气固催化反应时，观察到的速率不再仅仅是固有的表面反应速率。催化剂颗粒内部的浓度下降，因此表观动力学变得弱于内在动力学，并且有效性因子由蒂勒模量控制。"},{"id":7,"localNo":7,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which adsorption isotherm equation is most commonly used to describe monolayer adsorption?","options":[{"label":"A","text":"Freundlich equation","textZh":"弗罗因德利希方程"},{"label":"B","text":"Langmuir equation","textZh":"朗缪尔方程"},{"label":"C","text":"BET equation","textZh":"BET方程"},{"label":"D","text":"Henry's equation","textZh":"亨利方程"}],"answer":["B"],"explanation":"The answer is Langmuir equation. Henry's law is most useful for dilute, slightly soluble gases where gas-liquid equilibrium is approximately linear. It links gas-phase partial pressure with dissolved concentration and is the basis for judging absorption driving force.","stemZh":"哪个吸附等温方程最常用于描述单层吸附？","explanationZh":"答案是朗缪尔方程。亨利定律对于气液平衡近似线性的稀释的微溶气体最有用。它将气相分压与溶解浓度联系起来，是判断吸收驱动力的基础。"},{"id":8,"localNo":8,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The primary application of the BET equation in adsorption studies is:","options":[{"label":"A","text":"Calculating heat of adsorption","textZh":"计算吸附热"},{"label":"B","text":"Determining specific surface area of adsorbents","textZh":"测定吸附剂的比表面积"},{"label":"C","text":"Distinguishing between physical and chemical adsorption","textZh":"物理吸附和化学吸附的区别"},{"label":"D","text":"Calculating adsorption rate constants","textZh":"计算吸附速率常数"}],"answer":["B"],"explanation":"The answer is Determining specific surface area of adsorbents. The BET equation extends adsorption theory to multilayer physical adsorption. Its common engineering use is measuring adsorbent specific surface area from gas adsorption data.","stemZh":"BET 方程在吸附研究中的主要应用是：","explanationZh":"答案是确定吸附剂的比表面积。 BET 方程将吸附理论扩展到多层物理吸附。其常见的工程用途是根据气体吸附数据测量吸附剂比表面积。"},{"id":9,"localNo":9,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In combustion processes, the formation of thermal NOx is primarily determined by:","options":[{"label":"A","text":"Nitrogen content in fuel","textZh":"燃料中的氮含量"},{"label":"B","text":"Flame temperature","textZh":"火焰温度"},{"label":"C","text":"Excess air ratio","textZh":"空气过剩率"},{"label":"D","text":"Sulfur content in fuel","textZh":"燃料中的硫含量"}],"answer":["B"],"explanation":"The answer is Flame temperature. Thermal NOx is governed mainly by high flame temperature, oxygen availability, and residence time at high temperature. Low-NOx methods such as staged combustion, flue gas recirculation, low excess air, steam or water injection, and burner redesign lower temperature peaks or oxygen exposure.","stemZh":"在燃烧过程中，热力 NOx 的形成主要由以下因素决定：","explanationZh":"答案是火焰温度。热力 NOx 主要受高火焰温度、氧气可用性和高温停留时间的影响。低氮氧化物排放方法，如分级燃烧、烟气再循环、低过量空气、蒸汽或水喷射，以及燃烧器重新设计，降低温度峰值或氧气暴露。"},{"id":10,"localNo":10,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which meteorological condition is most unfavorable for pollutant dispersion?","options":[{"label":"A","text":"Temperature inversion","textZh":"逆温"},{"label":"B","text":"Neutral lapse rate","textZh":"中性失效率"},{"label":"C","text":"Unstable lapse rate","textZh":"失效率不稳定"},{"label":"D","text":"Strong convection","textZh":"强对流"}],"answer":["A"],"explanation":"The answer is Temperature inversion. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"哪种气象条件最不利于污染物扩散？","explanationZh":"答案是逆温。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":11,"localNo":11,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In a cyclone separator, the cut diameter (d50) is defined as the particle diameter at which the collection efficiency equals:","options":[{"label":"A","text":"100%","textZh":"100%"},{"label":"B","text":"90%","textZh":"90%"},{"label":"C","text":"50%","textZh":"50%"},{"label":"D","text":"0%","textZh":"0%"}],"answer":["C"],"explanation":"The answer is 50%. A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"在旋风分离器中，切割直径 (d50) 定义为收集效率等于时的颗粒直径：","explanationZh":"答案是50%。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":12,"localNo":12,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"What operational problem is caused by excessively high dust resistivity in an electrostatic precipitator?","options":[{"label":"A","text":"Particle re-entrainment","textZh":"颗粒再夹带"},{"label":"B","text":"Back corona","textZh":"背电晕"},{"label":"C","text":"Corona quenching","textZh":"电晕淬火"},{"label":"D","text":"Electrode erosion","textZh":"电极侵蚀"}],"answer":["B"],"explanation":"The answer is Back corona. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"静电除尘器粉尘电阻率过高会引起什么操作问题？","explanationZh":"答案是背电晕。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":13,"localNo":13,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"For submicron particles in a fabric filter, which collection mechanism dominates?","options":[{"label":"A","text":"Inertial impaction","textZh":"惯性撞击"},{"label":"B","text":"Direct interception","textZh":"直接拦截"},{"label":"C","text":"Brownian diffusion","textZh":"布朗扩散"},{"label":"D","text":"Gravitational settling","textZh":"重力沉降"}],"answer":["C"],"explanation":"The answer is Brownian diffusion. Fabric filters collect particles by sieving through the dust cake plus mechanisms such as inertial impaction, interception, and Brownian diffusion. For submicron particles, Brownian diffusion becomes especially important.","stemZh":"对于织物过滤器中的亚微米颗粒，哪种收集机制占主导地位？","explanationZh":"答案是布朗扩散。织物过滤器通过筛分尘饼以及惯性冲击、拦截和布朗扩散等机制来收集颗粒。对于亚微米颗粒，布朗扩散变得尤其重要。"},{"id":14,"localNo":14,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The primary particle collection mechanism in a Venturi scrubber is:","options":[{"label":"A","text":"Gravitational settling","textZh":"重力沉降"},{"label":"B","text":"Centrifugal separation","textZh":"离心分离"},{"label":"C","text":"Inertial impaction","textZh":"惯性撞击"},{"label":"D","text":"Electrostatic attraction","textZh":"静电吸引"}],"answer":["C"],"explanation":"The answer is Inertial impaction. A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"文丘里洗涤器中的主要颗粒收集机制是：","explanationZh":"答案是惯性撞击。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":15,"localNo":15,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The key difference between thermal incineration and catalytic combustion for VOC control is:","options":[{"label":"A","text":"Operating temperature","textZh":"工作温度"},{"label":"B","text":"Whether auxiliary fuel is required","textZh":"是否需要辅助燃料"},{"label":"C","text":"Whether a catalyst is used","textZh":"是否使用催化剂"},{"label":"D","text":"Whether CO₂ and H₂O are produced","textZh":"是否产生CO2和H2O"}],"answer":["C"],"explanation":"The answer is Whether a catalyst is used. For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"热力焚烧和催化燃烧在 VOC 控制方面的主要区别是：","explanationZh":"答案是是否使用催化剂。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":16,"localNo":16,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"To improve VOC recovery efficiency in a condensation system, the most effective approach is:","options":[{"label":"A","text":"Increasing operating pressure","textZh":"经营压力加大"},{"label":"B","text":"Decreasing operating temperature","textZh":"降低工作温度"},{"label":"C","text":"Increasing gas flow velocity","textZh":"增加气体流速"},{"label":"D","text":"Increasing condenser surface area","textZh":"增加冷凝器表面积"}],"answer":["B"],"explanation":"The answer is Decreasing operating temperature. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"为了提高冷凝系统中VOC的回收效率，最有效的方法是：","explanationZh":"答案是降低工作温度。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":17,"localNo":17,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In Life Cycle Assessment (LCA), the Well-to-Wake (WTW) GHG emission is calculated as:","options":[{"label":"A","text":"WTT emissions only","textZh":"仅 WTT 排放"},{"label":"B","text":"TTW emissions only","textZh":"仅 TTW 排放"},{"label":"C","text":"WTT emissions + TTW emissions","textZh":"WTT 排放量 + TTW 排放量"},{"label":"D","text":"WTT emissions − TTW emissions","textZh":"WTT 排放 – TTW 排放"}],"answer":["C"],"explanation":"The answer is WTT emissions + TTW emissions. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在生命周期评估 (LCA) 中，井到苏醒 (WTW) 温室气体排放量计算如下：","explanationZh":"答案是WTT排放量+TTW排放量。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":18,"localNo":18,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"TSP (Total Suspended Particulate) refers to particles with aerodynamic diameter generally:","options":[{"label":"A","text":"Less than 2.5 μm","textZh":"小于2.5微米"},{"label":"B","text":"Less than 10 μm","textZh":"小于10微米"},{"label":"C","text":"Less than 100 μm","textZh":"小于100微米"},{"label":"D","text":"Greater than 100 μm","textZh":"大于100微米"}],"answer":["C"],"explanation":"The answer is Less than 100 μm. Particle health and control behavior depend strongly on aerodynamic diameter. PM2.5 penetrates deeper into the respiratory system and remains suspended longer than coarse particles, while PM10 includes a broader coarse fraction.","stemZh":"TSP（总悬浮颗粒物）一般指空气动力学直径为：","explanationZh":"答案是小于100微米。颗粒健康和控制行为很大程度上取决于空气动力学直径。 PM2.5 可以更深入地渗透到呼吸系统中，并且比粗颗粒悬浮的时间更长，而 PM10 则包含更广泛的粗颗粒。"},{"id":19,"localNo":19,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which of the following is NOT a typical gaseous pollutant from combustion processes?","options":[{"label":"A","text":"Carbon monoxide (CO)","textZh":"一氧化碳 (CO)"},{"label":"B","text":"Nitrogen oxides (NOx)","textZh":"氮氧化物 (NOx)"},{"label":"C","text":"Sulfur dioxide (SO₂)","textZh":"二氧化硫 (SO2)"},{"label":"D","text":"Lead vapor (Pb)","textZh":"铅蒸气 (Pb)"}],"answer":["D"],"explanation":"The answer is Lead vapor (Pb). SO2 control focuses on reducing sulfur before, during, or after combustion: low-sulfur fuel, fuel desulfurization, in-furnace limestone or sorbent injection, and flue gas desulfurization. Tall stacks dilute pollutants but do not reduce total emissions. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"以下哪项不是燃烧过程中的典型气态污染物？","explanationZh":"答案是铅蒸气（Pb）。 SO2 控制重点是在燃烧前、燃烧中或燃烧后减少硫：低硫燃料、燃料脱硫、炉内石灰石或吸附剂注入以及烟气脱硫。高烟囱会稀释污染物，但不会减少总排放量。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":20,"localNo":20,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"According to the two-film theory, the total mass transfer resistance in gas absorption is equal to:","options":[{"label":"A","text":"Gas film resistance + Liquid film resistance","textZh":"气膜阻力+液膜阻力"},{"label":"B","text":"Gas film resistance × Liquid film resistance","textZh":"气膜阻力×液膜阻力"},{"label":"C","text":"Gas film resistance / Liquid film resistance","textZh":"气膜电阻/液膜电阻"},{"label":"D","text":"Gas film resistance − Liquid film resistance","textZh":"气膜阻力 − 液膜阻力"}],"answer":["A"],"explanation":"The answer is Gas film resistance + Liquid film resistance. External diffusion control means the slow step is transport through the gas film around the particle or packing surface. Increasing gas velocity thins the boundary layer and raises the mass-transfer coefficient, so it helps much more than simply increasing intrinsic catalyst activity.","stemZh":"根据二膜理论，气体吸收过程中的总传质阻力等于：","explanationZh":"答案是气膜阻力+液膜阻力。外部扩散控制意味着缓慢的步骤是通过颗粒或填料表面周围的气膜传输。增加气体速度可以使边界层变薄并提高传质系数，因此它比简单地增加催化剂的内在活性更有帮助。"},{"id":21,"localNo":21,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The primary cause of catalyst poisoning in catalytic purification of gaseous pollutants is:","options":[{"label":"A","text":"Carbon deposition on catalyst surface","textZh":"催化剂表面积碳"},{"label":"B","text":"Chemisorption of impurities on active sites","textZh":"活性位点上杂质的化学吸附"},{"label":"C","text":"Thermal sintering of catalyst","textZh":"催化剂的热烧结"},{"label":"D","text":"Mechanical attrition of catalyst","textZh":"催化剂的机械磨损"}],"answer":["B"],"explanation":"The answer is Chemisorption of impurities on active sites. Catalyst poisoning occurs when impurities are strongly chemisorbed on active sites. Those sites are then unavailable for the desired reaction, which is why poisoning is usually more serious and less reversible than ordinary fouling.","stemZh":"催化净化气态污染物时催化剂中毒的主要原因是：","explanationZh":"答案是活性位点上杂质的化学吸附。当杂质强烈化学吸附在活性位点上时，就会发生催化剂中毒。这些部位无法进行所需的反应，这就是为什么中毒通常比普通污垢更严重且更难逆转的原因。"},{"id":22,"localNo":22,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which characteristic correctly describes the troposphere?","options":[{"label":"A","text":"Temperature increases with altitude","textZh":"温度随海拔升高而升高"},{"label":"B","text":"Contains approximately 75% of atmospheric mass and 99% of water vapor","textZh":"含有约 75% 的大气质量和 99% 的水蒸气"},{"label":"C","text":"Contains the ozone layer","textZh":"含有臭氧层"},{"label":"D","text":"Temperature is constant with altitude","textZh":"温度随海拔高度恒定"}],"answer":["B"],"explanation":"The answer is Contains approximately 75% of atmospheric mass and 99% of water vapor. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"哪个特征正确地描述了对流层？","explanationZh":"答案是包含大约 75% 的大气质量和 99% 的水蒸气。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":23,"localNo":23,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Plume rise height (ΔH) is primarily influenced by:","options":[{"label":"A","text":"Stack geometric height","textZh":"堆叠几何高度"},{"label":"B","text":"Stack gas exit velocity and temperature","textZh":"烟道气体出口速度和温度"},{"label":"C","text":"Ambient wind speed","textZh":"环境风速"},{"label":"D","text":"All of the above","textZh":"上述所有的"}],"answer":["D"],"explanation":"The answer is All of the above. Effective stack height is the physical stack height plus plume rise. Plume rise is controlled by exit momentum, buoyancy from hot stack gas, stack diameter, and ambient wind; higher stacks generally reduce nearby ground concentration but the word 'always' is unsafe because meteorology and terrain also matter.","stemZh":"烟羽上升高度 (ΔH) 主要受以下因素影响：","explanationZh":"答案是以上全部。有效堆叠高度是物理堆叠高度加上羽流上升。羽流上升由出口动量、热烟囱气体的浮力、烟囱直径和环境风控制；较高的烟囱通常会减少附近地面的浓度，但“总是”这个词并不安全，因为气象和地形也很重要。"},{"id":24,"localNo":24,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In VOC adsorption treatment, the dynamic adsorption capacity of an adsorbent is typically ________ the static adsorption capacity.","options":[{"label":"A","text":"Greater than","textZh":"大于"},{"label":"B","text":"Smaller than","textZh":"小于"},{"label":"C","text":"Equal to","textZh":"等于"},{"label":"D","text":"Unrelated to","textZh":"无关"}],"answer":["B"],"explanation":"The answer is Smaller than. In a fixed-bed adsorber, the breakthrough curve tracks the movement and spreading of the mass-transfer zone. Dynamic capacity is lower than equilibrium static capacity because the bed must be replaced or regenerated before the outlet concentration exceeds the allowable limit.","stemZh":"在VOC吸附处理中，吸附剂的动态吸附能力通常是静态吸附能力。","explanationZh":"答案是小于。在固定床吸附器中，突破曲线跟踪传质区的移动和扩展。动态容量低于平衡静态容量，因为在出​​口浓度超过允许限度之前必须更换或再生床。"},{"id":25,"localNo":25,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In LCA methodology, how should CO₂ emissions from biomass combustion be treated?","options":[{"label":"A","text":"Included in WTT emissions","textZh":"包含在 WTT 排放中"},{"label":"B","text":"Included in TTW emissions","textZh":"包含在 TTW 排放中"},{"label":"C","text":"Reported as informational item, not included in totals","textZh":"作为信息项目报告，不包含在总数中"},{"label":"D","text":"Multiplied by GWP100 and included","textZh":"乘以 GWP100 并包含在内"}],"answer":["C"],"explanation":"The answer is Reported as informational item, not included in totals. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在LCA方法中，应如何处理生物质燃烧产生的二氧化碳排放？","explanationZh":"答案作为信息项报告，不包含在总数中。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":26,"localNo":26,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which is NOT a typical source of volatile organic compounds (VOCs)?","options":[{"label":"A","text":"Gasoline stations","textZh":"加油站"},{"label":"B","text":"Furniture painting","textZh":"家具涂装"},{"label":"C","text":"Coal-fired power plants","textZh":"燃煤电厂"},{"label":"D","text":"Printing facilities","textZh":"印刷设施"}],"answer":["C"],"explanation":"The answer is Coal-fired power plants. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"哪项不是挥发性有机化合物 (VOC) 的典型来源？","explanationZh":"答案是燃煤电厂。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":27,"localNo":27,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The effective stack height (He) in atmospheric dispersion modeling equals:","options":[{"label":"A","text":"Physical stack height (Hs)","textZh":"物理堆叠高度 (Hs)"},{"label":"B","text":"Plume rise (ΔH)","textZh":"烟羽上升 (ΔH)"},{"label":"C","text":"Hs + ΔH","textZh":"Hs + ΔH"},{"label":"D","text":"Hs − ΔH","textZh":"Hs – ΔH"}],"answer":["C"],"explanation":"The answer is Hs + ΔH. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"大气扩散模型中的有效烟囱高度 (He) 等于：","explanationZh":"答案是Hs+ΔH。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":28,"localNo":28,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The dry adiabatic lapse rate in the troposphere is approximately:","options":[{"label":"A","text":"0.65 °C per 100 m","textZh":"每 100 m 0.65 °C"},{"label":"B","text":"1.0 °C per 100 m","textZh":"每 100 m 1.0 °C"},{"label":"C","text":"0.5 °C per 100 m","textZh":"每 100 m 0.5 °C"},{"label":"D","text":"2.0 °C per 100 m","textZh":"每 100 m 2.0 °C"}],"answer":["B"],"explanation":"The answer is 1.0 °C per 100 m. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"对流层干绝热递减率大约为：","explanationZh":"答案是每 100 m 1.0 °C。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":29,"localNo":29,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which is NOT a primary source of atmospheric particulate matter?","options":[{"label":"A","text":"Fuel combustion","textZh":"燃料燃烧"},{"label":"B","text":"Wind-blown dust","textZh":"风吹尘埃"},{"label":"C","text":"Photosynthesis","textZh":"光合作用"},{"label":"D","text":"Industrial processes","textZh":"工业流程"}],"answer":["C"],"explanation":"The answer is Photosynthesis. Particle health and control behavior depend strongly on aerodynamic diameter. PM2.5 penetrates deeper into the respiratory system and remains suspended longer than coarse particles, while PM10 includes a broader coarse fraction. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"哪项不是大气颗粒物的主要来源？","explanationZh":"答案是光合作用。颗粒健康和控制行为很大程度上取决于空气动力学直径。 PM2.5 可以更深入地渗透到呼吸系统中，并且比粗颗粒悬浮的时间更长，而 PM10 则包含更广泛的粗颗粒。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":30,"localNo":30,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In the Stokes regime, the settling velocity of a spherical particle is proportional to:","options":[{"label":"A","text":"d² (diameter squared)","textZh":"d²（直径的平方）"},{"label":"B","text":"d⁰·⁵ (square root of diameter)","textZh":"d⁰·⁵（直径的平方根）"},{"label":"C","text":"d (diameter)","textZh":"d（直径）"},{"label":"D","text":"1/d² (inverse diameter squared)","textZh":"1/d²（直径平方反数）"}],"answer":["A"],"explanation":"The answer is d² (diameter squared). In the Stokes regime, particle settling velocity is proportional to the square of particle diameter when other properties are constant. This is why coarse particles settle much faster than fine particles.","stemZh":"在斯托克斯体系中，球形颗粒的沉降速度与以下各项成正比：","explanationZh":"答案是 d²（直径的平方）。在斯托克斯状态下，当其他属性不变时，颗粒沉降速度与颗粒直径的平方成正比。这就是粗颗粒比细颗粒沉降快得多的原因。"},{"id":31,"localNo":31,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"If an absorption process is liquid-film controlled, to increase absorption rate, one should primarily enhance:","options":[{"label":"A","text":"Gas-phase turbulence","textZh":"气相湍流"},{"label":"B","text":"Liquid-phase turbulence","textZh":"液相湍流"},{"label":"C","text":"Interfacial area","textZh":"界面面积"},{"label":"D","text":"System pressure","textZh":"系统压力"}],"answer":["B"],"explanation":"The answer is Liquid-phase turbulence. External diffusion control means the slow step is transport through the gas film around the particle or packing surface. Increasing gas velocity thins the boundary layer and raises the mass-transfer coefficient, so it helps much more than simply increasing intrinsic catalyst activity.","stemZh":"如果吸收过程是液膜控制的，为了提高吸收率，首先应增强：","explanationZh":"答案是液相湍流。外部扩散控制意味着缓慢的步骤是通过颗粒或填料表面周围的气膜传输。增加气体速度可以使边界层变薄并提高传质系数，因此它比简单地增加催化剂的内在活性更有帮助。"},{"id":32,"localNo":32,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"For high-concentration VOC gas streams, the preferred control technology is typically:","options":[{"label":"A","text":"Adsorption","textZh":"吸附"},{"label":"B","text":"Absorption","textZh":"吸收"},{"label":"C","text":"Incineration (thermal or catalytic)","textZh":"焚烧（热力或催化）"},{"label":"D","text":"Condensation recovery","textZh":"冷凝回收"}],"answer":["D"],"explanation":"The answer is Condensation recovery. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"对于高浓度 VOC 气流，首选控制技术通常是：","explanationZh":"答案是冷凝回收。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":33,"localNo":33,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In fixed-bed adsorber design, the breakthrough time mainly depends on:","options":[{"label":"A","text":"Static adsorption capacity","textZh":"静态吸附量"},{"label":"B","text":"Dynamic adsorption capacity","textZh":"动态吸附容量"},{"label":"C","text":"Total specific surface area","textZh":"总比表面积"},{"label":"D","text":"Molecular weight of adsorbate","textZh":"吸附质的分子量"}],"answer":["B"],"explanation":"The answer is Dynamic adsorption capacity. In a fixed-bed adsorber, the breakthrough curve tracks the movement and spreading of the mass-transfer zone. Dynamic capacity is lower than equilibrium static capacity because the bed must be replaced or regenerated before the outlet concentration exceeds the allowable limit.","stemZh":"在固定床吸附器设计中，突破时间主要取决于：","explanationZh":"答案是动态吸附能力。在固定床吸附器中，突破曲线跟踪传质区的移动和扩展。动态容量低于平衡静态容量，因为在出​​口浓度超过允许限度之前必须更换或再生床。"},{"id":34,"localNo":34,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In LCA methodology, the preferred allocation method for emissions to co-products is:","options":[{"label":"A","text":"Mass allocation","textZh":"批量分配"},{"label":"B","text":"Economic value allocation","textZh":"经济价值分配"},{"label":"C","text":"Energy content allocation","textZh":"能源含量分配"},{"label":"D","text":"No allocation","textZh":"无分配"}],"answer":["C"],"explanation":"The answer is Energy content allocation. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在 LCA 方法中，副产品排放量的首选分配方法是：","explanationZh":"答案是能源含量分配。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":35,"localNo":35,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The pressure drop across a cyclone separator is proportional to:","options":[{"label":"A","text":"Inlet velocity","textZh":"入口速度"},{"label":"B","text":"Square of inlet velocity","textZh":"入口速度的平方"},{"label":"C","text":"Square root of inlet velocity","textZh":"入口速度的平方根"},{"label":"D","text":"Inlet velocity cubed","textZh":"入口速度的立方"}],"answer":["B"],"explanation":"The answer is Square of inlet velocity. A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"旋风分离器的压降与以下因素成正比：","explanationZh":"答案是入口速度的平方。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":36,"localNo":36,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In an electrostatic precipitator, the collection efficiency is related to drift velocity by:","options":[{"label":"A","text":"Linear proportionality","textZh":"线性比例"},{"label":"B","text":"Exponential relationship","textZh":"指数关系"},{"label":"C","text":"Inverse proportionality","textZh":"反比例关系"},{"label":"D","text":"No relationship","textZh":"没有关系"}],"answer":["B"],"explanation":"The answer is Exponential relationship. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"在静电除尘器中，收集效率与漂移速度的关系如下：","explanationZh":"答案是指数关系。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":37,"localNo":37,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which dust collector is LEAST suitable for treating oily or sticky particles?","options":[{"label":"A","text":"Gravity settling chamber","textZh":"重力沉降室"},{"label":"B","text":"Cyclone separator","textZh":"旋风分离器"},{"label":"C","text":"Fabric filter (baghouse)","textZh":"布袋除尘器"},{"label":"D","text":"Wet scrubber","textZh":"湿式洗涤器"}],"answer":["C"],"explanation":"The answer is Fabric filter (baghouse). A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"哪种除尘器最不适合处理油性或粘性颗粒？","explanationZh":"答案是织物过滤器（袋式除尘器）。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":38,"localNo":38,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The air-to-cloth ratio (filtration velocity) in a fabric filter is defined as:","options":[{"label":"A","text":"Gas flow rate divided by filter area","textZh":"气体流量除以过滤面积"},{"label":"B","text":"Dust concentration divided by gas flow rate","textZh":"粉尘浓度除以气体流量"},{"label":"C","text":"Filter area divided by gas flow rate","textZh":"过滤面积除以气体流量"},{"label":"D","text":"Pressure drop divided by gas flow rate","textZh":"压降除以气体流量"}],"answer":["A"],"explanation":"The answer is Gas flow rate divided by filter area. Fabric filters collect particles by sieving through the dust cake plus mechanisms such as inertial impaction, interception, and Brownian diffusion. For submicron particles, Brownian diffusion becomes especially important.","stemZh":"织物过滤器中的空气与布料的比率（过滤速度）定义为：","explanationZh":"答案是气体流量除以过滤面积。织物过滤器通过筛分尘饼以及惯性冲击、拦截和布朗扩散等机制来收集颗粒。对于亚微米颗粒，布朗扩散变得尤其重要。"},{"id":39,"localNo":39,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"According to GB/T3840-91, when Qh ≥ 21000 kW, stack height design should be based on:","options":[{"label":"A","text":"Ground-level maximum concentration only","textZh":"仅地面最大浓度"},{"label":"B","text":"Absolute maximum concentration only","textZh":"仅绝对最大浓度"},{"label":"C","text":"A specified assurance rate","textZh":"指定保证率"},{"label":"D","text":"Plume rise only","textZh":"仅羽上升"}],"answer":["C"],"explanation":"The answer is A specified assurance rate. Effective stack height is the physical stack height plus plume rise. Plume rise is controlled by exit momentum, buoyancy from hot stack gas, stack diameter, and ambient wind; higher stacks generally reduce nearby ground concentration but the word 'always' is unsafe because meteorology and terrain also matter.","stemZh":"根据GB/T3840-91，当Qh≥21000kW时，堆高设计应按：","explanationZh":"答案是指定的保证率。有效堆叠高度是物理堆叠高度加上羽流上升。羽流上升由出口动量、热烟囱气体的浮力、烟囱直径和环境风控制；较高的烟囱通常会减少附近地面的浓度，但“总是”这个词并不安全，因为气象和地形也很重要。"},{"id":40,"localNo":40,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"According to Raoult's law, the partial pressure of a VOC component in the gas phase depends on:","options":[{"label":"A","text":"Temperature only","textZh":"仅温度"},{"label":"B","text":"Saturation vapor pressure of the component","textZh":"组分的饱和蒸气压"},{"label":"C","text":"Total system pressure","textZh":"系统总压力"},{"label":"D","text":"Gas flow velocity","textZh":"气体流速"}],"answer":["B"],"explanation":"The answer is Saturation vapor pressure of the component. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"根据拉乌尔定律，气相中 VOC 组分的分压取决于：","explanationZh":"答案是该组分的饱和蒸气压。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":41,"localNo":41,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The AP-42 emission factor compilation is published by which agency?","options":[{"label":"A","text":"WHO (World Health Organization)","textZh":"WHO（世界卫生组织）"},{"label":"B","text":"IMO (International Maritime Organization)","textZh":"IMO（国际海事组织）"},{"label":"C","text":"EPA (U.S. Environmental Protection Agency)","textZh":"EPA（美国环境保护署）"},{"label":"D","text":"ISO (International Organization for Standardization)","textZh":"ISO（国际标准化组织）"}],"answer":["C"],"explanation":"The answer is EPA (U.S. Environmental Protection Agency). An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"AP-42 排放因子汇编由哪个机构发布？","explanationZh":"答案是EPA（美国环境保护署）。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":42,"localNo":42,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Receptor-oriented atmospheric models (e.g., CMB, PMF) are primarily used for:","options":[{"label":"A","text":"Predicting environmental impact of new sources","textZh":"预测新来源的环境影响"},{"label":"B","text":"Determining emission inventories","textZh":"确定排放清单"},{"label":"C","text":"Source apportionment","textZh":"来源解析"},{"label":"D","text":"Stack height design","textZh":"堆叠高度设计"}],"answer":["C"],"explanation":"The answer is Source apportionment. Effective stack height is the physical stack height plus plume rise. Plume rise is controlled by exit momentum, buoyancy from hot stack gas, stack diameter, and ambient wind; higher stacks generally reduce nearby ground concentration but the word 'always' is unsafe because meteorology and terrain also matter.","stemZh":"面向受体的大气模型（例如 CMB、PMF）主要用于：","explanationZh":"答案是源头分配。有效堆叠高度是物理堆叠高度加上羽流上升。羽流上升由出口动量、热烟囱气体的浮力、烟囱直径和环境风控制；较高的烟囱通常会减少附近地面的浓度，但“总是”这个词并不安全，因为气象和地形也很重要。"},{"id":43,"localNo":43,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The Langmuir adsorption isotherm is applicable to which type of adsorption?","options":[{"label":"A","text":"Physical adsorption","textZh":"物理吸附"},{"label":"B","text":"Chemical adsorption","textZh":"化学吸附"},{"label":"C","text":"Monolayer adsorption","textZh":"单层吸附"},{"label":"D","text":"Multilayer adsorption","textZh":"多层吸附"}],"answer":["C"],"explanation":"The answer is Monolayer adsorption. The Langmuir isotherm describes monolayer adsorption on a homogeneous surface with a finite number of sites. Once sites are filled, adsorption approaches saturation rather than increasing indefinitely.","stemZh":"朗缪尔吸附等温线适用于哪种类型的吸附？","explanationZh":"答案是单分子层吸附。朗缪尔等温线描述了具有有限数量位点的均匀表面上的单层吸附。一旦位点被填满，吸附就会接近饱和而不是无限增加。"},{"id":44,"localNo":44,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The primary difference between PM₂.₅ and PM₁₀ in atmospheric particles is:","options":[{"label":"A","text":"Chemical composition","textZh":"化学成分"},{"label":"B","text":"Source","textZh":"来源"},{"label":"C","text":"Health impact and atmospheric residence time","textZh":"健康影响和大气停留时间"},{"label":"D","text":"Color","textZh":"颜色"}],"answer":["C"],"explanation":"The answer is Health impact and atmospheric residence time. The BET equation extends adsorption theory to multilayer physical adsorption. Its common engineering use is measuring adsorbent specific surface area from gas adsorption data.","stemZh":"大气颗粒物中 PM2.5 和 PM10 之间的主要区别是：","explanationZh":"答案是健康影响和大气停留时间。 BET 方程将吸附理论扩展到多层物理吸附。其常见的工程用途是根据气体吸附数据测量吸附剂比表面积。"},{"id":45,"localNo":45,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In absorber design, the column diameter is primarily determined by:","options":[{"label":"A","text":"Flooding velocity","textZh":"洪水速度"},{"label":"B","text":"Liquid-to-gas ratio","textZh":"液气比"},{"label":"C","text":"Height of transfer unit","textZh":"传送装置高度"},{"label":"D","text":"Packing type","textZh":"包装类型"}],"answer":["A"],"explanation":"The answer is Flooding velocity. Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter.","stemZh":"在吸收器设计中，塔直径主要由以下因素决定：","explanationZh":"答案是洪水速度。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。"},{"id":46,"localNo":46,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The excess air coefficient (α) in combustion is defined as:","options":[{"label":"A","text":"(Va − Va0) / Va0","textZh":"(Va − Va0) / Va0"},{"label":"B","text":"(Va + Va0) / Va0","textZh":"(Va + Va0) / Va0"},{"label":"C","text":"(Va0 − Va) / Va0","textZh":"(Va0-Va)/Va0"},{"label":"D","text":"Va / Va0","textZh":"瓦/瓦0"}],"answer":["A"],"explanation":"The answer is (Va − Va0) / Va0. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"燃烧中的过量空气系数（α）定义为：","explanationZh":"答案是(Va − Va0) / Va0。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":47,"localNo":47,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"A temperature inversion is characterized by:","options":[{"label":"A","text":"Temperature decreasing with altitude","textZh":"温度随海拔高度降低"},{"label":"B","text":"Temperature increasing with altitude","textZh":"温度随海拔高度升高"},{"label":"C","text":"Constant temperature with altitude","textZh":"温度随海拔高度恒定"},{"label":"D","text":"Alternating temperature with altitude","textZh":"温度随海拔变化"}],"answer":["B"],"explanation":"The answer is Temperature increasing with altitude. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"逆温的特点是：","explanationZh":"答案是温度随着海拔高度的增加而增加。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":48,"localNo":48,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The Rosin-Rammler (R-R) distribution is particularly suitable for describing particles generated by:","options":[{"label":"A","text":"Combustion processes","textZh":"燃烧过程"},{"label":"B","text":"Mechanical comminution (crushing, grinding)","textZh":"机械粉碎（破碎、研磨）"},{"label":"C","text":"Condensation from vapor","textZh":"蒸气凝结"},{"label":"D","text":"Chemical reaction in atmosphere","textZh":"大气中的化学反应"}],"answer":["B"],"explanation":"The answer is Mechanical comminution (crushing, grinding). VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"Rosin-Rammler (R-R) 分布特别适合描述由以下各项生成的颗粒：","explanationZh":"答案是机械粉碎（破碎、研磨）。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":49,"localNo":49,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Chemical absorption typically has ________ compared to physical absorption.","options":[{"label":"A","text":"Lower absorption rate","textZh":"吸收率较低"},{"label":"B","text":"Higher absorption rate","textZh":"吸收率更高"},{"label":"C","text":"Same absorption rate","textZh":"吸收率相同"},{"label":"D","text":"Unpredictable absorption rate","textZh":"不可预测的吸收率"}],"answer":["B"],"explanation":"The answer is Higher absorption rate. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"与物理吸收相比，化学吸收通常具有________。","explanationZh":"答案是更高的吸收率。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":50,"localNo":50,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which is NOT a common regeneration method for activated carbon adsorbents used in VOC control?","options":[{"label":"A","text":"Thermal regeneration","textZh":"热再生"},{"label":"B","text":"Pressure swing regeneration","textZh":"变压再生"},{"label":"C","text":"Solvent extraction regeneration","textZh":"溶剂萃取再生"},{"label":"D","text":"Magnetic separation regeneration","textZh":"磁分离再生"}],"answer":["D"],"explanation":"The answer is Magnetic separation regeneration. VOC adsorption uses porous solids such as activated carbon, zeolites, silica gel, alumina, or polymeric resins. Capacity depends on pore structure, surface chemistry, humidity, temperature, inlet concentration, and regeneration history. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"哪种不是 VOC 控制中使用的活性炭吸附剂的常见再生方法？","explanationZh":"答案是磁分离再生。 VOC 吸附使用多孔固体，例如活性炭、沸石、硅胶、氧化铝或聚合物树脂。容量取决于孔隙结构、表面化学、湿度、温度、入口浓度和再生历史。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":51,"localNo":51,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In LCA, the system boundary for WTW GHG intensity calculation starts at:","options":[{"label":"A","text":"Fuel combustion on board","textZh":"船上燃料燃烧"},{"label":"B","text":"Fuel transportation","textZh":"燃料运输"},{"label":"C","text":"Feedstock extraction/cultivation","textZh":"原料提取/培养"},{"label":"D","text":"Bunkering","textZh":"加油"}],"answer":["C"],"explanation":"The answer is Feedstock extraction/cultivation. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在 LCA 中，WTW GHG 强度计算的系统边界起始于：","explanationZh":"答案是原料提取/培养。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":52,"localNo":52,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The primary advantage of catalytic combustion for VOC control is:","options":[{"label":"A","text":"Lower operating temperature, energy saving","textZh":"工作温度更低，节能"},{"label":"B","text":"No preheating required","textZh":"无需预热"},{"label":"C","text":"Catalyst never deactivates","textZh":"催化剂永不失活"},{"label":"D","text":"Suitable for all concentrations","textZh":"适合所有浓度"}],"answer":["A"],"explanation":"The answer is Lower operating temperature, energy saving. For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"催化燃烧用于 VOC 控制的主要优点是：","explanationZh":"答案是降低工作温度、节能。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":53,"localNo":53,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In a cyclone, increasing the tangential inlet velocity will:","options":[{"label":"A","text":"Increase the cut diameter (d50)","textZh":"增加切割直径 (d50)"},{"label":"B","text":"Decrease collection efficiency","textZh":"降低收集效率"},{"label":"C","text":"Decrease pressure drop","textZh":"降低压降"},{"label":"D","text":"Decrease the cut diameter (d50) and increase efficiency","textZh":"减小切割直径 (d50) 并提高效率"}],"answer":["D"],"explanation":"The answer is Decrease the cut diameter (d50) and increase efficiency. A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"在旋风分离器中，增加切向入口速度将：","explanationZh":"答案是减小切割直径 (d50) 并提高效率。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":54,"localNo":54,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Electrostatic precipitators perform POORLY on dust with:","options":[{"label":"A","text":"Medium resistivity","textZh":"中等电阻率"},{"label":"B","text":"High resistivity only","textZh":"仅高电阻率"},{"label":"C","text":"Low resistivity only","textZh":"仅低电阻率"},{"label":"D","text":"Both high and low resistivity","textZh":"高电阻率和低电阻率"}],"answer":["D"],"explanation":"The answer is Both high and low resistivity. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"静电除尘器在除尘方面表现不佳：","explanationZh":"答案是高电阻率和低电阻率。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":55,"localNo":55,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The advantage of pulse-jet cleaning in fabric filters is:","options":[{"label":"A","text":"Can be cleaned online (without shutdown)","textZh":"可在线清洗（无需停机）"},{"label":"B","text":"Low cleaning intensity","textZh":"清洗强度低"},{"label":"C","text":"Stable pressure drop","textZh":"稳定的压降"},{"label":"D","text":"Low compressed air requirement","textZh":"压缩空气需求低"}],"answer":["A"],"explanation":"The answer is Can be cleaned online (without shutdown). Fabric filters collect particles by sieving through the dust cake plus mechanisms such as inertial impaction, interception, and Brownian diffusion. For submicron particles, Brownian diffusion becomes especially important.","stemZh":"织物过滤器脉冲喷射清洗的优点是：","explanationZh":"答案是可以在线清洗（无需关机）。织物过滤器通过筛分尘饼以及惯性冲击、拦截和布朗扩散等机制来收集颗粒。对于亚微米颗粒，布朗扩散变得尤其重要。"},{"id":56,"localNo":56,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"For BET equation application, the relative pressure range P/P₀ should typically be:","options":[{"label":"A","text":"0 – 0.05","textZh":"0 – 0.05"},{"label":"B","text":"0.05 – 0.35","textZh":"0.05 – 0.35"},{"label":"C","text":"0.35 – 0.80","textZh":"0.35 – 0.80"},{"label":"D","text":"0.80 – 1.00","textZh":"0.80 – 1.00"}],"answer":["B"],"explanation":"The answer is 0.05 – 0.35. The BET equation extends adsorption theory to multilayer physical adsorption. Its common engineering use is measuring adsorbent specific surface area from gas adsorption data.","stemZh":"对于 BET 方程应用，相对压力范围 P/P₀ 通常应为：","explanationZh":"答案是 0.05 – 0.35。 BET 方程将吸附理论扩展到多层物理吸附。其常见的工程用途是根据气体吸附数据测量吸附剂比表面积。"},{"id":57,"localNo":57,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In VOC control technologies, RTO stands for:","options":[{"label":"A","text":"Regenerative Thermal Oxidizer","textZh":"蓄热式热氧化器"},{"label":"B","text":"Rotary Adsorption Oxidizer","textZh":"旋转吸附氧化器"},{"label":"C","text":"Catalytic Oxidation Reactor","textZh":"催化氧化反应器"},{"label":"D","text":"Condensation Recovery System","textZh":"冷凝回收系统"}],"answer":["A"],"explanation":"The answer is Regenerative Thermal Oxidizer. For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"在VOC控制技术中，RTO代表：","explanationZh":"答案是蓄热式热氧化器。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":58,"localNo":58,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Secondary particulate matter in the atmosphere is primarily formed by:","options":[{"label":"A","text":"Wind-blown dust","textZh":"风吹尘埃"},{"label":"B","text":"Direct vehicle exhaust","textZh":"直接汽车尾气"},{"label":"C","text":"Gas-to-particle conversion of SO₂ and NOx","textZh":"SO2 和 NOx 的气体到颗粒的转化"},{"label":"D","text":"Construction dust","textZh":"施工扬尘"}],"answer":["C"],"explanation":"The answer is Gas-to-particle conversion of SO₂ and NOx. Particle health and control behavior depend strongly on aerodynamic diameter. PM2.5 penetrates deeper into the respiratory system and remains suspended longer than coarse particles, while PM10 includes a broader coarse fraction.","stemZh":"大气中的二次颗粒物主要由以下物质形成：","explanationZh":"答案是 SO2 和 NOx 的气体到颗粒的转化。颗粒健康和控制行为很大程度上取决于空气动力学直径。 PM2.5 可以更深入地渗透到呼吸系统中，并且比粗颗粒悬浮的时间更长，而 PM10 则包含更广泛的粗颗粒。"},{"id":59,"localNo":59,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The mixing height (or mixing layer depth) affects pollutant dispersion by:","options":[{"label":"A","text":"Higher mixing height leads to less dispersion","textZh":"较高的混合高度导致较少的分散"},{"label":"B","text":"Lower mixing height leads to more dispersion","textZh":"较低的混合高度导致更多的分散"},{"label":"C","text":"Having no effect on dispersion","textZh":"对分散没有影响"},{"label":"D","text":"Limiting vertical dispersion of pollutants","textZh":"限制污染物的垂直扩散"}],"answer":["D"],"explanation":"The answer is Limiting vertical dispersion of pollutants. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"混合高度（或混合层深度）通过以下方式影响污染物扩散：","explanationZh":"答案是限制污染物的垂直扩散。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":60,"localNo":60,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Sulfur in fuel during combustion is mainly converted to:","options":[{"label":"A","text":"H₂S","textZh":"硫化氢"},{"label":"B","text":"SO₂","textZh":"二氧化硫"},{"label":"C","text":"SO₃","textZh":"SO₃"},{"label":"D","text":"Sulfate particles","textZh":"硫酸盐颗粒"}],"answer":["B"],"explanation":"The answer is SO₂. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"燃料中的硫在燃烧过程中主要转化为：","explanationZh":"答案是SO2。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":61,"localNo":61,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The service life (protection time) of an adsorbent in a fixed bed depends on:","options":[{"label":"A","text":"Static adsorption capacity","textZh":"静态吸附量"},{"label":"B","text":"Dynamic adsorption capacity","textZh":"动态吸附容量"},{"label":"C","text":"Adsorbent density","textZh":"吸附剂密度"},{"label":"D","text":"Adsorbate boiling point","textZh":"吸附物沸点"}],"answer":["B"],"explanation":"The answer is Dynamic adsorption capacity. In a fixed-bed adsorber, the breakthrough curve tracks the movement and spreading of the mass-transfer zone. Dynamic capacity is lower than equilibrium static capacity because the bed must be replaced or regenerated before the outlet concentration exceeds the allowable limit.","stemZh":"固定床吸附剂的使用寿命（保护时间）取决于：","explanationZh":"答案是动态吸附能力。在固定床吸附器中，突破曲线跟踪传质区的移动和扩展。动态容量低于平衡静态容量，因为在出​​口浓度超过允许限度之前必须更换或再生床。"},{"id":62,"localNo":62,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In gas absorption, the minimum liquid-to-gas ratio (L/G)min is determined by:","options":[{"label":"A","text":"Gas flow rate","textZh":"气体流量"},{"label":"B","text":"Liquid flow rate","textZh":"液体流量"},{"label":"C","text":"Initial absorbent concentration","textZh":"初始吸收剂浓度"},{"label":"D","text":"Phase equilibrium relationship","textZh":"相平衡关系"}],"answer":["D"],"explanation":"The answer is Phase equilibrium relationship. Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter.","stemZh":"在气体吸收中，最小液气比 (L/G)min 由下式确定：","explanationZh":"答案是相平衡关系。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。"},{"id":63,"localNo":63,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which of the following is NOT a combustion-based VOC control technology?","options":[{"label":"A","text":"Direct incineration","textZh":"直接焚烧"},{"label":"B","text":"Catalytic combustion","textZh":"催化燃烧"},{"label":"C","text":"Regenerative thermal oxidation","textZh":"蓄热式热氧化"},{"label":"D","text":"Absorption","textZh":"吸收"}],"answer":["D"],"explanation":"The answer is Absorption. For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"以下哪项不是基于燃烧的 VOC 控制技术？","explanationZh":"答案是吸收。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":64,"localNo":64,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The main challenge in quantifying ILUC (Indirect Land Use Change) in LCA is:","options":[{"label":"A","text":"It can be directly measured","textZh":"可以直接测量"},{"label":"B","text":"Model uncertainty and high subjectivity","textZh":"模型不确定性和高度主观性"},{"label":"C","text":"Data availability is too precise","textZh":"数据可用性过于精确"},{"label":"D","text":"It has no significant impact","textZh":"没有重大影响"}],"answer":["B"],"explanation":"The answer is Model uncertainty and high subjectivity. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在 LCA 中量化 ILUC（间接土地利用变化）的主要挑战是：","explanationZh":"答案是模型的不确定性和高度的主观性。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":65,"localNo":65,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In emission inventory compilation, the typical unit for emission factors is:","options":[{"label":"A","text":"mg/m³","textZh":"毫克/立方米"},{"label":"B","text":"g/kg fuel or g/kWh","textZh":"克/千克燃料或克/千瓦时"},{"label":"C","text":"ppm","textZh":"百万分之一"},{"label":"D","text":"μg/m³","textZh":"微克/立方米"}],"answer":["B"],"explanation":"The answer is g/kg fuel or g/kWh. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"在排放清单编制中，排放因子的典型单位为：","explanationZh":"答案是克/千克燃料或克/千瓦时。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":66,"localNo":66,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"For the same particle size distribution, the number-based, surface area-based, and mass-based distribution curves:","options":[{"label":"A","text":"Are identical in shape","textZh":"形状相同"},{"label":"B","text":"Differ, with mode positions shifting with the basis","textZh":"不同，模式位置随基础变化"},{"label":"C","text":"Differ only in vertical axis scale","textZh":"仅纵轴比例不同"},{"label":"D","text":"Are completely superimposable","textZh":"完全可以叠加"}],"answer":["B"],"explanation":"The answer is Differ, with mode positions shifting with the basis. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"对于相同的粒度分布，基于数量、基于表面积和基于质量的分布曲线：","explanationZh":"答案是不同的，众数位置随着基数的变化而变化。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":67,"localNo":67,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The acid dew point of flue gas is mainly determined by:","options":[{"label":"A","text":"Water vapor content in flue gas","textZh":"烟气中水蒸气含量"},{"label":"B","text":"SO₃ content in flue gas","textZh":"烟气中SO₃含量"},{"label":"C","text":"Flue gas temperature","textZh":"烟气温度"},{"label":"D","text":"Flue gas pressure","textZh":"烟气压力"}],"answer":["B"],"explanation":"The answer is SO₃ content in flue gas. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"烟气酸露点主要由以下因素决定：","explanationZh":"答案是烟气中SO₃的含量。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":68,"localNo":68,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"In packed column design, the primary function of a liquid redistributor is to:","options":[{"label":"A","text":"Increase gas-liquid contact area","textZh":"增加气液接触面积"},{"label":"B","text":"Reduce wall flow effect","textZh":"减少壁流效应"},{"label":"C","text":"Support packing material","textZh":"支持包装材料"},{"label":"D","text":"Recover liquid","textZh":"回收液体"}],"answer":["B"],"explanation":"The answer is Reduce wall flow effect. Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter.","stemZh":"在填充塔设计中，液体再分布器的主要功能是：","explanationZh":"答案是减少壁流效应。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。"},{"id":69,"localNo":69,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Pasquill-Gifford stability categories are determined based on routine meteorological data including:","options":[{"label":"A","text":"Wind speed, cloud cover, solar radiation","textZh":"风速、云量、太阳辐射"},{"label":"B","text":"Temperature, pressure, humidity","textZh":"温度、压力、湿度"},{"label":"C","text":"Wind speed, wind direction, temperature","textZh":"风速、风向、温度"},{"label":"D","text":"Solar radiation, cloud cover, wind direction","textZh":"太阳辐射、云量、风向"}],"answer":["A"],"explanation":"The answer is Wind speed, cloud cover, solar radiation. Pasquill-Gifford stability class describes turbulent mixing. Class A is very unstable with strong vertical mixing, while Class F is stable with weak mixing. The class is estimated from routine observations such as wind speed, solar radiation or cloud cover, and day/night conditions.","stemZh":"Pasquill-Gifford 稳定性类别是根据常规气象数据确定的，包括：","explanationZh":"答案是风速、云量、太阳辐射。 Pasquill-Gifford 稳定性等级描述了湍流混合。 A类在强烈的垂直混合下非常不稳定，而F类在弱混合下很稳定。该等级是根据风速、太阳辐射或云量以及白天/夜间条件等常规观测来估计的。"},{"id":70,"localNo":70,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"According to the Gaussian plume model (without ground reflection), the ground-level concentration with distance from source typically:","options":[{"label":"A","text":"Increases then decreases","textZh":"先增加后减少"},{"label":"B","text":"Monotonically increases","textZh":"单调增加"},{"label":"C","text":"Monotonically decreases","textZh":"单调递减"},{"label":"D","text":"Remains constant","textZh":"保持不变"}],"answer":["A"],"explanation":"The answer is Increases then decreases. The basic Gaussian plume model is a steady-state, continuous-source model. It assumes constant mean wind in the downwind direction, Gaussian spreading in the lateral and vertical directions, no chemical transformation for the basic form, and reflection at the ground for non-depositing pollutants.","stemZh":"根据高斯羽流模型（无地面反射），地面浓度随距源距离的变化通常为：","explanationZh":"答案是先增加后减少。基本高斯羽流模型是稳态、连续源模型。假设顺风方向平均风恒定，横向和垂直方向呈高斯分布，基本形态无化学变化，非沉积污染物在地面反射。"},{"id":71,"localNo":71,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"The Thiele modulus is used to determine:","options":[{"label":"A","text":"Catalyst activity","textZh":"催化剂活性"},{"label":"B","text":"The significance of internal diffusion limitation","textZh":"内部扩散限制的意义"},{"label":"C","text":"Catalyst selectivity","textZh":"催化剂选择性"},{"label":"D","text":"Reaction order","textZh":"反应顺序"}],"answer":["B"],"explanation":"The answer is The significance of internal diffusion limitation. When internal pore diffusion controls a gas-solid catalytic reaction, the observed rate is no longer just the intrinsic surface reaction rate. Concentration drops inside the catalyst particle, so the apparent kinetics become weaker than the intrinsic kinetics and the effectiveness factor is governed by the Thiele modulus.","stemZh":"蒂勒模量用于确定：","explanationZh":"答案是内部扩散限制的意义。当内部孔扩散控制气固催化反应时，观察到的速率不再仅仅是固有的表面反应速率。催化剂颗粒内部的浓度下降，因此表观动力学变得弱于内在动力学，并且有效性因子由蒂勒模量控制。"},{"id":72,"localNo":72,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Which is NOT a desirable property of an adsorbent?","options":[{"label":"A","text":"High specific surface area","textZh":"高比表面积"},{"label":"B","text":"High selectivity","textZh":"高选择性"},{"label":"C","text":"Low thermal stability","textZh":"热稳定性低"},{"label":"D","text":"Easy regeneration","textZh":"易于再生"}],"answer":["C"],"explanation":"The answer is Low thermal stability. VOC adsorption uses porous solids such as activated carbon, zeolites, silica gel, alumina, or polymeric resins. Capacity depends on pore structure, surface chemistry, humidity, temperature, inlet concentration, and regeneration history. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"哪项不是吸附剂的理想特性？","explanationZh":"答案是热稳定性低。 VOC 吸附使用多孔固体，例如活性炭、沸石、硅胶、氧化铝或聚合物树脂。容量取决于孔隙结构、表面化学、湿度、温度、入口浓度和再生历史。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":73,"localNo":73,"type":"single","partEn":"Single Choice","partZh":"单选题","stem":"Condensation is suitable for treating VOC gas streams with:","options":[{"label":"A","text":"Very low concentration","textZh":"浓度极低"},{"label":"B","text":"Medium concentration","textZh":"中等浓度"},{"label":"C","text":"High concentr
