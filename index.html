; Flue gas recirculation (FGR); Low excess air operation; Water or steam injection; Burner modification (low-NOx burners). Thermal NOx is governed mainly by high flame temperature, oxygen availability, and residence time at high temperature. Low-NOx methods such as staged combustion, flue gas recirculation, low excess air, steam or water injection, and burner redesign lower temperature peaks or oxygen exposure.","stemZh":"低氮氧化物燃烧技术包括：","explanationZh":"选择对应于以下内容的选项： 分级燃烧（空气/燃料分级）；烟气再循环（FGR）；低过量空气运行；注水或蒸汽；燃烧器改造（低氮氧化物燃烧器）。热力 NOx 主要受高火焰温度、氧气可用性和高温停留时间的影响。低氮氧化物排放方法，如分级燃烧、烟气再循环、低过量空气、蒸汽或水喷射，以及燃烧器重新设计，降低温度峰值或氧气暴露。"},{"id":145,"localNo":45,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In gas absorption, the liquid-film mass transfer coefficient depends on:","options":[{"label":"A","text":"Liquid flow velocity or Reynolds number","textZh":"液体流速或雷诺数"},{"label":"B","text":"Liquid viscosity","textZh":"液体粘度"},{"label":"C","text":"Solute diffusion coefficient in liquid","textZh":"溶质在液体中的扩散系数"},{"label":"D","text":"Packing type (geometry, surface area)","textZh":"填料类型（几何形状、表面积）"},{"label":"E","text":"Operating temperature","textZh":"工作温度"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Liquid flow velocity or Reynolds number; Liquid viscosity; Solute diffusion coefficient in liquid; Packing type (geometry, surface area); Operating temperature. External diffusion control means the slow step is transport through the gas film around the particle or packing surface. Increasing gas velocity thins the boundary layer and raises the mass-transfer coefficient, so it helps much more than simply increasing intrinsic catalyst activity.","stemZh":"在气体吸收中，液膜传质系数取决于：","explanationZh":"选择对应于以下内容的选项：液体流速或雷诺数；液体粘度；溶质在液体中的扩散系数；填料类型（几何形状、表面积）；工作温度。外部扩散控制意味着缓慢的步骤是通过颗粒或填料表面周围的气膜传输。增加气体速度可以使边界层变薄并提高传质系数，因此它比简单地增加催化剂的内在活性更有帮助。"},{"id":146,"localNo":46,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Common types of adsorption isotherms include:","options":[{"label":"A","text":"Type I (Langmuir, monolayer)","textZh":"I 型（Langmuir，单层）"},{"label":"B","text":"Type II (S-shaped, multilayer)","textZh":"II型（S形，多层）"},{"label":"C","text":"Type III (convex, weak adsorbent-adsorbate interaction)","textZh":"III 型（凸面，弱吸附剂-吸附质相互作用）"},{"label":"D","text":"Type IV (mesoporous, hysteresis)","textZh":"IV 型（介孔，滞后）"},{"label":"E","text":"Type V (multilayer with weak interaction)","textZh":"V型（弱相互作用多层）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Type I (Langmuir, monolayer); Type II (S-shaped, multilayer); Type III (convex, weak adsorbent-adsorbate interaction); Type IV (mesoporous, hysteresis); Type V (multilayer with weak interaction). The Langmuir isotherm describes monolayer adsorption on a homogeneous surface with a finite number of sites. Once sites are filled, adsorption approaches saturation rather than increasing indefinitely.","stemZh":"常见类型的吸附等温线包括：","explanationZh":"选择对应于以下内容的选项： I 型（Langmuir，单层）； II型（S形，多层）； III 型（凸面，弱吸附剂-吸附质相互作用）； IV型（介孔，滞后）； V 型（弱相互作用多层）。朗缪尔等温线描述了具有有限数量位点的均匀表面上的单层吸附。一旦位点被填满，吸附就会接近饱和而不是无限增加。"},{"id":147,"localNo":47,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Desirable characteristics of catalysts for catalytic combustion include:","options":[{"label":"A","text":"High activity at moderate temperatures","textZh":"中等温度下的高活性"},{"label":"B","text":"High selectivity for complete oxidation (to CO₂ and H₂O)","textZh":"高选择性完全氧化（生成 CO2 和 H2O）"},{"label":"C","text":"Good thermal stability and resistance to sintering","textZh":"良好的热稳定性和抗烧结性"},{"label":"D","text":"Long service life (resistance to poisoning and fouling)","textZh":"使用寿命长（耐中毒、耐污垢）"},{"label":"E","text":"Low cost and availability","textZh":"低成本和可用性"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: High activity at moderate temperatures; High selectivity for complete oxidation (to CO₂ and H₂O); Good thermal stability and resistance to sintering; Long service life (resistance to poisoning and fouling); Low cost and availability. Catalyst poisoning occurs when impurities are strongly chemisorbed on active sites. Those sites are then unavailable for the desired reaction, which is why poisoning is usually more serious and less reversible than ordinary fouling.","stemZh":"催化燃烧催化剂的理想特性包括：","explanationZh":"选择对应于以下内容的选项： 中等温度下的高活性；高选择性完全氧化（生成 CO2 和 H2O）；良好的热稳定性和抗烧结性；使用寿命长（耐中毒、耐污垢）；低成本和可用性。当杂质强烈化学吸附在活性位点上时，就会发生催化剂中毒。这些部位无法进行所需的反应，这就是为什么中毒通常比普通污垢更严重且更难逆转的原因。"},{"id":148,"localNo":48,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The efficiency of thermal/catalytic combustion for VOC destruction is mainly determined by:","options":[{"label":"A","text":"Operating temperature","textZh":"工作温度"},{"label":"B","text":"Gas residence time in the combustion zone","textZh":"气体在燃烧区的停留时间"},{"label":"C","text":"Turbulence and mixing intensity","textZh":"湍流和混合强度"},{"label":"D","text":"Oxygen concentration (excess air)","textZh":"氧气浓度（过量空气）"},{"label":"E","text":"Initial VOC concentration in the feed gas","textZh":"原料气中 VOC 初始浓度"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Operating temperature; Gas residence time in the combustion zone; Turbulence and mixing intensity; Oxygen concentration (excess air); Initial VOC concentration in the feed gas. For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"热/催化燃烧破坏 VOC 的效率主要取决于：","explanationZh":"选择对应于以下内容的选项： 工作温度；气体在燃烧区的停留时间；湍流和混合强度；氧气浓度（过量空气）；原料气中的初始 VOC 浓度。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":149,"localNo":49,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Regarding land use change (LUC) in LCA methodology, which statements are correct?","options":[{"label":"A","text":"Direct Land Use Change (DLUC) can be estimated using measurement or carbon stock models","textZh":"直接土地利用变化（DLUC）可以使用测量或碳储量模型来估计"},{"label":"B","text":"Indirect Land Use Change (ILUC) is estimated using economic equilibrium models","textZh":"使用经济均衡模型估算间接土地利用变化 (ILUC)"},{"label":"C","text":"ILUC is generally more uncertain than DLUC","textZh":"ILUC 通常比 DLUC 更不确定"},{"label":"D","text":"DLUC only refers to changes during crop growth","textZh":"DLUC仅指作物生长过程中的变化"},{"label":"E","text":"Both DLUC and ILUC should be considered in WTT emissions","textZh":"WTT 排放中应考虑 DLUC 和 ILUC"}],"answer":["A","B","C","E"],"explanation":"Select the choices that correspond to: Direct Land Use Change (DLUC) can be estimated using measurement or carbon stock models; Indirect Land Use Change (ILUC) is estimated using economic equilibrium models; ILUC is generally more uncertain than DLUC; Both DLUC and ILUC should be considered in WTT emissions. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"关于 LCA 方法中的土地利用变化 (LUC)，哪些陈述是正确的？","explanationZh":"选择对应于以下内容的选项： 直接土地利用变化 (DLUC) 可使用测量或碳储量模型进行估算；使用经济均衡模型估算间接土地利用变化（ILUC）； ILUC 通常比 DLUC 更不确定； WTT 排放中应考虑 DLUC 和 ILUC。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":150,"localNo":50,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The feedstock acquisition stage in WTT emission calculations includes the following activities:","options":[{"label":"A","text":"Coal mining","textZh":"采煤"},{"label":"B","text":"Crude oil extraction","textZh":"原油开采"},{"label":"C","text":"Biomass cultivation (energy crops)","textZh":"生物质种植（能源作物）"},{"label":"D","text":"Waste oil collection","textZh":"废油收集"},{"label":"E","text":"Natural gas processing/liquefaction","textZh":"天然气加工/液化"}],"answer":["A","B","C","D"],"explanation":"Select the choices that correspond to: Coal mining; Crude oil extraction; Biomass cultivation (energy crops); Waste oil collection. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"WTT 排放计算中的原料获取阶段包括以下活动：","explanationZh":"选择对应于以下内容的选项： 煤炭开采；原油开采；生物质种植（能源作物）；废油收集。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":151,"localNo":51,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Emissions during the transport and distribution stage in WTT include:","options":[{"label":"A","text":"Energy consumption for pipeline transport","textZh":"管道运输能源消耗"},{"label":"B","text":"Fuel consumption for marine or road transport","textZh":"海运或公路运输的燃料消耗"},{"label":"C","text":"Fugitive emissions from storage tanks","textZh":"储罐的无组织排放"},{"label":"D","text":"Evaporative losses during bunkering","textZh":"加注过程中的蒸发损失"},{"label":"E","text":"Emissions from conversion/reforming processes","textZh":"转化/重整过程的排放"}],"answer":["A","B","C","D"],"explanation":"Select the choices that correspond to: Energy consumption for pipeline transport; Fuel consumption for marine or road transport; Fugitive emissions from storage tanks; Evaporative losses during bunkering. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"WTT 运输和配送阶段的排放包括：","explanationZh":"选择对应于以下内容的选项： 管道运输的能源消耗；海运或公路运输的燃料消耗；储罐的无组织排放；加注过程中的蒸发损失。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":152,"localNo":52,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Regarding carbon neutrality of biomass fuels in LCA, which statements are correct?","options":[{"label":"A","text":"CO₂ from biomass combustion is not counted as TTW emission","textZh":"生物质燃烧产生的二氧化碳不计入 TTW 排放量"},{"label":"B","text":"CO₂ absorbed during biomass growth is included as negative emission","textZh":"生物质生长过程中吸收的二氧化碳包含在负排放中"},{"label":"C","text":"Biomass combustion CO₂ is reported as an information item only","textZh":"生物质燃烧二氧化碳仅作为信息项目报告"},{"label":"D","text":"Biomass fuel has a CO₂ emission factor of zero","textZh":"生物质燃料的二氧化碳排放因子为零"},{"label":"E","text":"Biomass CO₂ must be multiplied by GWP100 and included","textZh":"生物质二氧化碳必须乘以 GWP100 并包含在内"}],"answer":["A","C","D"],"explanation":"Select the choices that correspond to: CO₂ from biomass combustion is not counted as TTW emission; Biomass combustion CO₂ is reported as an information item only; Biomass fuel has a CO₂ emission factor of zero. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"关于LCA中生物质燃料的碳中和，哪些陈述是正确的？","explanationZh":"选择对应于以下内容的选项： 生物质燃烧产生的二氧化碳不计入 TTW 排放量；生物质燃烧二氧化碳仅作为信息项目报告；生物质燃料的二氧化碳排放因子为零。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":153,"localNo":53,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Tank-to-Wake (TTW) emissions in the IMO Guidelines include:","options":[{"label":"A","text":"CO₂ emissions from fuel combustion in the engine","textZh":"发动机中燃料燃烧产生的二氧化碳排放"},{"label":"B","text":"Methane slip (unburned CH₄) from the engine","textZh":"发动机中的甲烷泄漏（未燃烧的 CH₄）"},{"label":"C","text":"N₂O emissions from combustion or aftertreatment","textZh":"燃烧或后处理产生的 N2O 排放"},{"label":"D","text":"Fuel vapor losses during bunkering operations","textZh":"加注操作期间的燃油蒸气损失"},{"label":"E","text":"Fugitive emissions from onboard fuel systems","textZh":"车载燃油系统的无组织排放"}],"answer":["A","B","C","E"],"explanation":"Select the choices that correspond to: CO₂ emissions from fuel combustion in the engine; Methane slip (unburned CH₄) from the engine; N₂O emissions from combustion or aftertreatment; Fugitive emissions from onboard fuel systems. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"IMO 指南中的储罐至苏醒 (TTW) 排放包括：","explanationZh":"选择与以下内容相对应的选项： 发动机中燃料燃烧产生的二氧化碳排放量；发动机中的甲烷泄漏（未燃烧的 CH₄）；燃烧或后处理产生的 N2O 排放；机载燃油系统的无组织排放。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":154,"localNo":54,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Regarding Carbon Capture and Storage (CCS) accounting in LCA, which are correct?","options":[{"label":"A","text":"Captured carbon can be deducted from total emissions","textZh":"捕获的碳可以从总排放量中扣除"},{"label":"B","text":"Energy consumption for capture is included in WTT","textZh":"捕集能耗包含在 WTT 中"},{"label":"C","text":"The GHG reduction benefit of CCS is reflected in the WTT stage","textZh":"CCS的温室气体减排效益体现在WTT阶段"},{"label":"D","text":"Sequestered carbon is permanently stored, causing no further emissions","textZh":"封存的碳被永久储存，不会造成进一步的排放"},{"label":"E","text":"CCS technology is mature and widely applied for all pathways","textZh":"CCS技术成熟并广泛应用于各途径"}],"answer":["A","B","C","D"],"explanation":"Select the choices that correspond to: Captured carbon can be deducted from total emissions; Energy consumption for capture is included in WTT; The GHG reduction benefit of CCS is reflected in the WTT stage; Sequestered carbon is permanently stored, causing no further emissions. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"关于 LCA 中的碳捕集与封存 (CCS) 核算，哪些是正确的？","explanationZh":"选择对应于以下内容的选项： 捕获的碳可以从总排放量中扣除；捕集能耗包含在WTT中； CCS的温室气体减排效益体现在WTT阶段；封存的碳被永久储存，不会造成进一步的排放。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":155,"localNo":55,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Sustainability themes for marine fuels under the IMO LCA Guidelines include:","options":[{"label":"A","text":"Greenhouse gas emissions","textZh":"温室气体排放"},{"label":"B","text":"Water resource consumption","textZh":"水资源消耗"},{"label":"C","text":"Air quality impacts","textZh":"空气质量影响"},{"label":"D","text":"Soil degradation","textZh":"土壤退化"},{"label":"E","text":"Biodiversity and conservation","textZh":"生物多样性和保护"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Greenhouse gas emissions; Water resource consumption; Air quality impacts; Soil degradation; Biodiversity and conservation. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"IMO LCA 指南中船用燃料的可持续性主题包括：","explanationZh":"选择对应于以下内容的选项： 温室气体排放；水资源消耗；空气质量影响；土壤退化；生物多样性和保护。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":156,"localNo":56,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Low-carbon marine fuel options covered by the IMO LCA Guidelines include:","options":[{"label":"A","text":"Heavy Fuel Oil (HFO)","textZh":"重质燃油 (HFO)"},{"label":"B","text":"Liquefied Natural Gas (LNG)","textZh":"液化天然气（LNG）"},{"label":"C","text":"Bio-methanol","textZh":"生物甲醇"},{"label":"D","text":"Green ammonia","textZh":"绿氨"},{"label":"E","text":"Green hydrogen","textZh":"绿色氢气"}],"answer":["C","D","E"],"explanation":"Select the choices that correspond to: Bio-methanol; Green ammonia; Green hydrogen. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"IMO LCA 指南涵盖的低碳船用燃料选择包括：","explanationZh":"选择对应于以下内容的选项：生物甲醇；绿氨；绿色氢气。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":157,"localNo":57,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Regarding the attributional approach and allocation in LCA, which statements are correct?","options":[{"label":"A","text":"System boundary expansion is considered case-by-case","textZh":"系统边界扩展需具体情况考虑"},{"label":"B","text":"It is the recommended method for co-product handling","textZh":"这是副产品处理的推荐方法"},{"label":"C","text":"Not the preferred method in the IMO Guidelines","textZh":"不是 IMO 指南中的首选方法"},{"label":"D","text":"Based on market value for allocation","textZh":"根据市场价值进行分配"},{"label":"E","text":"May introduce uncertainties","textZh":"可能会带来不确定性"}],"answer":["A","B","E"],"explanation":"Select the choices that correspond to: System boundary expansion is considered case-by-case; It is the recommended method for co-product handling; May introduce uncertainties. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"关于LCA中的归因方法和分配，哪些说法是正确的？","explanationZh":"选择对应于以下内容的选项： 系统边界扩展视具体情况而定；这是副产品处理的推荐方法；可能会带来不确定性。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":158,"localNo":58,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In the IMO LCA Guidelines, GWP values are provided for which time horizons?","options":[{"label":"A","text":"20 years (GWP20)","textZh":"20 年 (GWP20)"},{"label":"B","text":"50 years (GWP50)","textZh":"50 年 (GWP50)"},{"label":"C","text":"100 years (GWP100)","textZh":"100 年 (GWP100)"},{"label":"D","text":"200 years (GWP200)","textZh":"200 年 (GWP200)"},{"label":"E","text":"500 years (GWP500)","textZh":"500 年 (GWP500)"}],"answer":["A","C"],"explanation":"Select the choices that correspond to: 20 years (GWP20); 100 years (GWP100). Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"IMO LCA 指南中提供了哪些时间范围的 GWP 值？","explanationZh":"选择对应于以下内容的选项：20 年 (GWP20)； 100 年（GWP100）。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":159,"localNo":59,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"GHG intensity in LCA can be expressed in the following units:","options":[{"label":"A","text":"gCO₂eq per MJ of fuel (LCV basis)","textZh":"每 MJ 燃料的 gCO2eq（LCV 基础）"},{"label":"B","text":"gCO₂eq per tonne-km","textZh":"gCO2eq 每吨公里"},{"label":"C","text":"kgCO₂eq per kg of fuel","textZh":"kgCO2eq 每公斤燃料"},{"label":"D","text":"gCO₂ per kWh","textZh":"克二氧化碳每千瓦时"},{"label":"E","text":"Parts per million (ppm)","textZh":"百万分率 (ppm)"}],"answer":["A","C","D"],"explanation":"Select the choices that correspond to: gCO₂eq per MJ of fuel (LCV basis); kgCO₂eq per kg of fuel; gCO₂ per kWh. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"LCA 中的温室气体强度可以用以下单位表示：","explanationZh":"选择对应于以下内容的选项： 每 MJ 燃料的 gCO2eq（LCV 基础）； kgCO2eq 每公斤燃料；每千瓦时 gCO2。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":160,"localNo":60,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Receptor models for source apportionment (e.g., CMB, PMF) differ from source-oriented models in that they:","options":[{"label":"A","text":"Are based on receptor site monitoring data","textZh":"基于受体位点监测数据"},{"label":"B","text":"Can be used to validate source inventory estimates","textZh":"可用于验证源库存估算"},{"label":"C","text":"Cannot be used to predict impacts of new sources","textZh":"不能用于预测新来源的影响"},{"label":"D","text":"Are less dependent on detailed emission inventory data","textZh":"较少依赖详细的排放清单数据"},{"label":"E","text":"Are primarily used for retrospective source attribution","textZh":"主要用于追溯来源归属"}],"answer":["A","B","D","E"],"explanation":"Select the choices that correspond to: Are based on receptor site monitoring data; Can be used to validate source inventory estimates; Are less dependent on detailed emission inventory data; Are primarily used for retrospective source attribution. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"用于源分配的受体模型（例如，CMB、PMF）与面向源的模型的不同之处在于：","explanationZh":"选择对应于以下内容的选项： 基于受体位点监测数据；可用于验证源库存估算；较少依赖详细的排放清单数据；主要用于追溯来源归属。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":161,"localNo":61,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The health effects of particulate matter depend on which factors?","options":[{"label":"A","text":"Particle aerodynamic diameter (size)","textZh":"颗粒空气动力学直径（尺寸）"},{"label":"B","text":"Chemical composition (toxicity)","textZh":"化学成分（毒性）"},{"label":"C","text":"Ambient concentration","textZh":"环境浓度"},{"label":"D","text":"Duration of exposure","textZh":"暴露时间"},{"label":"E","text":"Individual susceptibility (age, health status)","textZh":"个人易感性（年龄、健康状况）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Particle aerodynamic diameter (size); Chemical composition (toxicity); Ambient concentration; Duration of exposure; Individual susceptibility (age, health status). Particle health and control behavior depend strongly on aerodynamic diameter. PM2.5 penetrates deeper into the respiratory system and remains suspended longer than coarse particles, while PM10 includes a broader coarse fraction.","stemZh":"颗粒物对健康的影响取决于哪些因素？","explanationZh":"选择对应于以下内容的选项： 颗粒空气动力学直径（尺寸）；化学成分（毒性）；环境浓度；暴露时间；个人易感性（年龄、健康状况）。颗粒健康和控制行为很大程度上取决于空气动力学直径。 PM2.5 可以更深入地渗透到呼吸系统中，并且比粗颗粒悬浮的时间更长，而 PM10 则包含更广泛的粗颗粒。"},{"id":162,"localNo":62,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In turbulent diffusion, the dispersion coefficients (Kx, Ky, Kz) typically have the following relationships:","options":[{"label":"A","text":"Kx > Ky (longitudinal > lateral)","textZh":"Kx > Ky（纵向 > 横向）"},{"label":"B","text":"Ky > Kz (lateral > vertical)","textZh":"Ky > Kz（横向 > 纵向）"},{"label":"C","text":"Kx > Kz (longitudinal > vertical)","textZh":"Kx > Kz（纵向 > 垂直）"},{"label":"D","text":"Kz > Ky (vertical > lateral)","textZh":"Kz > Ky（垂直 > 横向）"},{"label":"E","text":"All are equal in isotropic turbulence","textZh":"在各向同性湍流中一切都是平等的"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Kx > Ky (longitudinal > lateral); Ky > Kz (lateral > vertical); Kx > Kz (longitudinal > vertical). Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"在湍流扩散中，色散系数（Kx、Ky、Kz）通常具有以下关系：","explanationZh":"选择对应的选项：Kx > Ky（纵向 > 横向）； Ky>Kz（横向>纵向）； Kx > Kz（纵向 > 垂直）。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":163,"localNo":63,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The Gaussian plume model has limitations and cannot be applied to:","options":[{"label":"A","text":"Calm or very low wind speed conditions","textZh":"平静或极低风速条件"},{"label":"B","text":"Highly unstable atmospheric conditions","textZh":"大气条件高度不稳定"},{"label":"C","text":"Long-term average concentration estimation","textZh":"长期平均浓度估算"},{"label":"D","text":"Complex or hilly terrain","textZh":"复杂或丘陵地形"},{"label":"E","text":"Instantaneous (puff) releases","textZh":"瞬时（抽吸）释放"}],"answer":["A","D","E"],"explanation":"Select the choices that correspond to: Calm or very low wind speed conditions; Complex or hilly terrain; Instantaneous (puff) releases. The basic Gaussian plume model is a steady-state, continuous-source model. It assumes constant mean wind in the downwind direction, Gaussian spreading in the lateral and vertical directions, no chemical transformation for the basic form, and reflection at the ground for non-depositing pollutants. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"高斯羽流模型有局限性，不能应用于：","explanationZh":"选择对应于以下内容的选项： 无风或极低风速条件；地形复杂或丘陵；瞬时（抽吸）释放。基本高斯羽流模型是稳态、连续源模型。假设顺风方向平均风恒定，横向和垂直方向呈高斯分布，基本形态无化学变化，非沉积污染物在地面反射。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":164,"localNo":64,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In stack design according to GB/T3840-91, the effective stack height should consider:","options":[{"label":"A","text":"Ground-level maximum concentration (Cmax) criterion","textZh":"地面最大浓度 (Cmax) 标准"},{"label":"B","text":"Absolute maximum concentration criterion","textZh":"绝对最大浓度标准"},{"label":"C","text":"A specified assurance rate (e.g., 50% or 80%)","textZh":"指定的保证率（例如 50% 或 80%）"},{"label":"D","text":"Building wake effects","textZh":"建筑尾流效果"},{"label":"E","text":"Plume rise calculated by standard formulas","textZh":"通过标准公式计算的烟羽上升"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Ground-level maximum concentration (Cmax) criterion; Absolute maximum concentration criterion; A specified assurance rate (e.g., 50% or 80%); Building wake effects; Plume rise calculated by standard formulas. Effective stack height is the physical stack height plus plume rise. Plume rise is controlled by exit momentum, buoyancy from hot stack gas, stack diameter, and ambient wind; higher stacks generally reduce nearby ground concentration but the word 'always' is unsafe because meteorology and terrain also matter.","stemZh":"按GB/T3840-91进行堆垛设计时，有效堆垛高度应考虑：","explanationZh":"选择对应于以下内容的选项： 地面最大浓度 (Cmax) 标准；绝对最大浓度标准；指定的保证率（例如50%或80%）；建立尾流效果；通过标准公式计算的烟羽上升。有效堆叠高度是物理堆叠高度加上羽流上升。羽流上升由出口动量、热烟囱气体的浮力、烟囱直径和环境风控制；较高的烟囱通常会减少附近地面的浓度，但“总是”这个词并不安全，因为气象和地形也很重要。"},{"id":165,"localNo":65,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Combustion stoichiometric calculations require mass or mole balances for which elements?","options":[{"label":"A","text":"Carbon (C)","textZh":"碳（C）"},{"label":"B","text":"Hydrogen (H)","textZh":"氢 (H)"},{"label":"C","text":"Oxygen (O)","textZh":"氧气 (O)"},{"label":"D","text":"Nitrogen (N)","textZh":"氮 (N)"},{"label":"E","text":"Sulfur (S)","textZh":"硫（S）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Carbon (C); Hydrogen (H); Oxygen (O); Nitrogen (N); Sulfur (S). This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"燃烧化学计量计算需要哪些元素的质量或摩尔平衡？","explanationZh":"选择对应于的选项： 碳 (C)；氢（H）；氧气（O）；氮（N）；硫（S）。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":166,"localNo":66,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"For emission factor-based inventory, actual emissions are computed using:","options":[{"label":"A","text":"Activity level data (e.g., fuel consumption)","textZh":"活动水平数据（例如燃料消耗）"},{"label":"B","text":"Applicable emission factor (e.g., g/kg fuel)","textZh":"适用排放因子（例如，g/kg 燃料）"},{"label":"C","text":"Control device efficiency or removal factor","textZh":"控制装置效率或去除系数"},{"label":"D","text":"Meteorological dispersion parameters","textZh":"气象色散参数"},{"label":"E","text":"Local population density","textZh":"当地人口密度"}],"answer":["A","B","C"],"explanation":"Select the choices that correspond to: Activity level data (e.g., fuel consumption); Applicable emission factor (e.g., g/kg fuel); Control device efficiency or removal factor. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"对于基于排放因子的清单，实际排放量的计算方法为：","explanationZh":"选择对应于以下内容的选项： 活动水平数据（例如燃料消耗）；适用的排放因子（例如，g/kg燃料）；控制装置效率或去除系数。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":167,"localNo":67,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Air emission inventory compilation methods include:","options":[{"label":"A","text":"Bottom-up approach (activity × EF)","textZh":"自下而上的方法（活动 × EF）"},{"label":"B","text":"Top-down approach (fuel sales × EF)","textZh":"自上而下的方法（燃料销量 × EF）"},{"label":"C","text":"Inverse modeling (using ambient data)","textZh":"逆向建模（使用环境数据）"},{"label":"D","text":"Extrapolation from similar sources","textZh":"从类似来源推断"},{"label":"E","text":"Analogy with other facilities","textZh":"与其他设施类比"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Bottom-up approach (activity × EF); Top-down approach (fuel sales × EF); Inverse modeling (using ambient data); Extrapolation from similar sources; Analogy with other facilities. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"大气排放清单编制方法包括：","explanationZh":"选择对应于以下内容的选项： 自下而上方法（活动 × EF）；自上而下的方法（燃料销量×EF）；逆向建模（使用环境数据）；从类似来源推断；与其他设施类比。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":168,"localNo":68,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Common particulate sampling methods include:","options":[{"label":"A","text":"Filter membrane sampling","textZh":"滤膜取样"},{"label":"B","text":"Impaction (cascade impactors)","textZh":"冲击（级联冲击器）"},{"label":"C","text":"Sedimentation/gravitational settling","textZh":"沉积/重力沉降"},{"label":"D","text":"Centrifugal separation","textZh":"离心分离"},{"label":"E","text":"Electrostatic precipitation sampling","textZh":"静电降水采样"}],"answer":["A","B","C","E"],"explanation":"Select the choices that correspond to: Filter membrane sampling; Impaction (cascade impactors); Sedimentation/gravitational settling; Electrostatic precipitation sampling. A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"常见的颗粒物采样方法包括：","explanationZh":"选择对应于的选项：过滤膜采样；冲击（级联冲击器）；沉积/重力沉降；静电降水采样。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":169,"localNo":69,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The flow patterns inside a cyclone separator include:","options":[{"label":"A","text":"Outer downward helix (vortex)","textZh":"外向下螺旋（涡流）"},{"label":"B","text":"Inner upward helix (vortex)","textZh":"内向上螺旋（涡流）"},{"label":"C","text":"Axial downward flow at the center","textZh":"中心轴向向下流动"},{"label":"D","text":"Axial upward flow at the wall","textZh":"壁面轴向向上流动"},{"label":"E","text":"Radial inward flow in the conical section","textZh":"圆锥截面内的径向向内流动"}],"answer":["A","B"],"explanation":"Select the choices that correspond to: Outer downward helix (vortex); Inner upward helix (vortex). A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"旋风分离器内的流型包括：","explanationZh":"选择对应于以下内容的选项： 外向下螺旋（涡流）；内部向上螺旋（涡流）。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":170,"localNo":70,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Dust resistivity affects ESP performance through:","options":[{"label":"A","text":"High resistivity causing back corona","textZh":"高电阻率引起反电晕"},{"label":"B","text":"Low resistivity causing particle re-entrainment","textZh":"低电阻率导致颗粒再夹带"},{"label":"C","text":"Medium resistivity giving highest efficiency","textZh":"中等电阻率提供最高效率"},{"label":"D","text":"Resistivity having no effect on efficiency","textZh":"电阻率对效率没有影响"},{"label":"E","text":"Resistivity influencing voltage and current distribution","textZh":"电阻率影响电压和电流分布"}],"answer":["A","B","C","E"],"explanation":"Select the choices that correspond to: High resistivity causing back corona; Low resistivity causing particle re-entrainment; Medium resistivity giving highest efficiency; Resistivity influencing voltage and current distribution. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"粉尘电阻率通过以下方式影响 ESP 性能：","explanationZh":"选择对应于以下内容的选项： 高电阻率导致反电晕；低电阻率导致颗粒再夹带；中等电阻率，效率最高；电阻率影响电压和电流分布。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":171,"localNo":71,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Baghouse filter bags can be damaged by:","options":[{"label":"A","text":"High gas temperature (thermal degradation)","textZh":"高气体温度（热降解）"},{"label":"B","text":"Chemical attack (acid or alkali)","textZh":"化学侵蚀（酸或碱）"},{"label":"C","text":"Mechanical abrasion and wear","textZh":"机械磨损和磨损"},{"label":"D","text":"Excessive cleaning energy","textZh":"清洁能源过多"},{"label":"E","text":"Moisture condensation and plugging (mudding)","textZh":"水分凝结和堵塞（泥化）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: High gas temperature (thermal degradation); Chemical attack (acid or alkali); Mechanical abrasion and wear; Excessive cleaning energy; Moisture condensation and plugging (mudding). Fabric filters collect particles by sieving through the dust cake plus mechanisms such as inertial impaction, interception, and Brownian diffusion. For submicron particles, Brownian diffusion becomes especially important.","stemZh":"袋式除尘器滤袋可能会因以下原因损坏：","explanationZh":"选择对应于以下内容的选项： 高气体温度（热降解）；化学侵蚀（酸或碱）；机械磨损和磨损；清洁能源过多；水分凝结和堵塞（泥化）。织物过滤器通过筛分尘饼以及惯性冲击、拦截和布朗扩散等机制来收集颗粒。对于亚微米颗粒，布朗扩散变得尤其重要。"},{"id":172,"localNo":72,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Methods to improve the collection efficiency of a wet scrubber include:","options":[{"label":"A","text":"Increasing the liquid-to-gas (L/G) ratio","textZh":"提高液气 (L/G) 比"},{"label":"B","text":"Increasing the gas velocity through the scrubber","textZh":"增加通过洗涤器的气体速度"},{"label":"C","text":"Reducing the droplet size (atomization)","textZh":"减小液滴尺寸（雾化）"},{"label":"D","text":"Increasing the gas-liquid contact time","textZh":"增加气液接触时间"},{"label":"E","text":"Adding chemical reagents to enhance capture","textZh":"添加化学试剂以增强捕获"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Increasing the liquid-to-gas (L/G) ratio; Increasing the gas velocity through the scrubber; Reducing the droplet size (atomization); Increasing the gas-liquid contact time; Adding chemical reagents to enhance capture. Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter.","stemZh":"提高湿式洗涤器收集效率的方法包括：","explanationZh":"选择对应于以下内容的选项： 增加液气 (L/G) 比率；增加通过洗涤器的气体速度；减小液滴尺寸（雾化）；增加气液接触时间；添加化学试剂以增强捕获。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。"},{"id":173,"localNo":73,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Energy consumption in a Venturi scrubber occurs through:","options":[{"label":"A","text":"Gas acceleration through the throat","textZh":"气体通过喉咙加速"},{"label":"B","text":"Liquid atomization into fine droplets","textZh":"将液体雾化成细小的液滴"},{"label":"C","text":"Gas-liquid mixing and turbulence","textZh":"气液混合和湍流"},{"label":"D","text":"Liquid pump work (recirculation)","textZh":"液泵工作（再循环）"},{"label":"E","text":"Gas fan/blower work (overcoming pressure drop)","textZh":"燃气风扇/鼓风机工作（克服压降）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Gas acceleration through the throat; Liquid atomization into fine droplets; Gas-liquid mixing and turbulence; Liquid pump work (recirculation); Gas fan/blower work (overcoming pressure drop). Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter.","stemZh":"文丘里洗涤器中的能源消耗通过以下方式发生：","explanationZh":"选择对应于以下内容的选项： 通过喉咙的气体加速；将液体雾化成细小液滴；气液混合和湍流；液泵工作（再循环）；燃气风扇/鼓风机工作（克服压降）。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。"},{"id":174,"localNo":74,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"VOC recovery technologies include:","options":[{"label":"A","text":"Adsorption on porous solids","textZh":"多孔固体上的吸附"},{"label":"B","text":"Absorption into liquid solvents","textZh":"吸收到液体溶剂中"},{"label":"C","text":"Condensation by cooling","textZh":"冷却凝结"},{"label":"D","text":"Membrane separation","textZh":"膜分离"},{"label":"E","text":"Incineration (thermal destruction)","textZh":"焚烧（热破坏）"}],"answer":["A","B","C","D"],"explanation":"Select the choices that correspond to: Adsorption on porous solids; Absorption into liquid solvents; Condensation by cooling; Membrane separation. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"VOC回收技术包括：","explanationZh":"选择对应于以下内容的选项：多孔固体上的吸附；吸收到液体溶剂中；冷却冷凝；膜分离。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":175,"localNo":75,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Common regeneration methods for spent adsorbents include:","options":[{"label":"A","text":"Thermal regeneration (hot gas or steam)","textZh":"热再生（热气体或蒸汽）"},{"label":"B","text":"Pressure swing (PSA)","textZh":"变压 (PSA)"},{"label":"C","text":"Solvent washing","textZh":"溶剂清洗"},{"label":"D","text":"Microwave or dielectric heating","textZh":"微波或电介质加热"},{"label":"E","text":"Chemical treatment (reactive regeneration)","textZh":"化学处理（反应再生）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Thermal regeneration (hot gas or steam); Pressure swing (PSA); Solvent washing; Microwave or dielectric heating; Chemical treatment (reactive regeneration). VOC adsorption uses porous solids such as activated carbon, zeolites, silica gel, alumina, or polymeric resins. Capacity depends on pore structure, surface chemistry, humidity, temperature, inlet concentration, and regeneration history.","stemZh":"废吸附剂的常见再生方法包括：","explanationZh":"选择对应于的选项： 热再生（热气体或蒸汽）；变压（PSA）；溶剂清洗；微波或电介质加热；化学处理（反应性再生）。 VOC 吸附使用多孔固体，例如活性炭、沸石、硅胶、氧化铝或聚合物树脂。容量取决于孔隙结构、表面化学、湿度、温度、入口浓度和再生历史。"},{"id":176,"localNo":76,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The efficiency of VOC adsorption is influenced by:","options":[{"label":"A","text":"Adsorbent properties (pore size, surface chemistry)","textZh":"吸附特性（孔径、表面化学）"},{"label":"B","text":"VOC properties (polarity, molecular weight, boiling point)","textZh":"VOC特性（极性、分子量、沸点）"},{"label":"C","text":"Operating temperature and pressure","textZh":"工作温度和压力"},{"label":"D","text":"Presence of co-existing gases (competition)","textZh":"共存气体的存在（竞争）"},{"label":"E","text":"Humidity in the gas stream","textZh":"气流中的湿度"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Adsorbent properties (pore size, surface chemistry); VOC properties (polarity, molecular weight, boiling point); Operating temperature and pressure; Presence of co-existing gases (competition); Humidity in the gas stream. VOC adsorption uses porous solids such as activated carbon, zeolites, silica gel, alumina, or polymeric resins. Capacity depends on pore structure, surface chemistry, humidity, temperature, inlet concentration, and regeneration history.","stemZh":"VOC 吸附效率受以下因素影响：","explanationZh":"选择对应于以下内容的选项： 吸附剂特性（孔径、表面化学）； VOC性质（极性、分子量、沸点）；工作温度和压力；共存气体的存在（竞争）；气流中的湿度。 VOC 吸附使用多孔固体，例如活性炭、沸石、硅胶、氧化铝或聚合物树脂。容量取决于孔隙结构、表面化学、湿度、温度、入口浓度和再生历史。"},{"id":177,"localNo":77,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In chemical absorption, the enhancement factor β accounts for:","options":[{"label":"A","text":"The increase in absorption rate due to chemical reaction","textZh":"由于化学反应而增加吸收率"},{"label":"B","text":"The reaction rate constant and diffusion properties","textZh":"反应速率常数和扩散特性"},{"label":"C","text":"The concentration at the interface","textZh":"界面浓度"},{"label":"D","text":"The effect of reversible reactions","textZh":"可逆反应的影响"},{"label":"E","text":"The comparison with physical absorption alone","textZh":"与单独物理吸收的比较"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: The increase in absorption rate due to chemical reaction; The reaction rate constant and diffusion properties; The concentration at the interface; The effect of reversible reactions; The comparison with physical absorption alone. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"在化学吸收中，增强因子 β 占：","explanationZh":"选择对应于以下内容的选项： 由于化学反应导致吸收率增加；反应速率常数和扩散特性；界面处的浓度；可逆反应的影响；与单独物理吸收的比较。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":178,"localNo":78,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Catalyst support materials for catalytic combustion should ideally possess:","options":[{"label":"A","text":"High specific surface area","textZh":"高比表面积"},{"label":"B","text":"Good mechanical strength","textZh":"良好的机械强度"},{"label":"C","text":"Thermal stability at operating conditions","textZh":"工作条件下的热稳定性"},{"label":"D","text":"Chemical inertness (non-reactivity)","textZh":"化学惰性（非反应性）"},{"label":"E","text":"Low cost and availability","textZh":"低成本和可用性"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: High specific surface area; Good mechanical strength; Thermal stability at operating conditions; Chemical inertness (non-reactivity); Low cost and availability. For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"用于催化燃烧的催化剂载体材料理想地应具有：","explanationZh":"选择对应于以下内容的选项： 高比表面积；机械强度好；工作条件下的热稳定性；化学惰性（非反应性）；低成本和可用性。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":179,"localNo":79,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In fixed-bed catalytic reactors, the overall conversion is determined by:","options":[{"label":"A","text":"Operating temperature","textZh":"工作温度"},{"label":"B","text":"Contact (residence) time","textZh":"接触（停留）时间"},{"label":"C","text":"Catalyst activity and loading","textZh":"催化剂活性和负载量"},{"label":"D","text":"Reactant concentration in the feed","textZh":"进料中反应物浓度"},{"label":"E","text":"Bed height (amount of catalyst)","textZh":"床层高度（催化剂量）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Operating temperature; Contact (residence) time; Catalyst activity and loading; Reactant concentration in the feed; Bed height (amount of catalyst). In a fixed-bed adsorber, the breakthrough curve tracks the movement and spreading of the mass-transfer zone. Dynamic capacity is lower than equilibrium static capacity because the bed must be replaced or regenerated before the outlet concentration exceeds the allowable limit.","stemZh":"在固定床催化反应器中，总转化率由以下因素决定：","explanationZh":"选择对应于以下内容的选项： 工作温度；接触（停留）时间；催化剂活性和负载；进料中的反应物浓度；床层高度（催化剂量）。在固定床吸附器中，突破曲线跟踪传质区的移动和扩展。动态容量低于平衡静态容量，因为在出​​口浓度超过允许限度之前必须更换或再生床。"},{"id":180,"localNo":80,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The heat of adsorption originates from:","options":[{"label":"A","text":"Van der Waals forces (physical adsorption)","textZh":"范德华力（物理吸附）"},{"label":"B","text":"Chemical bond formation (chemisorption)","textZh":"化学键形成（化学吸附）"},{"label":"C","text":"Electrostatic forces in polar systems","textZh":"极性系统中的静电力"},{"label":"D","text":"Capillary condensation in mesopores","textZh":"介孔中的毛细管凝结"},{"label":"E","text":"Surface tension effects","textZh":"表面张力的影响"}],"answer":["A","B"],"explanation":"Select the choices that correspond to: Van der Waals forces (physical adsorption); Chemical bond formation (chemisorption). VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"吸附热来源于：","explanationZh":"选择对应于以下内容的选项： 范德华力（物理吸附）；化学键形成（化学吸附）。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":181,"localNo":81,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The liquid-to-gas (L/G) ratio in an absorption system influences:","options":[{"label":"A","text":"Equipment size (column diameter)","textZh":"设备尺寸（立柱直径）"},{"label":"B","text":"Operating costs (pumping energy)","textZh":"运营成本（泵送能量）"},{"label":"C","text":"Mass transfer driving force","textZh":"传质驱动力"},{"label":"D","text":"Overall removal efficiency","textZh":"总体去除效率"},{"label":"E","text":"Liquid-phase pH (in chemical absorption)","textZh":"液相 pH（化学吸收）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Equipment size (column diameter); Operating costs (pumping energy); Mass transfer driving force; Overall removal efficiency; Liquid-phase pH (in chemical absorption). Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter.","stemZh":"吸收系统中的液气 (L/G) 比会影响：","explanationZh":"选择对应于以下内容的选项： 设备尺寸（柱直径）；运营成本（泵送能量）；传质驱动力；总体去除效率；液相 pH（化学吸收）。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。"},{"id":182,"localNo":82,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"To improve VOC condensation recovery efficiency, one can:","options":[{"label":"A","text":"Lower the final condensation temperature","textZh":"降低最终冷凝温度"},{"label":"B","text":"Increase operating pressure","textZh":"增加操作压力"},{"label":"C","text":"Use multi-stage condensation","textZh":"采用多级冷凝"},{"label":"D","text":"Apply cryogenic cooling","textZh":"采用低温冷却"},{"label":"E","text":"Increase heat exchange surface area","textZh":"增加热交换表面积"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Lower the final condensation temperature; Increase operating pressure; Use multi-stage condensation; Apply cryogenic cooling; Increase heat exchange surface area. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"为了提高 VOC 冷凝回收效率，可以：","explanationZh":"选择对应于以下内容的选项： 降低最终冷凝温度；增加操作压力；采用多级冷凝；采用低温冷却；增加热交换表面积。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":183,"localNo":83,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"SO₂ control strategies for combustion flue gas include:","options":[{"label":"A","text":"Fuel desulfurization (pre-combustion)","textZh":"燃料脱硫（燃烧前）"},{"label":"B","text":"In-furnace sorbent injection","textZh":"炉内注入吸附剂"},{"label":"C","text":"Post-combustion flue gas desulfurization (FGD)","textZh":"燃烧后烟气脱硫（FGD）"},{"label":"D","text":"Switching to low-sulfur fuels","textZh":"改用低硫燃料"},{"label":"E","text":"Using tall stacks for dispersion (not reduction)","textZh":"使用高堆栈进行分散（而不是减少）"}],"answer":["A","B","C","D"],"explanation":"Select the choices that correspond to: Fuel desulfurization (pre-combustion); In-furnace sorbent injection; Post-combustion flue gas desulfurization (FGD); Switching to low-sulfur fuels. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"燃烧烟气的 SO2 控制策略包括：","explanationZh":"选择对应于以下内容的选项： 燃料脱硫（预燃烧）；炉内注入吸附剂；燃烧后烟气脱硫（FGD）；改用低硫燃料。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":184,"localNo":84,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Disadvantages of wet flue gas desulfurization (FGD) include:","options":[{"label":"A","text":"Wastewater generation and treatment","textZh":"废水产生及处理"},{"label":"B","text":"Equipment corrosion issues","textZh":"设备腐蚀问题"},{"label":"C","text":"High energy consumption (pumps, fans)","textZh":"高能耗（泵、风机）"},{"label":"D","text":"Potential secondary pollution (e.g., mist carryover)","textZh":"潜在的二次污染（例如雾气残留）"},{"label":"E","text":"High capital and operating costs","textZh":"资本和运营成本高"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Wastewater generation and treatment; Equipment corrosion issues; High energy consumption (pumps, fans); Potential secondary pollution (e.g., mist carryover); High capital and operating costs. SO2 control focuses on reducing sulfur before, during, or after combustion: low-sulfur fuel, fuel desulfurization, in-furnace limestone or sorbent injection, and flue gas desulfurization. Tall stacks dilute pollutants but do not reduce total emissions.","stemZh":"湿法烟气脱硫 (FGD) 的缺点包括：","explanationZh":"选择对应于以下内容的选项： 废水产生和处理；设备腐蚀问题；能耗高（泵、风机）；潜在的二次污染（例如雾气残留）；资本和运营成本高。 SO2 控制重点是在燃烧前、燃烧中或燃烧后减少硫：低硫燃料、燃料脱硫、炉内石灰石或吸附剂注入以及烟气脱硫。高烟囱会稀释污染物，但不会减少总排放量。"},{"id":185,"localNo":85,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"When selecting a liquid absorbent, important criteria include:","options":[{"label":"A","text":"High solubility for the pollutant gas","textZh":"对污染物气体的溶解度高"},{"label":"B","text":"High selectivity over other gas components","textZh":"比其他气体组分具有高选择性"},{"label":"C","text":"Low vapor pressure at operating temperature","textZh":"工作温度下蒸气压低"},{"label":"D","text":"Low viscosity and good wetting properties","textZh":"低粘度和良好的润湿性能"},{"label":"E","text":"Safety, non-toxicity, and cost-effectiveness","textZh":"安全、无毒、性价比高"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: High solubility for the pollutant gas; High selectivity over other gas components; Low vapor pressure at operating temperature; Low viscosity and good wetting properties; Safety, non-toxicity, and cost-effectiveness. A good absorbent should dissolve the target pollutant well, have low vapor pressure and viscosity, be chemically stable, safe, inexpensive, and selective. Chemical absorption can raise apparent solubility and rate, but it may consume reagent or create secondary wastes.","stemZh":"选择液体吸收剂时，重要的标准包括：","explanationZh":"选择对应于以下内容的选项： 污染物气体的高溶解度；比其他气体组分具有高选择性；工作温度下蒸气压低；粘度低，润湿性能好；安全、无毒、性价比高。良好的吸收剂应能很好地溶解目标污染物，具有较低的蒸气压和粘度，化学稳定、安全、廉价且具有选择性。化学吸收可以提高表观溶解度和速率，但可能会消耗试剂或产生二次废物。"},{"id":186,"localNo":86,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Advantages of fixed-bed adsorption systems include:","options":[{"label":"A","text":"Simple equipment design","textZh":"设备设计简单"},{"label":"B","text":"Stable and reliable operation","textZh":"运行稳定可靠"},{"label":"C","text":"High removal efficiency","textZh":"去除效率高"},{"label":"D","text":"Easy automation and control","textZh":"轻松实现自动化和控制"},{"label":"E","text":"Low maintenance requirements","textZh":"维护要求低"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Simple equipment design; Stable and reliable operation; High removal efficiency; Easy automation and control; Low maintenance requirements. In a fixed-bed adsorber, the breakthrough curve tracks the movement and spreading of the mass-transfer zone. Dynamic capacity is lower than equilibrium static capacity because the bed must be replaced or regenerated before the outlet concentration exceeds the allowable limit.","stemZh":"固定床吸附系统的优点包括：","explanationZh":"选择对应于以下内容的选项： 简单的设备设计；运行稳定可靠；去除效率高；易于自动化和控制；维护要求低。在固定床吸附器中，突破曲线跟踪传质区的移动和扩展。动态容量低于平衡静态容量，因为在出​​口浓度超过允许限度之前必须更换或再生床。"},{"id":187,"localNo":87,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Factors affecting the service life of a catalyst include:","options":[{"label":"A","text":"Operating temperature (thermal stability)","textZh":"工作温度（热稳定性）"},{"label":"B","text":"Impurities in the feed gas (poisons)","textZh":"原料气中的杂质（毒物）"},{"label":"C","text":"Operating pressure","textZh":"工作压力"},{"label":"D","text":"Space velocity (contact time)","textZh":"空速（接触时间）"},{"label":"E","text":"Catalyst preparation method (active phase, support)","textZh":"催化剂制备方法（活性相、载体）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Operating temperature (thermal stability); Impurities in the feed gas (poisons); Operating pressure; Space velocity (contact time); Catalyst preparation method (active phase, support). This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"影响催化剂使用寿命的因素包括：","explanationZh":"选择对应于以下内容的选项： 工作温度（热稳定性）；原料气中的杂质（毒物）；工作压力；空速（接触时间）；催化剂制备方法（活性相、载体）。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":188,"localNo":88,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"To reduce CO emissions from combustion, effective measures include:","options":[{"label":"A","text":"Ensuring sufficient oxygen supply","textZh":"保证充足的氧气供应"},{"label":"B","text":"Increasing residence time in the combustion zone","textZh":"增加在燃烧区的停留时间"},{"label":"C","text":"Raising combustion temperature","textZh":"提高燃烧温度"},{"label":"D","text":"Enhancing mixing (turbulence)","textZh":"增强混合（湍流）"},{"label":"E","text":"Using oxidation catalysts","textZh":"使用氧化催化剂"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Ensuring sufficient oxygen supply; Increasing residence time in the combustion zone; Raising combustion temperature; Enhancing mixing (turbulence); Using oxidation catalysts. CO is a product of incomplete combustion. Sufficient oxygen, high enough temperature, adequate residence time, and good mixing all promote oxidation of CO to CO2; oxidation catalysts can also help.","stemZh":"为减少燃烧产生的二氧化碳排放，有效措施包括：","explanationZh":"选择对应于以下内容的选项： 确保充足的氧气供应；增加在燃烧区的停留时间；提高燃烧温度；增强混合（湍流）；使用氧化催化剂。 CO 是不完全燃烧的产物。充足的氧气、足够高的温度、足够的停留时间、良好的混合都促进CO氧化为CO2；氧化催化剂也有帮助。"},{"id":189,"localNo":89,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Sustainability requirements for biomass-derived marine fuels include:","options":[{"label":"A","text":"Avoiding competition with food crops","textZh":"避免与粮食作物竞争"},{"label":"B","text":"Protecting biodiversity","textZh":"保护生物多样性"},{"label":"C","text":"Minimizing water resource consumption","textZh":"最大限度地减少水资源消耗"},{"label":"D","text":"Reducing fertilizer and pesticide use","textZh":"减少化肥和农药的使用"},{"label":"E","text":"Mitigating land use change risks","textZh":"减轻土地利用变化风险"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Avoiding competition with food crops; Protecting biodiversity; Minimizing water resource consumption; Reducing fertilizer and pesticide use; Mitigating land use change risks. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"生物质衍生海洋燃料的可持续性要求包括：","explanationZh":"选择对应于以下内容的选项： 避免与粮食作物竞争；保护生物多样性；最大限度地减少水资源消耗；减少化肥和农药的使用；减轻土地利用变化风险。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":190,"localNo":90,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Regarding Indirect Land Use Change (ILUC) in LCA, correct statements include:","options":[{"label":"A","text":"It cannot be measured directly","textZh":"无法直接测量"},{"label":"B","text":"It is commonly modeled using economic equilibrium models","textZh":"通常使用经济均衡模型进行建模"},{"label":"C","text":"It has significant uncertainty","textZh":"具有很大的不确定性"},{"label":"D","text":"It should be included in WTT emissions where relevant","textZh":"相关时应将其包含在 WTT 排放中"},{"label":"E","text":"Accurate and precise assessment methods are currently available","textZh":"目前已有准确、精确的评估方法"}],"answer":["A","B","C","D"],"explanation":"Select the choices that correspond to: It cannot be measured directly; It is commonly modeled using economic equilibrium models; It has significant uncertainty; It should be included in WTT emissions where relevant. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"关于LCA中的间接土地利用变化（ILUC），正确的表述包括：","explanationZh":"选择对应于以下内容的选项： 不能直接测量；通常使用经济均衡模型对其进行建模；具有重大不确定性；如果相关，它应包含在 WTT 排放中。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":191,"localNo":91,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In TTW emissions, the variation among different ship engines is mainly due to:","options":[{"label":"A","text":"Different fuel types used","textZh":"使用不同的燃料类型"},{"label":"B","text":"Different engine types (2-stroke vs 4-stroke)","textZh":"不同的发动机类型（二冲程与四冲程）"},{"label":"C","text":"Different engine load conditions","textZh":"不同的发动机负载条件"},{"label":"D","text":"Different emission aftertreatment systems","textZh":"不同的排放后处理系统"},{"label":"E","text":"Different operating modes (maneuvering vs cruising)","textZh":"不同的操作模式（机动与巡航）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Different fuel types used; Different engine types (2-stroke vs 4-stroke); Different engine load conditions; Different emission aftertreatment systems; Different operating modes (maneuvering vs cruising). Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在TTW排放中，不同船舶发动机之间的差异主要是由于：","explanationZh":"选择对应于以下内容的选项： 使用的不同燃料类型；不同的发动机类型（二冲程与四冲程）；不同的发动机负载条件；不同的排放后处理系统；不同的操作模式（机动与巡航）。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":192,"localNo":92,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"To qualify for actual emission factors in LCA, the following conditions must be met:","options":[{"label":"A","text":"Third-party verification and certification","textZh":"第三方验证和认证"},{"label":"B","text":"Compliance with the methodology in the Guidelines","textZh":"遵守指南中的方法"},{"label":"C","text":"Detailed description of the fuel pathway","textZh":"燃料路径的详细描述"},{"label":"D","text":"Agreement with default emission factors","textZh":"与默认排放因子达成一致"},{"label":"E","text":"Based on actual measurement data","textZh":"根据实际测量数据"}],"answer":["A","B","C","E"],"explanation":"Select the choices that correspond to: Third-party verification and certification; Compliance with the methodology in the Guidelines; Detailed description of the fuel pathway; Based on actual measurement data. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"为了符合 LCA 中的实际排放因子，必须满足以下条件：","explanationZh":"选择对应于以下内容的选项： 第三方验证和认证；遵守指南中的方法；燃料路径的详细描述；以实际测量数据为准。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":193,"localNo":93,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Regarding Onshore Power Supply (OPS) GHG intensity calculation in LCA, correct statements include:","options":[{"label":"A","text":"The national grid emission factor is used by default","textZh":"默认使用国家电网排放因子"},{"label":"B","text":"A PPA (Power Purchase Agreement) can establish a lower actual value","textZh":"PPA（购电协议）可以确定较低的实际价值"},{"label":"C","text":"The GHG intensity should be considered zero","textZh":"温室气体强度应视为零"},{"label":"D","text":"Transmission losses should be accounted","textZh":"应考虑传输损耗"},{"label":"E","text":"The intensity depends on the electricity generation mix","textZh":"强度取决于发电组合"}],"answer":["A","B","D","E"],"explanation":"Select the choices that correspond to: The national grid emission factor is used by default; A PPA (Power Purchase Agreement) can establish a lower actual value; Transmission losses should be accounted; The intensity depends on the electricity generation mix. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"关于LCA中陆上供电（OPS）温室气体强度计算，正确的表述包括：","explanationZh":"选择对应的选项： 默认使用国家电网排放因子； PPA（购电协议）可以确定较低的实际价值；应考虑传输损耗；强度取决于发电组合。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":194,"localNo":94,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"For blended fuels in LCA, the proper approach includes:","options":[{"label":"A","text":"Weighted averaging by energy proportion","textZh":"按能量比例加权平均"},{"label":"B","text":"Summing the emission factors of all components","textZh":"汇总所有组件的排放因子"},{"label":"C","text":"Considering only the main component","textZh":"只考虑主要成分"},{"label":"D","text":"Biomass components treated as carbon-neutral","textZh":"生物质成分被视为碳中和"},{"label":"E","text":"Listing all components' information in the FLL","textZh":"列出FLL中所有组件的信息"}],"answer":["A","D","E"],"explanation":"Select the choices that correspond to: Weighted averaging by energy proportion; Biomass components treated as carbon-neutral; Listing all components' information in the FLL. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"对于 LCA 中的混合燃料，正确的方法包括：","explanationZh":"选择对应于以下内容的选项： 按能量比例加权平均；生物质成分被视为碳中和；列出 FLL 中所有组件的信息。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":195,"localNo":95,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Ambient air quality standards typically specify limits for:","options":[{"label":"A","text":"Annual average concentration","textZh":"年平均浓度"},{"label":"B","text":"Daily average concentration","textZh":"日平均浓度"},{"label":"C","text":"Hourly average concentration","textZh":"每小时平均浓度"},{"label":"D","text":"Instantaneous peak concentration","textZh":"瞬时峰值浓度"},{"label":"E","text":"Specific time periods (e.g., 8-hour average)","textZh":"特定时间段（例如 8 小时平均值）"}],"answer":["A","B","C","E"],"explanation":"Select the choices that correspond to: Annual average concentration; Daily average concentration; Hourly average concentration; Specific time periods (e.g., 8-hour average). This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"环境空气质量标准通常规定以下限制：","explanationZh":"选择对应于以下内容的选项： 年平均浓度；日平均浓度；小时平均浓度；特定时间段（例如 8 小时平均值）。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":196,"localNo":96,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"Applications of atmospheric dispersion models in environmental assessment include:","options":[{"label":"A","text":"Predicting impacts of proposed new sources","textZh":"预测拟议新来源的影响"},{"label":"B","text":"Developing pollution control strategies","textZh":"制定污染控制策略"},{"label":"C","text":"Emergency response to accidental releases","textZh":"意外泄漏应急响应"},{"label":"D","text":"Forecasting air quality","textZh":"预测空气质量"},{"label":"E","text":"Source apportionment (source contribution analysis)","textZh":"来源分配（来源贡献分析）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Predicting impacts of proposed new sources; Developing pollution control strategies; Emergency response to accidental releases; Forecasting air quality; Source apportionment (source contribution analysis). Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"大气扩散模型在环境评估中的应用包括：","explanationZh":"选择对应于以下内容的选项： 预测拟议新来源的影响；制定污染控制战略；意外泄漏应急响应；预测空气质量；来源分配（来源贡献分析）。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":197,"localNo":97,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In combustion theory, the \"Three T's\" (Time, Temperature, Turbulence) affect complete combustion as follows:","options":[{"label":"A","text":"Higher temperature increases reaction kinetics","textZh":"较高的温度会增加反应动力学"},{"label":"B","text":"Longer residence time ensures completion","textZh":"更长的停留时间确保完成"},{"label":"C","text":"Strong turbulence enhances mixing of fuel and oxidizer","textZh":"强烈的湍流增强了燃料和氧化剂的混合"},{"label":"D","text":"Higher temperature always reduces NOx formation","textZh":"较高的温度总是会减少氮氧化物的形成"},{"label":"E","text":"Stronger turbulence reduces CO formation","textZh":"更强的湍流减少 CO 的形成"}],"answer":["A","B","C","E"],"explanation":"Select the choices that correspond to: Higher temperature increases reaction kinetics; Longer residence time ensures completion; Strong turbulence enhances mixing of fuel and oxidizer; Stronger turbulence reduces CO formation. CO is a product of incomplete combustion. Sufficient oxygen, high enough temperature, adequate residence time, and good mixing all promote oxidation of CO to CO2; oxidation catalysts can also help.","stemZh":"在燃烧理论中，“三个 T”（时间、温度、湍流）对完全燃烧的影响如下：","explanationZh":"选择对应于以下内容的选项： 较高的温度会增加反应动力学；更长的停留时间确保完成；强烈的湍流增强了燃料和氧化剂的混合；更强的湍流会减少 CO 的形成。 CO 是不完全燃烧的产物。充足的氧气、足够高的温度、足够的停留时间、良好的混合都促进CO氧化为CO2；氧化催化剂也有帮助。"},{"id":198,"localNo":98,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The excess air coefficient (α) in combustion influences:","options":[{"label":"A","text":"Flame and gas temperature","textZh":"火焰和气体温度"},{"label":"B","text":"Thermal efficiency","textZh":"热效率"},{"label":"C","text":"Flue gas composition","textZh":"烟气成分"},{"label":"D","text":"NOx formation rate","textZh":"氮氧化物生成率"},{"label":"E","text":"SO₂ to SO₃ conversion","textZh":"SO2 至 SO₃ 的转化"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Flame and gas temperature; Thermal efficiency; Flue gas composition; NOx formation rate; SO₂ to SO₃ conversion. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"燃烧中的过量空气系数 (α) 影响：","explanationZh":"选择对应于以下内容的选项：火焰和气体温度；热效率；烟气成分； NOx生成率； SO2 至 SO₃ 的转化。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":199,"localNo":99,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"In a catalytic reaction, the internal effectiveness factor depends on:","options":[{"label":"A","text":"Thiele modulus (which includes particle size and diffusivity)","textZh":"蒂勒模量（包括粒径和扩散率）"},{"label":"B","text":"Reaction order","textZh":"反应顺序"},{"label":"C","text":"Intrinsic reaction rate constant","textZh":"本征反应速率常数"},{"label":"D","text":"Catalyst pore structure","textZh":"催化剂孔结构"},{"label":"E","text":"Temperature","textZh":"温度"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: Thiele modulus (which includes particle size and diffusivity); Reaction order; Intrinsic reaction rate constant; Catalyst pore structure; Temperature. When internal pore diffusion controls a gas-solid catalytic reaction, the observed rate is no longer just the intrinsic surface reaction rate. Concentration drops inside the catalyst particle, so the apparent kinetics become weaker than the intrinsic kinetics and the effectiveness factor is governed by the Thiele modulus.","stemZh":"在催化反应中，内部有效性因素取决于：","explanationZh":"选择对应于以下内容的选项： 蒂勒模量（包括粒径和扩散率）；反应顺序；固有反应速率常数；催化剂孔结构；温度。当内部孔扩散控制气固催化反应时，观察到的速率不再仅仅是固有的表面反应速率。催化剂颗粒内部的浓度下降，因此表观动力学变得弱于内在动力学，并且有效性因子由蒂勒模量控制。"},{"id":200,"localNo":100,"type":"multiple","partEn":"Multiple Choice","partZh":"多选题","stem":"The IMO LCA Guidelines apply to emissions from ships, and their scope explicitly excludes:","options":[{"label":"A","text":"GHG emissions from cargo (e.g., VOC)","textZh":"货物产生的温室气体排放（例如挥发性有机化合物）"},{"label":"B","text":"Refrigerant emissions","textZh":"制冷剂排放"},{"label":"C","text":"Black carbon (BC)","textZh":"黑炭（BC）"},{"label":"D","text":"SOx and PM","textZh":"SOx 和 PM"},{"label":"E","text":"Short-lived climate forcers (e.g., NMVOC, CO)","textZh":"短期气候驱动因素（例如 NMVOC、CO）"}],"answer":["A","B","C","D","E"],"explanation":"Select the choices that correspond to: GHG emissions from cargo (e.g., VOC); Refrigerant emissions; Black carbon (BC); SOx and PM; Short-lived climate forcers (e.g., NMVOC, CO). SO2 control focuses on reducing sulfur before, during, or after combustion: low-sulfur fuel, fuel desulfurization, in-furnace limestone or sorbent injection, and flue gas desulfurization. Tall stacks dilute pollutants but do not reduce total emissions.","stemZh":"IMO LCA 指南适用于船舶排放，其范围明确排除：","explanationZh":"选择对应于以下内容的选项： 货物的温室气体排放（例如 VOC）；制冷剂排放；黑炭（BC）； SOx 和 PM；短期气候驱动因素（例如 NMVOC、CO）。 SO2 控制重点是在燃烧前、燃烧中或燃烧后减少硫：低硫燃料、燃料脱硫、炉内石灰石或吸附剂注入以及烟气脱硫。高烟囱会稀释污染物，但不会减少总排放量。"},{"id":201,"localNo":1,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The Gaussian plume model is classified as a receptor-oriented model.","options":[],"answer":["FALSE"],"explanation":"The statement is false. The basic Gaussian plume model is a steady-state, continuous-source model. It assumes constant mean wind in the downwind direction, Gaussian spreading in the lateral and vertical directions, no chemical transformation for the basic form, and reflection at the ground for non-depositing pollutants.","stemZh":"高斯羽流模型被归类为面向受体的模型。","explanationZh":"该声明是错误的。基本高斯羽流模型是稳态、连续源模型。假设顺风方向平均风恒定，横向和垂直方向呈高斯分布，基本形态无化学变化，非沉积污染物在地面反射。"},{"id":202,"localNo":2,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The effective stack height equals the physical stack height plus the plume rise.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Effective stack height is the physical stack height plus plume rise. Plume rise is controlled by exit momentum, buoyancy from hot stack gas, stack diameter, and ambient wind; higher stacks generally reduce nearby ground concentration but the word 'always' is unsafe because meteorology and terrain also matter.","stemZh":"有效堆叠高度等于物理堆叠高度加上羽流上升。","explanationZh":"该声明属实。有效堆叠高度是物理堆叠高度加上羽流上升。羽流上升由出口动量、热烟囱气体的浮力、烟囱直径和环境风控制；较高的烟囱通常会减少附近地面的浓度，但“总是”这个词并不安全，因为气象和地形也很重要。"},{"id":203,"localNo":3,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Increasing the stack height always results in lower ground-level pollutant concentrations.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Effective stack height is the physical stack height plus plume rise. Plume rise is controlled by exit momentum, buoyancy from hot stack gas, stack diameter, and ambient wind; higher stacks generally reduce nearby ground concentration but the word 'always' is unsafe because meteorology and terrain also matter. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"增加烟囱高度总是会导致地面污染物浓度降低。","explanationZh":"该声明是错误的。有效堆叠高度是物理堆叠高度加上羽流上升。羽流上升由出口动量、热烟囱气体的浮力、烟囱直径和环境风控制；较高的烟囱通常会减少附近地面的浓度，但“总是”这个词并不安全，因为气象和地形也很重要。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":204,"localNo":4,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Atmospheric pollutants emitted in urban areas can be transported to rural areas by upper-level winds.","options":[],"answer":["TRUE"],"explanation":"The statement is true. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"城市排放的大气污染物可以通过高空风输送到农村地区。","explanationZh":"该声明属实。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":205,"localNo":5,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In the Pasquill-Gifford stability classification, Class A represents the most unstable condition and Class F the most stable.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Pasquill-Gifford stability class describes turbulent mixing. Class A is very unstable with strong vertical mixing, while Class F is stable with weak mixing. The class is estimated from routine observations such as wind speed, solar radiation or cloud cover, and day/night conditions.","stemZh":"在 Pasquill-Gifford 稳定性分类中，A 级代表最不稳定的情况，F 级代表最稳定的情况。","explanationZh":"该声明属实。 Pasquill-Gifford 稳定性等级描述了湍流混合。 A类在强烈的垂直混合下非常不稳定，而F类在弱混合下很稳定。该等级是根据风速、太阳辐射或云量以及白天/夜间条件等常规观测来估计的。"},{"id":206,"localNo":6,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Temperature inversion conditions enhance vertical dispersion of air pollutants.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"逆温条件增强了空气污染物的垂直扩散。","explanationZh":"该声明是错误的。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":207,"localNo":7,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The mixing height (mixed layer depth) is an important parameter that limits vertical pollutant dispersion.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence.","stemZh":"混合高度（混合层深度）是限制污染物垂直扩散的重要参数。","explanationZh":"该声明属实。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。"},{"id":208,"localNo":8,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Sea-breeze and land-breeze circulation patterns do not affect the dispersion of pollutants in coastal areas.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Pollutant dispersion depends strongly on atmospheric stability. An inversion suppresses vertical motion and traps pollutants near the ground; a deeper mixed layer and unstable lapse rate promote dilution by turbulence. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"海风和陆风环流模式不影响沿海地区污染物的扩散。","explanationZh":"该声明是错误的。污染物的扩散很大程度上取决于大气的稳定性。逆温层抑制垂直运动并将污染物捕获在地面附近；更深的混合层和不稳定的递减率会促进湍流的稀释。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":209,"localNo":9,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The urban heat island effect tends to draw pollutants toward the city center.","options":[],"answer":["TRUE"],"explanation":"The statement is true. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"城市热岛效应往往会将污染物吸引到市中心。","explanationZh":"该声明属实。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":210,"localNo":10,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The Pasquill-Gifford dispersion curves are derived entirely from theoretical calculations.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Pasquill-Gifford stability class describes turbulent mixing.
