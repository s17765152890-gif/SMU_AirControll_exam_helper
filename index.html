 Class A is very unstable with strong vertical mixing, while Class F is stable with weak mixing. The class is estimated from routine observations such as wind speed, solar radiation or cloud cover, and day/night conditions.","stemZh":"Pasquill-Gifford 色散曲线完全来自理论计算。","explanationZh":"该声明是错误的。 Pasquill-Gifford 稳定性等级描述了湍流混合。 A类在强烈的垂直混合下非常不稳定，而F类在弱混合下很稳定。该等级是根据风速、太阳辐射或云量以及白天/夜间条件等常规观测来估计的。"},{"id":211,"localNo":11,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In the P-G curves, the ratio σy/σz is a constant for a given stability category.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Pasquill-Gifford stability class describes turbulent mixing. Class A is very unstable with strong vertical mixing, while Class F is stable with weak mixing. The class is estimated from routine observations such as wind speed, solar radiation or cloud cover, and day/night conditions.","stemZh":"在 P-G 曲线中，比率 σy/σz 是给定稳定性类别的常数。","explanationZh":"该声明是错误的。 Pasquill-Gifford 稳定性等级描述了湍流混合。 A类在强烈的垂直混合下非常不稳定，而F类在弱混合下很稳定。该等级是根据风速、太阳辐射或云量以及白天/夜间条件等常规观测来估计的。"},{"id":212,"localNo":12,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The location of the maximum ground-level concentration depends on the effective stack height.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Effective stack height is the physical stack height plus plume rise. Plume rise is controlled by exit momentum, buoyancy from hot stack gas, stack diameter, and ambient wind; higher stacks generally reduce nearby ground concentration but the word 'always' is unsafe because meteorology and terrain also matter.","stemZh":"最大地面浓度的位置取决于有效烟囱高度。","explanationZh":"该声明属实。有效堆叠高度是物理堆叠高度加上羽流上升。羽流上升由出口动量、热烟囱气体的浮力、烟囱直径和环境风控制；较高的烟囱通常会减少附近地面的浓度，但“总是”这个词并不安全，因为气象和地形也很重要。"},{"id":213,"localNo":13,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In GB/T3840-91, the stack height calculated based on the \"absolute maximum concentration\" is generally lower than that based on Cmax.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Effective stack height is the physical stack height plus plume rise. Plume rise is controlled by exit momentum, buoyancy from hot stack gas, stack diameter, and ambient wind; higher stacks generally reduce nearby ground concentration but the word 'always' is unsafe because meteorology and terrain also matter.","stemZh":"GB/T3840-91中，基于“绝对最大浓度”计算的堆高一般低于基于Cmax计算的堆高。","explanationZh":"该声明是错误的。有效堆叠高度是物理堆叠高度加上羽流上升。羽流上升由出口动量、热烟囱气体的浮力、烟囱直径和环境风控制；较高的烟囱通常会减少附近地面的浓度，但“总是”这个词并不安全，因为气象和地形也很重要。"},{"id":214,"localNo":14,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Building wake effects can cause localized high pollutant concentrations near structures.","options":[],"answer":["TRUE"],"explanation":"The statement is true. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"建筑物尾流效应可能会导致建筑物附近局部污染物浓度较高。","explanationZh":"该声明属实。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":215,"localNo":15,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Receptor-oriented models cannot be used to predict the environmental impact of proposed new emission sources.","options":[],"answer":["TRUE"],"explanation":"The statement is true. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"面向受体的模型不能用于预测拟议的新排放源对环境的影响。","explanationZh":"该声明属实。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":216,"localNo":16,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Source-oriented and receptor-oriented models should always produce identical source apportionment results.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Receptor models such as CMB and PMF start from pollutant composition measured at receptor sites and work backward to estimate source contributions. They are useful for source apportionment but are not designed to predict impacts from new sources before they exist. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"面向源和面向受体的模型应始终产生相同的源分配结果。","explanationZh":"该声明是错误的。 CMB 和 PMF 等受体模型从受体位点测量的污染物成分开始，向后推算源贡献。它们对于源解析很有用，但并不是为了在新源存在之前预测其影响而设计的。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":217,"localNo":17,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"PM₂.₅ refers to particles with an aerodynamic diameter equal to or less than 2.5 μm.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Particle health and control behavior depend strongly on aerodynamic diameter. PM2.5 penetrates deeper into the respiratory system and remains suspended longer than coarse particles, while PM10 includes a broader coarse fraction.","stemZh":"PM2.5是指空气动力学直径等于或小于2.5μm的颗粒物。","explanationZh":"该声明属实。颗粒健康和控制行为很大程度上取决于空气动力学直径。 PM2.5 可以更深入地渗透到呼吸系统中，并且比粗颗粒悬浮的时间更长，而 PM10 则包含更广泛的粗颗粒。"},{"id":218,"localNo":18,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The log-normal distribution is typically used to describe particles generated by mechanical comminution processes.","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"对数正态分布通常用于描述机械粉碎过程产生的颗粒。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":219,"localNo":19,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The Rosin-Rammler distribution is suitable for describing particles generated by combustion processes.","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"Rosin-Rammler 分布适合描述燃烧过程产生的颗粒。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":220,"localNo":20,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The aerodynamic equivalent diameter of a particle is always equal to its geometric diameter.","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"颗粒的空气动力学当量直径始终等于其几何直径。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":221,"localNo":21,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In the Stokes settling regime, the particle settling velocity is proportional to the square of its diameter.","options":[],"answer":["TRUE"],"explanation":"The statement is true. In the Stokes regime, particle settling velocity is proportional to the square of particle diameter when other properties are constant. This is why coarse particles settle much faster than fine particles.","stemZh":"在斯托克斯沉降机制中，颗粒沉降速度与其直径的平方成正比。","explanationZh":"该声明属实。在斯托克斯状态下，当其他属性不变时，颗粒沉降速度与颗粒直径的平方成正比。这就是粗颗粒比细颗粒沉降快得多的原因。"},{"id":222,"localNo":22,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Fine particles (submicron) generally have longer atmospheric residence times than coarse particles.","options":[],"answer":["TRUE"],"explanation":"The statement is true. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"细颗粒（亚微米）通常比粗颗粒具有更长的大气停留时间。","explanationZh":"该声明属实。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":223,"localNo":23,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Electrostatic and van der Waals forces cause fine particles to agglomerate when they come into contact.","options":[],"answer":["TRUE"],"explanation":"The statement is true. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"静电和范德华力会导致细颗粒在接触时聚集。","explanationZh":"该声明属实。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":224,"localNo":24,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The fundamental strategy for particulate control is to disperse particles for easier collection.","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"颗粒物控制的基本策略是分散颗粒物以便于收集。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":225,"localNo":25,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The penetration (P) of a dust collector is defined as P = 1 − η, where η is the collection efficiency.","options":[],"answer":["TRUE"],"explanation":"The statement is true. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"除尘器的穿透力 (P) 定义为 P = 1 − η，其中 η 是收集效率。","explanationZh":"该声明属实。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":226,"localNo":26,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The Clean Air Delivery Rate (CADR) is expressed in units of m³/h.","options":[],"answer":["TRUE"],"explanation":"The statement is true. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"清洁空气输送率（CADR）以立方米/小时为单位表示。","explanationZh":"该声明属实。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":227,"localNo":27,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Gravity settling chambers are highly efficient collectors for fine particles (<10 μm).","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"重力沉降室是细颗粒（<10 μm）的高效收集器。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":228,"localNo":28,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In a cyclone separator, a smaller cut diameter (d50) indicates better collection performance for fine particles.","options":[],"answer":["TRUE"],"explanation":"The statement is true. The BET equation extends adsorption theory to multilayer physical adsorption. Its common engineering use is measuring adsorbent specific surface area from gas adsorption data.","stemZh":"在旋风分离器中，切割直径 (d50) 越小，表明细颗粒的收集性能越好。","explanationZh":"该声明属实。 BET 方程将吸附理论扩展到多层物理吸附。其常见的工程用途是根据气体吸附数据测量吸附剂比表面积。"},{"id":229,"localNo":29,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The pressure drop in a cyclone separator is independent of the gas flow rate and depends only on the device geometry.","options":[],"answer":["FALSE"],"explanation":"The statement is false. A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"旋风分离器中的压降与气体流速无关，仅取决于设备的几何形状。","explanationZh":"该声明是错误的。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":230,"localNo":30,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Cyclone separators are well suited for handling sticky or tarry particles.","options":[],"answer":["FALSE"],"explanation":"The statement is false. A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"旋风分离器非常适合处理粘性或柏油状颗粒。","explanationZh":"该声明是错误的。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":231,"localNo":31,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Electrostatic precipitators rely on centrifugal force to separate particles from the gas stream.","options":[],"answer":["FALSE"],"explanation":"The statement is false. A cyclone separates particles by centrifugal inertia. The cut diameter d50 is the particle size collected with 50 percent efficiency; smaller d50 means better fine-particle collection, usually at the cost of higher pressure drop or tighter geometry.","stemZh":"静电除尘器依靠离心力从气流中分离颗粒。","explanationZh":"该声明是错误的。旋风分离器通过离心惯性分离颗粒。切割直径d50是以50%效率收集的颗粒尺寸；较小的 d50 意味着更好的细颗粒收集，通常以更高的压降或更紧密的几何形状为代价。"},{"id":232,"localNo":32,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Electrostatic precipitators exhibit their highest collection efficiency for dust with medium electrical resistivity.","options":[],"answer":["TRUE"],"explanation":"The statement is true. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"静电除尘器对中等电阻率的灰尘表现出最高的收集效率。","explanationZh":"该声明属实。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":233,"localNo":33,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"High-resistivity dust can cause back corona in an electrostatic precipitator.","options":[],"answer":["TRUE"],"explanation":"The statement is true. An electrostatic precipitator charges particles and drives them to collecting plates in an electric field. Dust resistivity is critical: if it is too high, charge cannot leak away and back corona reduces collection efficiency.","stemZh":"高电阻率灰尘会在静电除尘器中引起反电晕。","explanationZh":"该声明属实。静电除尘器使颗粒带电，并在电场中将它们驱动至收集板。粉尘电阻率至关重要：如果电阻率太高，电荷就无法泄漏，反电晕也会降低收集效率。"},{"id":234,"localNo":34,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In a fabric filter (baghouse), higher filtration velocity (air-to-cloth ratio) always improves collection efficiency.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Fabric filters collect particles by sieving through the dust cake plus mechanisms such as inertial impaction, interception, and Brownian diffusion. For submicron particles, Brownian diffusion becomes especially important. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"在织物过滤器（袋式除尘器）中，较高的过滤速度（空气与布料的比率）始终可以提高收集效率。","explanationZh":"该声明是错误的。织物过滤器通过筛分尘饼以及惯性冲击、拦截和布朗扩散等机制来收集颗粒。对于亚微米颗粒，布朗扩散变得尤其重要。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":235,"localNo":35,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The formation of a dust cake on the filter medium in a baghouse enhances collection efficiency.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Fabric filters collect particles by sieving through the dust cake plus mechanisms such as inertial impaction, interception, and Brownian diffusion. For submicron particles, Brownian diffusion becomes especially important.","stemZh":"袋式除尘器中过滤介质上形成的尘饼提高了收集效率。","explanationZh":"该声明属实。织物过滤器通过筛分尘饼以及惯性冲击、拦截和布朗扩散等机制来收集颗粒。对于亚微米颗粒，布朗扩散变得尤其重要。"},{"id":236,"localNo":36,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Wet scrubbers can be designed to remove both particulate matter and gaseous pollutants simultaneously.","options":[],"answer":["TRUE"],"explanation":"The statement is true. A Venturi scrubber accelerates gas through a throat, atomizes liquid into fine droplets, and captures particles mainly by inertial impaction between particles and droplets. Better capture usually requires smaller droplets, higher gas velocity, and higher pressure drop.","stemZh":"湿式洗涤器可设计用于同时去除颗粒物和气态污染物。","explanationZh":"该声明属实。文丘里洗涤器通过喉部加速气体，将液体雾化成细小的液滴，并主要通过颗粒和液滴之间的惯性撞击来捕获颗粒。更好的捕获通常需要更小的液滴、更高的气速和更高的压降。"},{"id":237,"localNo":37,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Venturi scrubbers provide high collection efficiency for fine particles but have high energy consumption.","options":[],"answer":["TRUE"],"explanation":"The statement is true. A Venturi scrubber accelerates gas through a throat, atomizes liquid into fine droplets, and captures particles mainly by inertial impaction between particles and droplets. Better capture usually requires smaller droplets, higher gas velocity, and higher pressure drop.","stemZh":"文丘里洗涤器对细颗粒具有较高的收集效率，但能耗较高。","explanationZh":"该声明属实。文丘里洗涤器通过喉部加速气体，将液体雾化成细小的液滴，并主要通过颗粒和液滴之间的惯性撞击来捕获颗粒。更好的捕获通常需要更小的液滴、更高的气速和更高的压降。"},{"id":238,"localNo":38,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"All types of particulate collectors are suitable for treating high-temperature flue gases.","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"所有类型的颗粒收集器都适合处理高温烟气。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":239,"localNo":39,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The types and amounts of pollutants from combustion are independent of the fuel composition.","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"燃烧产生的污染物的类型和数量与燃料成分无关。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":240,"localNo":40,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"A higher excess air coefficient always improves combustion efficiency and increases thermal efficiency.","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"较高的过量空气系数总是可以提高燃烧效率并提高热效率。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":241,"localNo":41,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Sulfur in fuel is mainly converted to SO₃ during combustion.","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"燃料中的硫在燃烧过程中主要转化为SO₃。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":242,"localNo":42,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The formation of thermal NOx is primarily governed by combustion temperature.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Thermal NOx is governed mainly by high flame temperature, oxygen availability, and residence time at high temperature. Low-NOx methods such as staged combustion, flue gas recirculation, low excess air, steam or water injection, and burner redesign lower temperature peaks or oxygen exposure.","stemZh":"热力型氮氧化物的形成主要取决于燃烧温度。","explanationZh":"该声明属实。热力 NOx 主要受高火焰温度、氧气可用性和高温停留时间的影响。低氮氧化物排放方法，如分级燃烧、烟气再循环、低过量空气、蒸汽或水喷射，以及燃烧器重新设计，降低温度峰值或氧气暴露。"},{"id":243,"localNo":43,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The formation of fuel NOx depends on the nitrogen content of the fuel.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Thermal NOx is governed mainly by high flame temperature, oxygen availability, and residence time at high temperature. Low-NOx methods such as staged combustion, flue gas recirculation, low excess air, steam or water injection, and burner redesign lower temperature peaks or oxygen exposure.","stemZh":"燃料NOx 的形成取决于燃料的氮含量。","explanationZh":"该声明属实。热力 NOx 主要受高火焰温度、氧气可用性和高温停留时间的影响。低氮氧化物排放方法，如分级燃烧、烟气再循环、低过量空气、蒸汽或水喷射，以及燃烧器重新设计，降低温度峰值或氧气暴露。"},{"id":244,"localNo":44,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Low-temperature combustion technologies can effectively reduce thermal NOx formation.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Thermal NOx is governed mainly by high flame temperature, oxygen availability, and residence time at high temperature. Low-NOx methods such as staged combustion, flue gas recirculation, low excess air, steam or water injection, and burner redesign lower temperature peaks or oxygen exposure.","stemZh":"低温燃烧技术可以有效减少热力NOx的形成。","explanationZh":"该声明属实。热力 NOx 主要受高火焰温度、氧气可用性和高温停留时间的影响。低氮氧化物排放方法，如分级燃烧、烟气再循环、低过量空气、蒸汽或水喷射，以及燃烧器重新设计，降低温度峰值或氧气暴露。"},{"id":245,"localNo":45,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Emission factors provide a quick and inexpensive method for estimating emissions from sources.","options":[],"answer":["TRUE"],"explanation":"The statement is true. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"排放因子为估算源排放提供了一种快速且廉价的方法。","explanationZh":"该声明属实。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":246,"localNo":46,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"AP-42 is the EPA's compilation of air pollutant emission factors.","options":[],"answer":["TRUE"],"explanation":"The statement is true. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"AP-42 是 EPA 的空气污染物排放因子汇编。","explanationZh":"该声明属实。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":247,"localNo":47,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In combustion calculations, the typical volumetric ratio of N₂ to O₂ in air is approximately 78:21.","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"在燃烧计算中，空气中 N2 与 O2 的典型体积比约为 78:21。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":248,"localNo":48,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The acid dew point of flue gas is primarily determined by the SO₂ concentration.","options":[],"answer":["FALSE"],"explanation":"The statement is false. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"烟气的酸露点主要由SO2浓度决定。","explanationZh":"该声明是错误的。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":249,"localNo":49,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Henry's law is suitable for describing the equilibrium of concentrated gas solutions in liquids.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Henry's law is most useful for dilute, slightly soluble gases where gas-liquid equilibrium is approximately linear. It links gas-phase partial pressure with dissolved concentration and is the basis for judging absorption driving force.","stemZh":"亨利定律适用于描述液体中浓气体溶液的平衡。","explanationZh":"该声明是错误的。亨利定律对于气液平衡近似线性的稀释的微溶气体最有用。它将气相分压与溶解浓度联系起来，是判断吸收驱动力的基础。"},{"id":250,"localNo":50,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In the two-film theory, there is significant mass transfer resistance at the gas-liquid interface.","options":[],"answer":["FALSE"],"explanation":"The statement is false. External diffusion control means the slow step is transport through the gas film around the particle or packing surface. Increasing gas velocity thins the boundary layer and raises the mass-transfer coefficient, so it helps much more than simply increasing intrinsic catalyst activity.","stemZh":"在双膜理论中，气液界面处存在显着的传质阻力。","explanationZh":"该声明是错误的。外部扩散控制意味着缓慢的步骤是通过颗粒或填料表面周围的气膜传输。增加气体速度可以使边界层变薄并提高传质系数，因此它比简单地增加催化剂的内在活性更有帮助。"},{"id":251,"localNo":51,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Chemical absorption generally has a higher overall mass transfer rate than physical absorption.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"化学吸收通常比物理吸收具有更高的总传质速率。","explanationZh":"该声明属实。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":252,"localNo":52,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Packed towers and tray towers are two common types of gas absorption equipment.","options":[],"answer":["TRUE"],"explanation":"The statement is true. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"填料塔和板式塔是两种常见的气体吸收设备。","explanationZh":"该声明属实。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":253,"localNo":53,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In absorber design, the flooding gas velocity defines the upper operational limit of the column.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter.","stemZh":"在吸收器设计中，驱替气体速度定义了塔的操作上限。","explanationZh":"该声明属实。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。"},{"id":254,"localNo":54,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Higher liquid-to-gas ratios generally result in higher operating costs for absorption systems.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Gas absorption is controlled by interphase equilibrium and the two-film mass-transfer resistances. A higher liquid-to-gas ratio usually increases driving force and removal, but also raises pumping cost and can approach flooding limits that determine column diameter.","stemZh":"较高的液气比通常会导致吸收系统的运行成本较高。","explanationZh":"该声明属实。气体吸收由相间平衡和两膜传质阻力控制。较高的液气比通常会增加驱动力和去除率，但也会增加泵送成本，并可能接近决定塔直径的溢流极限。"},{"id":255,"localNo":55,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The dynamic adsorption capacity of an adsorbent is typically greater than its static adsorption capacity.","options":[],"answer":["FALSE"],"explanation":"The statement is false. In a fixed-bed adsorber, the breakthrough curve tracks the movement and spreading of the mass-transfer zone. Dynamic capacity is lower than equilibrium static capacity because the bed must be replaced or regenerated before the outlet concentration exceeds the allowable limit.","stemZh":"吸附剂的动态吸附容量通常大于其静态吸附容量。","explanationZh":"该声明是错误的。在固定床吸附器中，突破曲线跟踪传质区的移动和扩展。动态容量低于平衡静态容量，因为在出​​口浓度超过允许限度之前必须更换或再生床。"},{"id":256,"localNo":56,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The Langmuir adsorption isotherm is applicable to monolayer adsorption on homogeneous surfaces.","options":[],"answer":["TRUE"],"explanation":"The statement is true. The Langmuir isotherm describes monolayer adsorption on a homogeneous surface with a finite number of sites. Once sites are filled, adsorption approaches saturation rather than increasing indefinitely.","stemZh":"朗缪尔吸附等温线适用于均质表面上的单层吸附。","explanationZh":"该声明属实。朗缪尔等温线描述了具有有限数量位点的均匀表面上的单层吸附。一旦位点被填满，吸附就会接近饱和而不是无限增加。"},{"id":257,"localNo":57,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The BET equation is widely used for determining the specific surface area of adsorbents.","options":[],"answer":["TRUE"],"explanation":"The statement is true. The BET equation extends adsorption theory to multilayer physical adsorption. Its common engineering use is measuring adsorbent specific surface area from gas adsorption data.","stemZh":"BET 方程广泛用于确定吸附剂的比表面积。","explanationZh":"该声明属实。 BET 方程将吸附理论扩展到多层物理吸附。其常见的工程用途是根据气体吸附数据测量吸附剂比表面积。"},{"id":258,"localNo":58,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Physical adsorption is generally reversible, while chemisorption is typically irreversible.","options":[],"answer":["TRUE"],"explanation":"The statement is true. This item is asking for the governing definition or mechanism, not just a memorized word. Identify the physical process, the controlling variable, and the operating consequence; the correct option is the one consistent with that relationship.","stemZh":"物理吸附通常是可逆的，而化学吸附通常是不可逆的。","explanationZh":"该声明属实。该项目要求的是主导定义或机制，而不仅仅是记住的单词。识别物理过程、控制变量和操作结果；正确的选项是与该关系一致的选项。"},{"id":259,"localNo":59,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Zeolitic molecular sieves are one type of adsorbent used for VOC control.","options":[],"answer":["TRUE"],"explanation":"The statement is true. VOC adsorption uses porous solids such as activated carbon, zeolites, silica gel, alumina, or polymeric resins. Capacity depends on pore structure, surface chemistry, humidity, temperature, inlet concentration, and regeneration history.","stemZh":"沸石分子筛是一种用于VOC控制的吸附剂。","explanationZh":"该声明属实。 VOC 吸附使用多孔固体，例如活性炭、沸石、硅胶、氧化铝或聚合物树脂。容量取决于孔隙结构、表面化学、湿度、温度、入口浓度和再生历史。"},{"id":260,"localNo":60,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Fixed-bed adsorption systems can operate continuously without interruption.","options":[],"answer":["FALSE"],"explanation":"The statement is false. In a fixed-bed adsorber, the breakthrough curve tracks the movement and spreading of the mass-transfer zone. Dynamic capacity is lower than equilibrium static capacity because the bed must be replaced or regenerated before the outlet concentration exceeds the allowable limit. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"固定床吸附系统可以不间断连续运行。","explanationZh":"该声明是错误的。在固定床吸附器中，突破曲线跟踪传质区的移动和扩展。动态容量低于平衡静态容量，因为在出​​口浓度超过允许限度之前必须更换或再生床。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":261,"localNo":61,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Catalyst poisoning is an irreversible form of catalyst deactivation.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Catalyst poisoning occurs when impurities are strongly chemisorbed on active sites. Those sites are then unavailable for the desired reaction, which is why poisoning is usually more serious and less reversible than ordinary fouling.","stemZh":"催化剂中毒是催化剂失活的一种不可逆形式。","explanationZh":"该声明属实。当杂质强烈化学吸附在活性位点上时，就会发生催化剂中毒。这些部位无法进行所需的反应，这就是为什么中毒通常比普通污垢更严重且更难逆转的原因。"},{"id":262,"localNo":62,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Catalytic combustion reactors operate at significantly lower temperatures compared to thermal incinerators.","options":[],"answer":["TRUE"],"explanation":"The statement is true. For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"与热力焚烧炉相比，催化燃烧反应器的运行温度要低得多。","explanationZh":"该声明属实。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":263,"localNo":63,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Thermal sintering of a catalyst is a reversible deactivation mechanism.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Sintering is a thermal deactivation process: high temperature causes active particles or support pores to coalesce, reducing surface area and active-site dispersion. It is normally not reversible by simple operation adjustment.","stemZh":"催化剂的热烧结是一种可逆的失活机制。","explanationZh":"该声明是错误的。烧结是一种热失活过程：高温导致活性颗粒或载体孔聚结，减少表面积和活性位点分散。通常不能通过简单的操作调整来逆转。"},{"id":264,"localNo":64,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"When internal diffusion controls a catalytic reaction, increasing the reaction temperature will significantly increase the overall reaction rate.","options":[],"answer":["FALSE"],"explanation":"The statement is false. When internal pore diffusion controls a gas-solid catalytic reaction, the observed rate is no longer just the intrinsic surface reaction rate. Concentration drops inside the catalyst particle, so the apparent kinetics become weaker than the intrinsic kinetics and the effectiveness factor is governed by the Thiele modulus. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"当内部扩散控制催化反应时，提高反应温度将显着提高总反应速率。","explanationZh":"该声明是错误的。当内部孔扩散控制气固催化反应时，观察到的速率不再仅仅是固有的表面反应速率。催化剂颗粒内部的浓度下降，因此表观动力学变得弱于内在动力学，并且有效性因子由蒂勒模量控制。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":265,"localNo":65,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The Thiele modulus is used to assess the importance of internal mass transfer limitations in porous catalysts.","options":[],"answer":["TRUE"],"explanation":"The statement is true. When internal pore diffusion controls a gas-solid catalytic reaction, the observed rate is no longer just the intrinsic surface reaction rate. Concentration drops inside the catalyst particle, so the apparent kinetics become weaker than the intrinsic kinetics and the effectiveness factor is governed by the Thiele modulus.","stemZh":"蒂勒模量用于评估多孔催化剂中内部传质限制的重要性。","explanationZh":"该声明属实。当内部孔扩散控制气固催化反应时，观察到的速率不再仅仅是固有的表面反应速率。催化剂颗粒内部的浓度下降，因此表观动力学变得弱于内在动力学，并且有效性因子由蒂勒模量控制。"},{"id":266,"localNo":66,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"VOCs (Volatile Organic Compounds) refer to all organic compounds, regardless of vapor pressure.","options":[],"answer":["FALSE"],"explanation":"The statement is false. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"VOC（挥发性有机化合物）是指所有有机化合物，无论蒸气压如何。","explanationZh":"该声明是错误的。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":267,"localNo":67,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Floating roof tanks are an effective means to reduce breathing losses from liquid storage.","options":[],"answer":["TRUE"],"explanation":"The statement is true. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"浮顶储罐是减少液体储存造成的呼吸损失的有效手段。","explanationZh":"该声明属实。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":268,"localNo":68,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Vapor recovery systems at gasoline stations are one example of VOC control technology.","options":[],"answer":["TRUE"],"explanation":"The statement is true. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"加油站的蒸气回收系统是挥发性有机化合物控制技术的一个例子。","explanationZh":"该声明属实。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":269,"localNo":69,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Condensation is a suitable method for treating low-concentration VOC waste gas streams.","options":[],"answer":["FALSE"],"explanation":"The statement is false. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"冷凝是处理低浓度VOC废气的合适方法。","explanationZh":"该声明是错误的。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":270,"localNo":70,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Absorption-based VOC control relies on the dissolution of VOCs into a liquid solvent.","options":[],"answer":["TRUE"],"explanation":"The statement is true. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"基于吸收的 VOC 控制依赖于 VOC 溶解到液体溶剂中。","explanationZh":"该声明属实。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":271,"localNo":71,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Regenerative Thermal Oxidizers (RTOs) provide high thermal energy recovery efficiency.","options":[],"answer":["TRUE"],"explanation":"The statement is true. For VOC destruction, thermal oxidation relies on high temperature, residence time, and mixing; catalytic oxidation lowers the required temperature by providing active sites. RTOs recover heat with ceramic beds, which is why they are used when high destruction efficiency and heat recovery are important.","stemZh":"蓄热式热氧化器 (RTO) 提供高热能回收效率。","explanationZh":"该声明属实。对于VOC的破坏，热氧化依赖于高温、停留时间和混合；催化氧化通过提供活性位点来降低所需的温度。 RTO 通过陶瓷床回收热量，这就是当高破坏效率和热回收很重要时使用它们的原因。"},{"id":272,"localNo":72,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Biofiltration is generally a low operating cost technology for VOC control.","options":[],"answer":["TRUE"],"explanation":"The statement is true. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents.","stemZh":"生物过滤通常是一种低运行成本的 VOC 控制技术。","explanationZh":"该声明属实。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。"},{"id":273,"localNo":73,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Complete combustion of VOCs always produces only CO₂ and H₂O.","options":[],"answer":["FALSE"],"explanation":"The statement is false. CO is a product of incomplete combustion. Sufficient oxygen, high enough temperature, adequate residence time, and good mixing all promote oxidation of CO to CO2; oxidation catalysts can also help. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"VOC 的完全燃烧始终只产生 CO2 和 H2O。","explanationZh":"该声明是错误的。 CO 是不完全燃烧的产物。充足的氧气、足够高的温度、足够的停留时间、良好的混合都促进CO氧化为CO2；氧化催化剂也有帮助。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":274,"localNo":74,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Activated carbon can be regenerated indefinitely without loss of adsorption capacity.","options":[],"answer":["FALSE"],"explanation":"The statement is false. VOC adsorption uses porous solids such as activated carbon, zeolites, silica gel, alumina, or polymeric resins. Capacity depends on pore structure, surface chemistry, humidity, temperature, inlet concentration, and regeneration history. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"活性炭可以无限期地再生而不损失吸附能力。","explanationZh":"该声明是错误的。 VOC 吸附使用多孔固体，例如活性炭、沸石、硅胶、氧化铝或聚合物树脂。容量取决于孔隙结构、表面化学、湿度、温度、入口浓度和再生历史。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":275,"localNo":75,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The presence of water vapor in a gas stream typically reduces the VOC adsorption capacity of activated carbon.","options":[],"answer":["TRUE"],"explanation":"The statement is true. VOC adsorption uses porous solids such as activated carbon, zeolites, silica gel, alumina, or polymeric resins. Capacity depends on pore structure, surface chemistry, humidity, temperature, inlet concentration, and regeneration history.","stemZh":"气流中水蒸气的存在通常会降低活性炭的 VOC 吸附能力。","explanationZh":"该声明属实。 VOC 吸附使用多孔固体，例如活性炭、沸石、硅胶、氧化铝或聚合物树脂。容量取决于孔隙结构、表面化学、湿度、温度、入口浓度和再生历史。"},{"id":276,"localNo":76,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Life Cycle Assessment (LCA) can be used to quantify the GHG emission intensity of a fuel pathway.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"生命周期评估 (LCA) 可用于量化燃料路径的温室气体排放强度。","explanationZh":"该声明属实。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":277,"localNo":77,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In the IMO LCA Guidelines, WTW emissions equal the sum of WTT and TTW emissions.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在 IMO LCA 指南中，WTW 排放量等于 WTT 和 TTW 排放量之和。","explanationZh":"该声明属实。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":278,"localNo":78,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The WTT stage in LCA includes the combustion of fuel on board the ship.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"LCA 中的 WTT 阶段包括船上燃料的燃烧。","explanationZh":"该声明是错误的。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":279,"localNo":79,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"CO₂ emissions from the combustion of biomass fuels are counted as TTW emissions in the IMO LCA Guidelines.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在 IMO LCA 指南中，生物质燃料燃烧产生的 CO2 排放量被计为 TTW 排放量。","explanationZh":"该声明是错误的。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":280,"localNo":80,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"CO₂, CH₄, and N₂O are the three main greenhouse gases covered by the IMO LCA Guidelines.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"CO2、CH4 和 N2O 是 IMO LCA 指南涵盖的三种主要温室气体。","explanationZh":"该声明属实。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":281,"localNo":81,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"GWP20 and GWP100 values for a given gas are always identical.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"给定气体的 GWP20 和 GWP100 值始终相同。","explanationZh":"该声明是错误的。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":282,"localNo":82,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In the IMO LCA Guidelines, ILUC (Indirect Land Use Change) must be quantitatively included in the WTT emission factor.","options":[],"answer":["FALSE"],"explanation":"The statement is false. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"在IMO LCA指南中，ILUC（间接土地利用变化）必须定量地包含在WTT排放因子中。","explanationZh":"该声明是错误的。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":283,"localNo":83,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Energy allocation is the preferred allocation method for co-products in the IMO LCA Guidelines.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"能源分配是IMO LCA指南中副产品的首选分配方法。","explanationZh":"该声明属实。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":284,"localNo":84,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The Fuel Lifecycle Label (FLL) contains information on the GHG emission factors of the fuel.","options":[],"answer":["TRUE"],"explanation":"The statement is true. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"燃  usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"LCA 中使用的实际排放因子必须经过第三方验证和认证。","explanationZh":"该声明属实。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":288,"localNo":88,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Purely fossil fuel pathways are not eligible for the use of actual WTT emission factors.","options":[],"answer":["TRUE"],"explanation":"The statement is true. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement. Because the stem asks for the exception, the answer is the option that does not belong to the listed mechanism or category.","stemZh":"纯化石燃料路径不符合使用实际 WTT 排放因子的条件。","explanationZh":"该声明属实。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。因为词干要求例外，所以答案是不属于所列出的机制或类别的选项。"},{"id":289,"localNo":89,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Fugitive emissions and methane slip should be included in the TTW emission calculation.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"无组织排放和甲烷泄漏应包含在 TTW 排放计算中。","explanationZh":"该声明属实。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":290,"localNo":90,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The fugitive emission factor (Cfug) can be assumed to be zero for all fuel types in the IMO LCA Guidelines.","options":[],"answer":["FALSE"],"explanation":"The statement is false. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"IMO LCA 指南中所有燃料类型的无组织排放因子 (Cfug) 均假定为零。","explanationZh":"该声明是错误的。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":291,"localNo":91,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"GHG emission factors in the IMO LCA Guidelines are expressed as gCO₂eq per MJ of fuel (on a lower calorific value basis).","options":[],"answer":["TRUE"],"explanation":"The statement is true. An emission inventory usually combines activity data with emission factors, then adjusts for control efficiency where needed. AP-42 is the U.S. EPA emission-factor compilation; emission factors are quick and useful but less site-specific than direct measurement.","stemZh":"IMO LCA 指南中的温室气体排放因子表示为每 MJ 燃料的 gCO2eq（基于较低热值）。","explanationZh":"该声明属实。排放清单通常将活动数据与排放因子结合起来，然后根据需要进行调整以提高控制效率。 AP-42 是美国 EPA 排放因子汇编；排放因子快速且有用，但与直接测量相比，具体地点较少。"},{"id":292,"localNo":92,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"Direct Land Use Change (DLUC) emissions can be estimated using carbon stock changes according to IPCC methods.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"直接土地利用变化 (DLUC) 排放量可以根据 IPCC 方法使用碳储量变化进行估算。","explanationZh":"该声明属实。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":293,"localNo":93,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"A co-product is defined in LCA as any output from a production process that has economic value.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"LCA 中将联产品定义为生产过程中具有经济价值的任何产出。","explanationZh":"该声明属实。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":294,"localNo":94,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"When waste or residue materials are used as feedstocks, WTT emissions are calculated starting from the point of collection.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"当废物或残渣材料用作原料时，WTT 排放量从收集点开始计算。","explanationZh":"该声明属实。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":295,"localNo":95,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The IMO LCA Guidelines are applicable to all types of ship emissions, including cargo VOC emissions.","options":[],"answer":["FALSE"],"explanation":"The statement is false. VOC control can be preventive or end-of-pipe. Floating roofs, vapor recovery, seals, and maintenance reduce emissions at the source; adsorption, absorption, condensation, membranes, biofiltration, and oxidation treat the remaining gas stream. Condensation is best for relatively high concentrations or valuable solvents. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"IMO LCA 指南适用于所有类型的船舶排放，包括货物 VOC 排放。","explanationZh":"该声明是错误的。 VOC 控制可以是预防性的，也可以是末端控制的。浮顶、蒸汽回收、密封和维护从源头减少排放；吸附、吸收、冷凝、膜、生物过滤和氧化处理剩余的气流。缩合最适合浓度相对较高或有价值的溶剂。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":296,"localNo":96,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The IMO LCA Guidelines focus only on GHG emissions and explicitly exclude SOx and PM.","options":[],"answer":["TRUE"],"explanation":"The statement is true. SO2 control focuses on reducing sulfur before, during, or after combustion: low-sulfur fuel, fuel desulfurization, in-furnace limestone or sorbent injection, and flue gas desulfurization. Tall stacks dilute pollutants but do not reduce total emissions. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"IMO LCA 指南仅关注温室气体排放，并明确排除硫氧化物和颗粒物。","explanationZh":"该声明属实。 SO2 控制重点是在燃烧前、燃烧中或燃烧后减少硫：低硫燃料、燃料脱硫、炉内石灰石或吸附剂注入以及烟气脱硫。高烟囱会稀释污染物，但不会减少总排放量。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":297,"localNo":97,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"The sustainability assessment in the IMO LCA Guidelines considers only environmental aspects.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"IMO LCA 指南中的可持续性评估仅考虑环境方面。","explanationZh":"该声明是错误的。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":298,"localNo":98,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In the IMO LCA Guidelines, the WTT system boundary ends at the bunkering manifold (fuel delivery to the ship).","options":[],"answer":["TRUE"],"explanation":"The statement is true. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在 IMO LCA 指南中，WTT 系统边界终止于加油歧管（向船舶输送燃料）。","explanationZh":"该声明属实。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"},{"id":299,"localNo":99,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"TTW emissions in the IMO LCA Guidelines include only CO₂ from combustion.","options":[],"answer":["FALSE"],"explanation":"The statement is false. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed. The absolute wording is important here; in pollution-control engineering, performance usually depends on operating conditions, pollutant properties, and system boundaries.","stemZh":"IMO LCA 指南中的 TTW 排放仅包括燃烧产生的二氧化碳。","explanationZh":"该声明是错误的。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。绝对的措辞在这里很重要；在污染控制工程中，性能通常取决于运行条件、污染物特性和系统边界。"},{"id":300,"localNo":100,"type":"truefalse","partEn":"True / False","partZh":"判断题","stem":"In the IMO LCA Guidelines, WTT emissions are calculated independently of how the fuel is ultimately used onboard.","options":[],"answer":["TRUE"],"explanation":"The statement is true. Life-cycle assessment separates well-to-tank (fuel production and delivery), tank-to-wake (onboard use), and well-to-wake totals. IMO fuel LCA focuses on GHG intensity, uses CO2-equivalent factors such as GWP20 and GWP100, treats allocation and land-use change carefully, and requires verified actual factors when they are claimed.","stemZh":"在 IMO LCA 指南中，WTT 排放量的计算与船上燃料的最终使用方式无关。","explanationZh":"该声明属实。生命周期评估将油井到油箱（燃料生产和输送）、油箱到尾流（船上使用）和油井到尾流总计分开。 IMO燃料LCA注重温室气体强度，使用GWP20和GWP100等二氧化碳当量因素，谨慎对待分配和土地利用变化，并在申报时要求经过验证的实际因素。"}];
    const STORE_KEY = "air_pollution_quiz_progress_v2";
    const THEME_KEY = "air_pollution_quiz_theme_v1";
    const ORDER_KEY = "air_pollution_quiz_option_order_v2";
    const PRACTICE_MODE_KEY = "air_pollution_quiz_practice_mode_v1";
    const QUESTION_ORDER_KEY = "air_pollution_quiz_question_order_v1";
    const PRACTICE_MODES = ["sequence", "reverse", "random"];
    const PRACTICE_MODE_LABELS = {
      sequence: "顺序",
      reverse: "倒序",
      random: "乱序"
    };
    const state = {
      index: 0,
      filtered: QUESTIONS.map((_, i) => i),
      selected: new Set(),
      translating: false,
      progress: JSON.parse(localStorage.getItem(STORE_KEY) || "{}"),
      optionOrder: JSON.parse(localStorage.getItem(ORDER_KEY) || "{}"),
      questionOrder: JSON.parse(localStorage.getItem(QUESTION_ORDER_KEY) || "[]"),
      practiceMode: localStorage.getItem(PRACTICE_MODE_KEY) || "sequence",
      theme: localStorage.getItem(THEME_KEY) || "light"
    };

    const el = (id) => document.getElementById(id);
    const app = document.querySelector(".app");
    app.dataset.theme = state.theme;

    function saveProgress() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state.progress));
    }

    function saveOptionOrder() {
      localStorage.setItem(ORDER_KEY, JSON.stringify(state.optionOrder));
    }

    function saveQuestionOrder() {
      localStorage.setItem(QUESTION_ORDER_KEY, JSON.stringify(state.questionOrder));
    }

    function savePracticeMode() {
      localStorage.setItem(PRACTICE_MODE_KEY, state.practiceMode);
    }

    function normalizeAnswer(list) {
      return [...list].map(String).sort().join(",");
    }

    function displayText(en, zh) {
      return state.translating ? (zh || en) : en;
    }

    function currentQuestion() {
      return QUESTIONS[state.filtered[state.index]];
    }

    function currentRecord(q) {
      return state.progress[q.id] || null;
    }

    function baseOptions(q) {
      return q.type === "truefalse"
        ? [
            { label: "TRUE", text: "TRUE", textZh: "正确" },
            { label: "FALSE", text: "FALSE", textZh: "错误" }
          ]
        : q.options;
    }

    function shuffledLabels(labels) {
      const copy = [...labels];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function shuffledLabelsDifferent(labels, previous = []) {
      if (labels.length < 2) return [...labels];
      for (let attempt = 0; attempt < 12; attempt++) {
        const next = shuffledLabels(labels);
        if (next.join("|") !== previous.join("|")) return next;
      }
      const rotated = [...labels];
      rotated.push(rotated.shift());
      return rotated;
    }

    function ensureQuestionOrder() {
      const all = QUESTIONS.map((_, i) => i);
      if (!Array.isArray(state.questionOrder) || state.questionOrder.length !== all.length || state.questionOrder.some(i => !Number.isInteger(i) || i < 0 || i >= QUESTIONS.length)) {
        state.questionOrder = shuffledLabels(all);
        saveQuestionOrder();
      }
    }

    function shuffleAllOptionOrders() {
      const next = {};
      QUESTIONS.forEach(q => {
        const labels = baseOptions(q).map(o => o.label);
        next[q.id] = shuffledLabelsDifferent(labels, state.optionOrder[q.id] || labels);
      });
      state.optionOrder = next;
      saveOptionOrder();
    }

    function orderIndexes(indexes) {
      if (state.practiceMode === "reverse") return [...indexes].sort((a, b) => b - a);
      if (state.practiceMode === "random") {
        ensureQuestionOrder();
        const allowed = new Set(indexes);
        return state.questionOrder.filter(i => allowed.has(i));
      }
      return [...indexes].sort((a, b) => a - b);
    }

    function renderPracticeModeButton() {
      el("practiceModeBtn").textContent = PRACTICE_MODE_LABELS[state.practiceMode] || "顺序";
      el("practiceModeBtn").title = "当前：" + (PRACTICE_MODE_LABELS[state.practiceMode] || "顺序") + "；点击切换刷题方式";
    }

    function orderedOptions(q) {
      const options = baseOptions(q);
      const labels = options.map(o => o.label);
      let order = state.optionOrder[q.id];
      if (!Array.isArray(order) || order.length !== labels.length || order.some(label => !labels.includes(label))) {
        order = shuffledLabels(labels);
        state.optionOrder[q.id] = order;
        saveOptionOrder();
      }
      const lookup = Object.fromEntries(options.map(o => [o.label, o]));
      return order.map((originalLabel, index) => ({
        ...lookup[originalLabel],
        originalLabel,
        displayLabel: String.fromCharCode(65 + index)
      }));
    }

    function answerLabel(q) {
      const lookup = Object.fromEntries(orderedOptions(q).map(o => [o.originalLabel, o]));
      return q.answer.map(label => {
        const opt = lookup[label];
        return opt ? `${opt.displayLabel}. ${opt.text}` : label;
      }).join("; ");
    }

    function answerLabelZh(q) {
      const lookup = Object.fromEntries(orderedOptions(q).map(o => [o.originalLabel, o]));
      return q.answer.map(label => {
        const opt = lookup[label];
        return opt ? `${opt.displayLabel}. ${opt.textZh || opt.text}` : label;
      }).join("；");
    }

    function applyFilters() {
      const part = el("partFilter").value;
      const status = el("statusFilter").value;
      const search = el("searchBox").value.trim().toLowerCase();
      const matched = QUESTIONS.map((q, i) => [q, i]).filter(([q]) => {
        if (part !== "all" && q.type !== part) return false;
        const rec = currentRecord(q);
        if (status === "undone" && rec) return false;
        if (status === "wrong" && (!rec || rec.correct)) return false;
        if (status === "right" && (!rec || !rec.correct)) return false;
        if (search) {
          const hay = [
            q.stem, q.stemZh, q.explanation, q.explanationZh,
            ...q.options.flatMap(o => [o.text, o.textZh])
          ].join(" ").toLowerCase();
          if (!hay.includes(search)) return false;
        }
        return true;
      }).map(([, i]) => i);
      state.filtered = orderIndexes(matched);
      if (state.index >= state.filtered.length) state.index = Math.max(0, state.filtered.length - 1);
      state.selected = new Set();
      render();
    }

    function renderStats() {
      const records = Object.values(state.progress);
      const done = records.length;
      const right = records.filter(r => r.correct).length;
      const wrong = done - right;
      el("doneCount").textContent = done;
      el("rightCount").textContent = right;
      el("wrongCount").textContent = wrong;
      el("accuracy").textContent = done ? `${Math.round(right / done * 100)}%` : "0%";
    }

    function renderJumpGrid() {
      const grid = el("jumpGrid");
      grid.innerHTML = "";
      state.filtered.forEach((qIndex, pos) => {
        const q = QUESTIONS[qIndex];
        const rec = currentRecord(q);
        const btn = document.createElement("button");
        btn.className = "jump" + (pos === state.index ? " current" : "") + (rec ? (rec.correct ? " done" : " wrong") : "");
        btn.textContent = q.id;
        btn.title = `${q.partZh} ${q.localNo}`;
        btn.addEventListener("click", () => {
          state.index = pos;
          state.selected = new Set();
          render();
        });
        grid.appendChild(btn);
      });
    }

    function optionButton(q, option) {
      const label = option.originalLabel;
      const rec = currentRecord(q);
      const selected = rec ? rec.selected.includes(label) : state.selected.has(label);
      const isAnswer = q.answer.includes(label);
      const btn = document.createElement("button");
      btn.className = "option";
      if (selected) btn.classList.add("selected");
      if (rec && isAnswer) btn.classList.add("correct");
      if (rec && selected && !isAnswer) btn.classList.add("incorrect");
      btn.innerHTML = `<span class="letter">${option.displayLabel}</span><span>${escapeHtml(displayText(option.text, option.textZh))}</span>`;
      btn.disabled = Boolean(rec);
      btn.addEventListener("click", () => {
        if (q.type === "single" || q.type === "truefalse") {
          state.selected = new Set([label]);
        } else if (state.selected.has(label)) {
          state.selected.delete(label);
        } else {
          state.selected.add(label);
        }
        render();
      });
      return btn;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    }

    function renderQuestion() {
      const body = el("questionBody");
      if (!state.filtered.length) {
        body.innerHTML = `<div class="empty">没有符合当前筛选条件的题目。</div>`;
        el("partBadge").textContent = "无题目";
        el("noBadge").textContent = "-";
        el("modeBadge").textContent = "-";
        el("submitBtn").disabled = true;
        el("prevBtn").disabled = true;
        el("nextBtn").disabled = true;
        el("filterInfo").textContent = "0 / 0";
        el("progressBar").style.width = "0%";
        return;
      }

      const q = currentQuestion();
      const rec = currentRecord(q);
      el("partBadge").textContent = state.translating ? q.partZh : q.partEn;
      el("noBadge").textContent = `总第 ${q.id} 题 · 本部分第 ${q.localNo} 题`;
      el("modeBadge").textContent = q.type === "multiple" ? "多选" : q.type === "truefalse" ? "判断" : "单选";
      el("filterInfo").textContent = `${state.index + 1} / ${state.filtered.length}`;
      el("progressBar").style.width = `${((state.index + 1) / state.filtered.length) * 100}%`;

      const options = orderedOptions(q);

      const optionsWrap = document.createElement("div");
      optionsWrap.className = "options" + (q.type === "truefalse" ? " tf-options" : "");
      options.forEach(o => optionsWrap.appendChild(optionButton(q, o)));

      body.innerHTML = "";
      const stem = document.createElement("h1");
      stem.className = "stem";
      stem.textContent = displayText(q.stem, q.stemZh);
      body.appendChild(stem);
      body.appendChild(optionsWrap);

      const result = document.createElement("div");
      result.className = "result" + (rec ? " show " + (rec.correct ? "good" : "bad") : "");
      if (rec) {
        result.innerHTML = `
          <h2>${rec.correct ? (state.translating ? "回答正确" : "Correct") : (state.translating ? "回答错误" : "Incorrect")}</h2>
          <p class="answer-line">${state.translating ? "正确答案：" : "Correct answer: "}${escapeHtml(state.translating ? answerLabelZh(q) : answerLabel(q))}</p>
          <p>${escapeHtml(displayText(q.explanation, q.explanationZh))}</p>
        `;
      }
      body.appendChild(result);

      el("submitBtn").disabled = Boolean(rec) || state.selected.size === 0;
      el("prevBtn").disabled = state.index === 0;
      el("nextBtn").disabled = state.index >= state.filtered.length - 1;
    }

    function submitAnswer() {
      const q = currentQuestion();
      if (!q || state.selected.size === 0) return;
      const chosen = normalizeAnswer(state.selected);
      const correct = normalizeAnswer(q.answer);
      state.progress[q.id] = {
        selected: [...state.selected],
        correct: chosen === correct,
        answeredAt: new Date().toISOString()
      };
      saveProgress();
      render();
    }

    function render() {
      renderPracticeModeButton();
      renderStats();
      renderJumpGrid();
      renderQuestion();
    }

    function move(delta) {
      if (!state.filtered.length) return;
      state.index = Math.min(Math.max(state.index + delta, 0), state.filtered.length - 1);
      state.selected = new Set();
      render();
    }

    function setTranslating(value) {
      state.translating = value;
      el("translateBtn").classList.toggle("active", value);
      el("translateBtn").textContent = value ? "松开恢复英文" : "按住翻译";
      render();
    }

    el("submitBtn").addEventListener("click", submitAnswer);
    el("prevBtn").addEventListener("click", () => move(-1));
    el("nextBtn").addEventListener("click", () => move(1));
    el("partFilter").addEventListener("change", applyFilters);
    el("statusFilter").addEventListener("change", applyFilters);
    el("searchBox").addEventListener("input", applyFilters);
    el("practiceModeBtn").addEventListener("click", () => {
      const current = PRACTICE_MODES.includes(state.practiceMode) ? state.practiceMode : "sequence";
      state.practiceMode = PRACTICE_MODES[(PRACTICE_MODES.indexOf(current) + 1) % PRACTICE_MODES.length];
      if (state.practiceMode === "random") {
        state.questionOrder = shuffledLabels(QUESTIONS.map((_, i) => i));
        saveQuestionOrder();
      }
      state.index = 0;
      state.selected = new Set();
      savePracticeMode();
      applyFilters();
    });
    el("shuffleOptionsBtn").addEventListener("click", () => {
      shuffleAllOptionOrders();
      state.selected = new Set();
      render();
    });
    el("resetBtn").addEventListener("click", () => {
      if (confirm("确定清空本地做题记录？")) {
        state.progress = {};
        state.optionOrder = {};
        state.questionOrder = shuffledLabels(QUESTIONS.map((_, i) => i));
        state.selected = new Set();
        saveProgress();
        saveOptionOrder();
        saveQuestionOrder();
        applyFilters();
      }
    });
    el("themeBtn").addEventListener("click", () => {
      state.theme = state.theme === "dark" ? "light" : "dark";
      app.dataset.theme = state.theme;
      localStorage.setItem(THEME_KEY, state.theme);
    });

    const translateBtn = el("translateBtn");
    ["pointerdown", "touchstart", "mousedown"].forEach(type => {
      translateBtn.addEventListener(type, event => {
        event.preventDefault();
        setTranslating(true);
      }, { passive: false });
    });
    ["pointerup", "pointercancel", "pointerleave", "touchend", "mouseup", "mouseleave"].forEach(type => {
      translateBtn.addEventListener(type, () => setTranslating(false));
    });
    window.addEventListener("keyup", event => {
      if (event.key === " ") setTranslating(false);
    });
    window.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") move(-1);
      if (event.key === "ArrowRight") move(1);
      if (event.key === "Enter") submitAnswer();
      if (event.key === " ") {
        event.preventDefault();
        setTranslating(true);
      }
    });

    if (!PRACTICE_MODES.includes(state.practiceMode)) state.practiceMode = "sequence";
    applyFilters();
  </script>
</body>
</html>
